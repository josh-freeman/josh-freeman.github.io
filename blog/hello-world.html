<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading... - Joshua Freeman</title>
    <meta name="description" id="page-description" content="">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Open Graph -->
    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-description" content="">
    <meta property="og:image" content="https://joshfreeman.me/resources/big_icon.jpg">
    <meta property="og:url" id="og-url" content="">
    <meta property="og:type" content="article">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/blog.css">

    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="main">
        <!-- Sidebar -->
        <sidebar>
            <script src="/sidebar.js"></script>
        </sidebar>

        <article class="post-container">
            <a href="/blog.html" class="back-link">Back to blog</a>

            <header class="post-header">
                <h1 id="post-title">Loading...</h1>
                <p class="post-meta">
                    <time id="post-date" datetime=""></time>
                </p>
            </header>

            <div id="post-content" class="post-content">
                <p style="color: var(--text-muted);">Loading post...</p>
            </div>

            <!-- Comments Section -->
            <section class="comments-section">
                <h2>Comments</h2>
                <div id="comments-container">
                    <p class="comments-loading">Loading comments...</p>
                </div>
                <div id="comment-form-container">
                    <p class="comment-login-notice">
                        Comments are invite-only. <a href="#" id="login-link">Log in</a> to leave a comment.
                    </p>
                </div>
            </section>
        </article>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="/submenus.js"></script>
    <script src="/comments.js"></script>
    <script>
        // API_BASE and getPostSlug() are already defined in comments.js

        function formatPostDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function loadPost() {
            const slug = getPostSlug();
            if (!slug) {
                document.getElementById('post-title').textContent = 'Post Not Found';
                document.getElementById('post-content').innerHTML = '<p>Could not determine post slug from URL.</p>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/posts/${slug}`);
                if (response.ok) {
                    const post = await response.json();

                    // Update page metadata
                    document.getElementById('page-title').textContent = `${post.title} - Joshua Freeman`;
                    document.getElementById('page-description').content = post.excerpt || '';
                    document.getElementById('og-title').content = `${post.title} - Joshua Freeman`;
                    document.getElementById('og-description').content = post.excerpt || '';
                    document.getElementById('og-url').content = `https://joshfreeman.me/blog/${slug}.html`;

                    // Update content
                    document.getElementById('post-title').textContent = post.title;
                    document.getElementById('post-date').textContent = formatPostDate(post.created_at);
                    document.getElementById('post-date').setAttribute('datetime', post.created_at.split('T')[0]);

                    // Render markdown content
                    document.getElementById('post-content').innerHTML = marked.parse(post.content);
                } else if (response.status === 404) {
                    document.getElementById('post-title').textContent = 'Post Not Found';
                    document.getElementById('post-content').innerHTML = '<p>This post does not exist or has been removed.</p>';
                } else {
                    throw new Error('Failed to load');
                }
            } catch (error) {
                // Fallback content for hello-world if API fails
                if (slug === 'hello-world') {
                    document.getElementById('page-title').textContent = 'Hello World - Joshua Freeman';
                    document.getElementById('post-title').textContent = 'Hello World';
                    document.getElementById('post-date').textContent = 'February 16, 2025';
                    document.getElementById('post-content').innerHTML = `
                        <p>Welcome to my blog. This is where I'll share thoughts on AI safety,
                        software engineering, and whatever else is on my mind.</p>
                        <p>I'm a CS student at ETH Zurich, interested in applications of AI to health
                        and AI safety research.</p>
                    `;
                } else {
                    document.getElementById('post-title').textContent = 'Error Loading Post';
                    document.getElementById('post-content').innerHTML = '<p>Failed to load post content. Please try again later.</p>';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>
