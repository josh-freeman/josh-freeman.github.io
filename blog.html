<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Joshua Freeman</title>
    <meta name="description" content="Blog posts by Joshua Freeman">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Open Graph -->
    <meta property="og:title" content="Blog - Joshua Freeman">
    <meta property="og:description" content="Blog posts">
    <meta property="og:image" content="https://joshfreeman.me/resources/big_icon.jpg">
    <meta property="og:url" content="https://joshfreeman.me/blog.html">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/blog.css">
</head>
<body>
    <div id="main">
        <!-- Sidebar -->
        <sidebar>
            <script src="sidebar.js"></script>
        </sidebar>

        <div class="blog-container">
            <h1>Blog</h1>
            <p class="blog-intro">Thoughts on AI, software, and life.</p>

            <div id="posts-list" class="posts-list">
                <p style="color: var(--text-muted);">Loading posts...</p>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="submenus.js"></script>
    <script>
        const API_BASE = 'https://api.joshfreeman.me';

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadPosts() {
            const container = document.getElementById('posts-list');

            try {
                const response = await fetch(`${API_BASE}/posts`);
                if (response.ok) {
                    const posts = await response.json();
                    if (posts.length === 0) {
                        container.innerHTML = '<p style="color: var(--text-muted); font-style: italic;">No posts yet. Check back soon!</p>';
                        return;
                    }

                    container.innerHTML = posts.map(post => `
                        <article class="post-preview">
                            <a href="/blog/${post.slug}.html">
                                <h2>${escapeHtml(post.title)}</h2>
                                <time datetime="${post.created_at.split('T')[0]}">${formatDate(post.created_at)}</time>
                                <p>${escapeHtml(post.excerpt || '')}</p>
                            </a>
                        </article>
                    `).join('');
                } else {
                    throw new Error('Failed to load');
                }
            } catch (error) {
                // Fallback to static content if API fails
                container.innerHTML = `
                    <article class="post-preview">
                        <a href="/blog/hello-world.html">
                            <h2>Hello World</h2>
                            <time datetime="2025-02-16">February 16, 2025</time>
                            <p>Welcome to my blog.</p>
                        </a>
                    </article>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadPosts);
    </script>
</body>
</html>
