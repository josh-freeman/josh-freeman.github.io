<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialNet - Joshua Freeman</title>
    <meta name="description" content="Social posts by Joshua Freeman">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Open Graph -->
    <meta property="og:title" content="SocialNet - Joshua Freeman">
    <meta property="og:description" content="Social posts">
    <meta property="og:image" content="https://joshfreeman.me/resources/big_icon.jpg">
    <meta property="og:url" content="https://joshfreeman.me/socialnet.html">

    <!-- Fonts: Fraunces (display), Source Serif 4 (body), DM Sans (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/socialnet.css">

    <!-- Theme Script (before body to prevent flash) -->
    <script src="/js/theme.js"></script>
</head>
<body>
    <!-- Spotlight Tour for New Users -->
    <div id="tour-overlay" class="tour-overlay" style="display: none;"></div>
    <div id="tour-tooltip" class="tour-tooltip" style="display: none;">
        <div class="tour-tooltip-content">
            <h3 id="tour-title"></h3>
            <p id="tour-text"></p>
        </div>
        <div class="tour-tooltip-footer">
            <button class="tour-skip" onclick="endTour()">Skip</button>
            <div class="tour-progress">
                <span id="tour-step-indicator"></span>
            </div>
            <button class="tour-next btn btn-primary" onclick="nextTourStep()">Next</button>
        </div>
        <div class="tour-tooltip-arrow" id="tour-arrow"></div>
    </div>

    <style>
        .tour-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9998;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .tour-overlay.active {
            pointer-events: auto;
        }

        /* Spotlight element gets this class */
        .tour-spotlight {
            position: relative;
            z-index: 9999 !important;
            box-shadow: 0 0 0 9999px rgba(12, 11, 13, 0.85);
            border-radius: 12px;
            animation: spotlightPulse 2s ease-in-out infinite;
        }

        @keyframes spotlightPulse {
            0%, 100% { box-shadow: 0 0 0 9999px rgba(12, 11, 13, 0.85), 0 0 0 4px rgba(229, 165, 75, 0.3); }
            50% { box-shadow: 0 0 0 9999px rgba(12, 11, 13, 0.85), 0 0 0 8px rgba(229, 165, 75, 0.15); }
        }

        .tour-tooltip {
            position: fixed;
            z-index: 10000;
            background: var(--bg-secondary, #151418);
            border: 1px solid var(--border-default, rgba(255, 255, 255, 0.15));
            border-radius: 16px;
            padding: 1.25rem;
            max-width: 320px;
            width: calc(100vw - 2rem);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: tooltipIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes tooltipIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tour-tooltip-content h3 {
            font-family: var(--font-display, 'Fraunces', Georgia, serif);
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary, #f5f2ed);
            margin: 0 0 0.5rem 0;
        }

        .tour-tooltip-content p {
            font-size: 0.9rem;
            color: var(--text-secondary, #c4bfb6);
            line-height: 1.5;
            margin: 0;
        }

        .tour-tooltip-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-subtle, rgba(255, 255, 255, 0.06));
        }

        .tour-skip {
            background: none;
            border: none;
            color: var(--text-muted, #8a857c);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.5rem;
            margin: -0.5rem;
            transition: color 0.2s;
        }

        .tour-skip:hover {
            color: var(--text-secondary, #c4bfb6);
        }

        .tour-progress {
            font-size: 0.8rem;
            color: var(--text-muted, #8a857c);
        }

        .tour-next {
            padding: 0.6rem 1.25rem;
            font-size: 0.9rem;
        }

        .tour-tooltip-arrow {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--bg-secondary, #151418);
            border: 1px solid var(--border-default, rgba(255, 255, 255, 0.15));
            transform: rotate(45deg);
        }

        .tour-tooltip-arrow.top {
            bottom: -7px;
            left: 50%;
            margin-left: -6px;
            border-top: none;
            border-left: none;
        }

        .tour-tooltip-arrow.bottom {
            top: -7px;
            left: 50%;
            margin-left: -6px;
            border-bottom: none;
            border-right: none;
        }

        .tour-tooltip-arrow.left {
            right: -7px;
            top: 50%;
            margin-top: -6px;
            border-bottom: none;
            border-left: none;
        }

        .tour-tooltip-arrow.right {
            left: -7px;
            top: 50%;
            margin-top: -6px;
            border-top: none;
            border-right: none;
        }

        /* Welcome step - no spotlight, centered tooltip */
        .tour-tooltip.welcome-step {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .tour-tooltip.welcome-step .tour-tooltip-arrow {
            display: none;
        }
    </style>

    <div id="main">
        <!-- Sidebar -->
        <sidebar>
            <script src="sidebar.js"></script>
        </sidebar>

        <div class="blog-container">
            <h1>SocialNet</h1>
            <p class="blog-intro">thoughts on stuff</p>

            <div id="posts-list" class="posts-list">
                <p style="color: var(--text-muted);">Loading posts...</p>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="submenus.js"></script>
    <script>
        // API_BASE is already defined in sidebar.js

        function isAdminLoggedIn() {
            try {
                const user = localStorage.getItem('comment_user');
                if (user) {
                    const userData = JSON.parse(user);
                    return userData.is_admin === true;
                }
            } catch (e) {}
            return false;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadPosts() {
            const container = document.getElementById('posts-list');
            const isAdmin = isAdminLoggedIn();

            // Show admin controls if admin
            if (isAdmin) {
                const adminControls = document.createElement('div');
                adminControls.className = 'admin-controls';
                adminControls.innerHTML = '<a href="/admin.html" class="btn">New Post</a>';
                container.parentNode.insertBefore(adminControls, container);
            }

            try {
                // Include auth token if logged in (to see exclusive posts)
                const token = localStorage.getItem('comment_token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const response = await fetch(`${API_BASE}/posts`, { headers });
                if (response.ok) {
                    const posts = await response.json();
                    if (posts.length === 0) {
                        container.innerHTML = '<p style="color: var(--text-muted); font-style: italic;">No posts yet. Check back soon!</p>';
                        return;
                    }

                    container.innerHTML = posts.map(post => {
                        const badges = [];
                        if (!post.is_published) badges.push('<span class="draft-badge">Draft</span>');
                        if (post.is_friends_only) badges.push('<span class="exclusive-badge">Friends</span>');
                        const badgeHtml = badges.length ? ' ' + badges.join(' ') : '';

                        // Only show date for published posts
                        const dateHtml = post.is_published
                            ? `<time datetime="${post.created_at.split('T')[0]}">${formatDate(post.created_at)}</time>`
                            : '';

                        return `
                        <article class="post-preview ${post.thumbnail_url ? 'has-thumbnail' : ''} ${!post.is_published ? 'is-draft' : ''}">
                            ${isAdmin ? `<a href="/admin.html#edit/${post.slug}" class="post-edit-btn">Edit</a>` : ''}
                            ${post.thumbnail_url ? `
                                <a href="/socialnet/post.html?slug=${post.slug}" class="post-thumbnail">
                                    <img src="${post.thumbnail_url}" alt="" loading="lazy">
                                </a>
                            ` : ''}
                            <div class="post-content">
                                <a href="/socialnet/post.html?slug=${post.slug}">
                                    <h2>${escapeHtml(post.title)}${badgeHtml}</h2>
                                    ${dateHtml}
                                    <p>${escapeHtml(post.excerpt || '')}</p>
                                    <span class="read-more">Read more &rarr;</span>
                                </a>
                            </div>
                        </article>
                    `}).join('');
                } else {
                    throw new Error('Failed to load');
                }
            } catch (error) {
                // Show error if API fails
                container.innerHTML = '<p style="color: var(--text-muted);">Unable to load posts. Please try again later.</p>';
            }
        }

        // Spotlight Tour System
        let currentTourStep = 0;
        let currentSpotlightEl = null;

        const tourSteps = [
            {
                type: 'welcome',
                title: 'Welcome to SocialNet!',
                text: "You're now part of a small circle of friends and family. Let me show you around.",
                nextLabel: "Show me"
            },
            {
                selector: '.posts-list',
                title: 'Posts from the group',
                text: 'Here you\'ll find thoughts, updates, and stories shared just with this circle.',
                position: 'top'
            },
            {
                selector: '.post-preview',
                title: 'Read & comment',
                text: 'Click any post to read the full article and join the conversation.',
                position: 'top',
                nextLabel: "Got it!"
            }
        ];

        function checkOnboarding() {
            if (localStorage.getItem('is_new_user') === 'true') {
                // Small delay to let posts load first
                setTimeout(startTour, 500);
            }
        }

        function startTour() {
            currentTourStep = 0;
            document.getElementById('tour-overlay').style.display = 'block';
            document.getElementById('tour-overlay').classList.add('active');
            showTourStep();
        }

        function showTourStep() {
            const step = tourSteps[currentTourStep];
            const tooltip = document.getElementById('tour-tooltip');
            const title = document.getElementById('tour-title');
            const text = document.getElementById('tour-text');
            const indicator = document.getElementById('tour-step-indicator');
            const arrow = document.getElementById('tour-arrow');
            const nextBtn = tooltip.querySelector('.tour-next');

            // Clear previous spotlight
            if (currentSpotlightEl) {
                currentSpotlightEl.classList.remove('tour-spotlight');
            }

            // Update content
            title.textContent = step.title;
            text.textContent = step.text;
            indicator.textContent = `${currentTourStep + 1} of ${tourSteps.length}`;
            nextBtn.textContent = step.nextLabel || (currentTourStep === tourSteps.length - 1 ? "Done" : "Next");

            // Welcome step - centered, no spotlight
            if (step.type === 'welcome') {
                tooltip.className = 'tour-tooltip welcome-step';
                tooltip.style.display = 'block';
                tooltip.style.top = '';
                tooltip.style.left = '';
                tooltip.style.bottom = '';
                tooltip.style.right = '';
                return;
            }

            // Find and spotlight the element
            const targetEl = document.querySelector(step.selector);
            if (!targetEl) {
                nextTourStep();
                return;
            }

            currentSpotlightEl = targetEl;
            targetEl.classList.add('tour-spotlight');

            // Position tooltip relative to element
            tooltip.className = 'tour-tooltip';
            tooltip.style.display = 'block';

            const rect = targetEl.getBoundingClientRect();
            const tooltipRect = tooltip.getBoundingClientRect();
            const padding = 16;

            // Reset arrow classes
            arrow.className = 'tour-tooltip-arrow';

            // Position based on preference
            if (step.position === 'top' || step.position === 'bottom') {
                // Center horizontally
                let left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
                left = Math.max(padding, Math.min(left, window.innerWidth - tooltipRect.width - padding));
                tooltip.style.left = left + 'px';

                if (step.position === 'top') {
                    tooltip.style.top = (rect.bottom + padding) + 'px';
                    arrow.classList.add('bottom');
                } else {
                    tooltip.style.top = (rect.top - tooltipRect.height - padding) + 'px';
                    arrow.classList.add('top');
                }
            }

            // Scroll element into view if needed
            if (rect.top < 100 || rect.bottom > window.innerHeight - 100) {
                targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function nextTourStep() {
            currentTourStep++;
            if (currentTourStep >= tourSteps.length) {
                endTour();
            } else {
                showTourStep();
            }
        }

        function endTour() {
            // Clean up
            if (currentSpotlightEl) {
                currentSpotlightEl.classList.remove('tour-spotlight');
            }

            const tooltip = document.getElementById('tour-tooltip');
            const overlay = document.getElementById('tour-overlay');

            tooltip.style.opacity = '0';
            tooltip.style.transition = 'opacity 0.2s';
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.2s';

            setTimeout(() => {
                tooltip.style.display = 'none';
                overlay.style.display = 'none';
                tooltip.style.opacity = '';
                overlay.style.opacity = '';
                localStorage.removeItem('is_new_user');
            }, 200);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadPosts();
            checkOnboarding();
        });
    </script>
</body>
</html>
