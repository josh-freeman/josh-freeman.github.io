<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading... - Joshua Freeman</title>
    <meta name="description" id="page-description" content="">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Open Graph -->
    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-description" content="">
    <meta property="og:image" content="https://joshfreeman.me/resources/big_icon.jpg">
    <meta property="og:url" id="og-url" content="">
    <meta property="og:type" content="article">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/blog.css">

    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Cytoscape.js for graph visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
</head>
<body>
    <div id="main">
        <!-- Sidebar -->
        <sidebar>
            <script src="/sidebar.js"></script>
        </sidebar>

        <article class="post-container">
            <a href="/blog.html" class="back-link">Back to blog</a>

            <header class="post-header">
                <h1 id="post-title">Loading...</h1>
                <p class="post-meta">
                    <time id="post-date" datetime=""></time>
                    <span id="reaction-container" style="margin-left: 1rem;">
                        <button id="reaction-btn" onclick="toggleReaction()" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 0.25rem 0.5rem; border-radius: 6px; transition: background 0.2s;" title="Like this post">
                            <span id="reaction-icon">🤍</span>
                            <span id="reaction-count" style="font-size: 0.9rem; color: var(--text-muted);">0</span>
                        </button>
                    </span>
                    <span id="admin-actions" style="display: none; margin-left: 1rem;">
                        <button class="btn-link" onclick="editPost()">edit</button>
                        <button class="btn-link btn-danger" onclick="deletePost()">delete</button>
                    </span>
                </p>
            </header>

            <div id="post-content" class="post-content">
                <p style="color: var(--text-muted);">Loading post...</p>
            </div>

            <!-- Reaction Forest Section -->
            <section id="reactions-section" class="reactions-section" style="margin-top: 2rem;">
                <style>
                    .forest-container { background: linear-gradient(135deg, #fefefe 0%, #f8f9fa 100%); border: 1px solid #e0e0e0; border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
                    .forest-header { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
                    .forest-header h3 { margin: 0; font-size: 1.2rem; }
                    .forest-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.35rem; }
                    #forest-graph { margin-top: 1rem; height: 250px; border-radius: 12px; background: white; border: 1px solid #eee; }
                    .forest-empty { text-align: center; padding: 3rem 2rem; color: var(--text-muted); }
                    .forest-legend { display: flex; gap: 1.5rem; margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted); flex-wrap: wrap; justify-content: center; }
                    .forest-legend span { display: flex; align-items: center; gap: 0.3rem; }
                </style>
                <div class="forest-container">
                    <div class="forest-header">
                        <div onclick="toggleReactionForest()" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <span id="forest-toggle-icon" style="font-size: 0.8rem; transition: transform 0.2s;">▶</span>
                            <h3>Reaction Forest <span id="forest-count" style="font-weight: normal; color: var(--text-muted);"></span></h3>
                        </div>
                        <div id="view-toggle" style="margin-left: auto; display: none; gap: 0.25rem; background: #eee; padding: 0.2rem; border-radius: 6px;">
                            <button onclick="setForestView('tree')" id="view-tree-btn" style="padding: 0.3rem 0.6rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; background: white;">Tree</button>
                            <button onclick="setForestView('graph')" id="view-graph-btn" style="padding: 0.3rem 0.6rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; background: transparent;">Graph</button>
                        </div>
                    </div>
                    <p class="forest-subtitle" id="forest-subtitle" style="display: none;">Click on hearts to react to reactions</p>
                    <div id="forest-tree" style="display: none;"></div>
                    <div id="forest-graph" style="display: none;"></div>
                    <div class="forest-legend" id="forest-legend" style="display: none;"></div>
                </div>
            </section>

            <!-- Comments Section -->
            <section class="comments-section">
                <h2>Comments</h2>
                <div id="comments-container">
                    <p class="comments-loading">Loading comments...</p>
                </div>
                <div id="comment-form-container">
                    <p class="comment-login-notice">
                        Comments are invite-only. <a href="#" id="login-link">Log in</a> to leave a comment.
                    </p>
                </div>
            </section>
        </article>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="/submenus.js"></script>

    <script>
        // Define these before comments.js loads so it can use them
        const API_BASE = 'https://api.joshfreeman.me';
        window.COMMENTS_API_BASE = API_BASE;

        function getPostSlug() {
            // Get slug from URL parameter
            const params = new URLSearchParams(window.location.search);
            return params.get('slug');
        }
    </script>

    <script src="/comments.js" defer></script>

    <script>
        function formatPostDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function loadPost() {
            const slug = getPostSlug();
            if (!slug) {
                document.getElementById('post-title').textContent = 'Post Not Found';
                document.getElementById('post-content').innerHTML = '<p>No post specified. <a href="/blog.html">Back to blog</a></p>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/posts/${slug}`);
                if (response.ok) {
                    const post = await response.json();

                    // Update page metadata
                    document.getElementById('page-title').textContent = `${post.title} - Joshua Freeman`;
                    document.getElementById('page-description').content = post.excerpt || '';
                    document.getElementById('og-title').content = `${post.title} - Joshua Freeman`;
                    document.getElementById('og-description').content = post.excerpt || '';
                    document.getElementById('og-url').content = `https://joshfreeman.me/blog/post.html?slug=${slug}`;

                    // Update content
                    document.getElementById('post-title').textContent = post.title;
                    document.getElementById('post-date').textContent = formatPostDate(post.created_at);
                    document.getElementById('post-date').setAttribute('datetime', post.created_at.split('T')[0]);

                    // Render markdown content
                    document.getElementById('post-content').innerHTML = marked.parse(post.content);
                } else if (response.status === 404) {
                    document.getElementById('post-title').textContent = 'Post Not Found';
                    document.getElementById('post-content').innerHTML = '<p>This post does not exist or has been removed. <a href="/blog.html">Back to blog</a></p>';
                } else {
                    throw new Error('Failed to load');
                }
            } catch (error) {
                document.getElementById('post-title').textContent = 'Error Loading Post';
                document.getElementById('post-content').innerHTML = '<p>Failed to load post content. Please try again later. <a href="/blog.html">Back to blog</a></p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadPost);

        // Check if user is admin and show edit/delete buttons
        function checkAdminActions() {
            const userStr = localStorage.getItem('comment_user');
            if (userStr) {
                const user = JSON.parse(userStr);
                if (user.is_admin) {
                    document.getElementById('admin-actions').style.display = 'inline';
                }
            }
        }

        // Edit post - opens modal with markdown editor
        function editPost() {
            const slug = getPostSlug();
            if (!slug) return;

            const token = localStorage.getItem('comment_token');
            if (!token) {
                alert('Please log in first');
                return;
            }

            // Fetch current content and show edit modal
            fetch(`${API_BASE}/admin/posts/${slug}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(post => {
                showEditModal(post);
            })
            .catch(() => alert('Failed to load post for editing'));
        }

        function showEditModal(post) {
            const modal = document.createElement('div');
            modal.id = 'edit-post-modal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                padding: 1rem;
            `;
            modal.innerHTML = `
                <div style="background: white; padding: 2rem; border-radius: 12px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto;">
                    <h3 style="margin-bottom: 1rem;">Edit Post</h3>
                    <form id="edit-post-form">
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Title</label>
                            <input type="text" id="edit-post-title" value="${post.title.replace(/"/g, '&quot;')}" style="width: 100%; padding: 0.75rem; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem;">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Excerpt</label>
                            <input type="text" id="edit-post-excerpt" value="${(post.excerpt || '').replace(/"/g, '&quot;')}" style="width: 100%; padding: 0.75rem; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem;">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Content (Markdown)</label>
                            <textarea id="edit-post-content" style="width: 100%; min-height: 300px; padding: 0.75rem; border: 1px solid #e0e0e0; border-radius: 8px; font-family: Monaco, Menlo, monospace; font-size: 0.9rem; resize: vertical;">${post.content.replace(/</g, '&lt;')}</textarea>
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="edit-post-published" ${post.is_published ? 'checked' : ''}>
                                Published
                            </label>
                        </div>
                        <div style="display: flex; gap: 1rem;">
                            <button type="submit" class="btn btn-primary" style="flex: 1;">Save</button>
                            <button type="button" onclick="closeEditModal()" class="btn" style="flex: 1; background: #e0e0e0;">Cancel</button>
                        </div>
                        <p id="edit-post-error" style="color: #e74c3c; margin-top: 1rem; display: none;"></p>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('edit-post-form').onsubmit = (e) => {
                e.preventDefault();
                savePostEdit(post.slug);
            };
        }

        function closeEditModal() {
            const modal = document.getElementById('edit-post-modal');
            if (modal) modal.remove();
        }

        async function savePostEdit(slug) {
            const token = localStorage.getItem('comment_token');
            const errorEl = document.getElementById('edit-post-error');

            const postData = {
                title: document.getElementById('edit-post-title').value,
                excerpt: document.getElementById('edit-post-excerpt').value,
                content: document.getElementById('edit-post-content').value,
                is_published: document.getElementById('edit-post-published').checked
            };

            try {
                const response = await fetch(`${API_BASE}/admin/posts/${slug}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(postData)
                });

                if (response.ok) {
                    closeEditModal();
                    loadPost(); // Reload the post content
                } else {
                    const error = await response.json();
                    errorEl.textContent = error.detail || 'Failed to save';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Failed to save post';
                errorEl.style.display = 'block';
            }
        }

        // Delete post
        async function deletePost() {
            const slug = getPostSlug();
            if (!slug) return;

            if (!confirm('Are you sure you want to delete this post? This will also delete all comments.')) return;

            const token = localStorage.getItem('comment_token');

            try {
                const response = await fetch(`${API_BASE}/admin/posts/${slug}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    window.location.href = '/blog.html';
                } else {
                    alert('Failed to delete post');
                }
            } catch (error) {
                alert('Failed to delete post');
            }
        }

        // Run after page loads
        document.addEventListener('DOMContentLoaded', checkAdminActions);

        // Reactions
        let userReacted = false;
        let userReactionId = null;
        let maxReactionDepth = 3;
        let currentUser = null;

        async function loadReactions() {
            const slug = getPostSlug();
            if (!slug) return;

            const token = localStorage.getItem('comment_token');
            const userStr = localStorage.getItem('comment_user');
            if (userStr) currentUser = JSON.parse(userStr);

            // Load top-level reaction status
            const endpoint = token ? `${API_BASE}/reactions/${slug}/me` : `${API_BASE}/reactions/${slug}`;
            try {
                const response = await fetch(endpoint, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                if (response.ok) {
                    const data = await response.json();
                    userReacted = data.user_reacted;
                    userReactionId = data.reaction_id;
                    updateReactionUI(data.count, data.user_reacted);
                }
            } catch (error) {
                console.log('Could not load reactions');
            }

            // Load reaction tree
            loadReactionTree();
        }

        async function loadReactionTree() {
            const slug = getPostSlug();
            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}/tree`);
                if (response.ok) {
                    const data = await response.json();
                    maxReactionDepth = data.max_depth;
                    renderReactionTree(data.reactions);
                }
            } catch (error) {
                console.log('Could not load reaction tree');
            }
        }

        let forestCollapsed = true; // Start collapsed by default
        let forestView = 'tree'; // 'tree' or 'graph'
        let cachedReactions = null;

        function toggleReactionForest() {
            forestCollapsed = !forestCollapsed;
            const tree = document.getElementById('forest-tree');
            const graph = document.getElementById('forest-graph');
            const icon = document.getElementById('forest-toggle-icon');
            const legend = document.getElementById('forest-legend');
            const viewToggle = document.getElementById('view-toggle');
            const subtitle = document.getElementById('forest-subtitle');

            if (forestCollapsed) {
                tree.style.display = 'none';
                graph.style.display = 'none';
                legend.style.display = 'none';
                viewToggle.style.display = 'none';
                subtitle.style.display = 'none';
            } else {
                viewToggle.style.display = 'flex';
                legend.style.display = 'flex';
                subtitle.style.display = 'block';
                if (forestView === 'tree') {
                    tree.style.display = 'block';
                    graph.style.display = 'none';
                } else {
                    tree.style.display = 'none';
                    graph.style.display = 'block';
                }
            }
            icon.textContent = forestCollapsed ? '▶' : '▼';
        }

        function setForestView(view) {
            forestView = view;
            document.getElementById('view-tree-btn').style.background = view === 'tree' ? 'white' : 'transparent';
            document.getElementById('view-graph-btn').style.background = view === 'graph' ? 'white' : 'transparent';

            if (view === 'tree') {
                document.getElementById('forest-tree').style.display = 'block';
                document.getElementById('forest-graph').style.display = 'none';
                if (cachedReactions) renderTreeView(cachedReactions);
            } else {
                document.getElementById('forest-tree').style.display = 'none';
                document.getElementById('forest-graph').style.display = 'block';
                if (cachedReactions) renderGraphView(cachedReactions);
            }
        }

        function getDistinctUsers(reaction) {
            // Get all distinct user IDs in this reaction's subtree
            const users = new Set([reaction.user_id]);
            if (reaction.children) {
                for (const child of reaction.children) {
                    const childUsers = getDistinctUsers(child);
                    childUsers.forEach(u => users.add(u));
                }
            }
            return users;
        }

        let cy = null; // Cytoscape instance

        function renderReactionTree(reactions) {
            cachedReactions = reactions;
            const token = localStorage.getItem('comment_token');

            // Calculate total distinct users
            const allUsers = new Set();
            function collectUsers(r) {
                allUsers.add(r.user_id);
                if (r.children) r.children.forEach(collectUsers);
            }
            reactions.forEach(collectUsers);
            const count = allUsers.size;
            document.getElementById('forest-count').textContent = count > 0 ? `· ${count} ${count === 1 ? 'person' : 'people'}` : '';

            // Update the top heart count with total distinct users
            document.getElementById('reaction-count').textContent = count;

            // Check if current user has any reaction in the forest
            const userHasReaction = currentUser && allUsers.has(currentUser.id);
            document.getElementById('reaction-icon').textContent = userHasReaction ? '❤️' : '🤍';
            document.getElementById('reaction-btn').style.background = userHasReaction ? 'rgba(239, 68, 68, 0.1)' : 'none';

            if (!reactions || reactions.length === 0) {
                const emptyHtml = `
                    <div class="forest-empty">
                        <div style="font-size: 3rem; margin-bottom: 0.75rem;">🌱</div>
                        <div style="font-size: 1.1rem;">No reactions yet</div>
                        <div style="margin-top: 0.5rem;">Be the first to plant a heart!</div>
                        ${token ? `<button onclick="toggleReaction()" style="margin-top: 1.25rem; padding: 0.6rem 1.25rem; background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; box-shadow: 0 2px 8px rgba(239,68,68,0.3);">❤️ Add Reaction</button>` : ''}
                    </div>
                `;
                document.getElementById('forest-tree').innerHTML = emptyHtml;
                document.getElementById('forest-graph').innerHTML = emptyHtml;
                document.getElementById('forest-legend').style.display = 'none';
                return;
            }

            // Build legend dynamically based on login status
            const legendEl = document.getElementById('forest-legend');
            const token = localStorage.getItem('comment_token');
            let legendHtml = '<span>❤️ = reaction</span>';
            if (token) {
                legendHtml += '<span>💛 = yours</span>';
            }
            legendHtml += '<span>Click to react</span>';
            if (token) {
                legendHtml += '<span>Right-click to remove</span>';
            }
            legendEl.innerHTML = legendHtml;
            // Only show legend if forest is expanded
            if (!forestCollapsed) {
                legendEl.style.display = 'flex';
            }

            // Render active view
            if (forestView === 'tree') {
                renderTreeView(reactions);
            } else {
                renderGraphView(reactions);
            }
        }

        function renderTreeView(reactions) {
            const container = document.getElementById('forest-tree');
            const token = localStorage.getItem('comment_token');

            function renderNode(r, depth = 0) {
                const indent = depth > 0 ? `<span style="color: #ddd; margin-right: 0.25rem;">${'│ '.repeat(depth - 1)}├─</span>` : '';
                const isOwn = currentUser && currentUser.id === r.user_id;
                const canReact = token && r.depth < maxReactionDepth;
                const canDelete = isOwn || (currentUser && currentUser.is_admin);

                let childrenHtml = '';
                if (r.children && r.children.length > 0) {
                    childrenHtml = r.children.map(c => renderNode(c, depth + 1)).join('');
                }

                return `
                    <div class="tree-node" style="padding: 0.35rem 0; font-size: 0.95rem; display: flex; align-items: center; gap: 0.4rem;">
                        ${indent}
                        <span style="cursor: ${canReact ? 'pointer' : 'default'};" onclick="${canReact ? `reactToReaction(${r.id})` : ''}" title="${canReact ? 'Click to react' : ''}">${isOwn ? '💛' : '❤️'}</span>
                        <span style="font-weight: 500;">${r.user_name}</span>
                        ${canDelete ? `<button onclick="removeReaction(${r.id})" style="background: none; border: none; cursor: pointer; color: #ccc; font-size: 0.8rem; padding: 0 0.25rem;" title="Remove">✕</button>` : ''}
                    </div>
                    ${childrenHtml}
                `;
            }

            container.innerHTML = reactions.map(r => renderNode(r, 0)).join('');
        }

        function renderGraphView(reactions) {
            const container = document.getElementById('forest-graph');
            const token = localStorage.getItem('comment_token');

            container.innerHTML = '';
            container.style.height = '250px';

            // Build nodes and edges for Cytoscape
            const elements = [];

            function addNodes(r, parentId = null) {
                const isOwn = currentUser && currentUser.id === r.user_id;
                elements.push({
                    data: {
                        id: 'r' + r.id,
                        label: isOwn ? '💛' : '❤️',
                        name: r.user_name,
                        reactionId: r.id,
                        depth: r.depth,
                        isOwn: isOwn
                    }
                });

                if (parentId) {
                    elements.push({
                        data: {
                            source: parentId,
                            target: 'r' + r.id
                        }
                    });
                }

                if (r.children) {
                    r.children.forEach(child => addNodes(child, 'r' + r.id));
                }
            }

            reactions.forEach(r => addNodes(r));

            // Initialize Cytoscape
            cy = cytoscape({
                container: container,
                elements: elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'font-size': '24px',
                            'width': 40,
                            'height': 40,
                            'background-color': '#fff',
                            'border-width': 0,
                            'cursor': 'pointer'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': '#e0e0e0',
                            'curve-style': 'bezier',
                            'target-arrow-shape': 'none'
                        }
                    }
                ],
                layout: {
                    name: 'breadthfirst',
                    directed: true,
                    padding: 30,
                    spacingFactor: 1.2,
                    avoidOverlap: true
                },
                userZoomingEnabled: false,
                userPanningEnabled: true,
                boxSelectionEnabled: false
            });

            // Remove old tooltip if exists
            const oldTooltip = document.getElementById('cy-tooltip');
            if (oldTooltip) oldTooltip.remove();

            // Show name on hover
            const tooltip = document.createElement('div');
            tooltip.id = 'cy-tooltip';
            tooltip.style.cssText = 'position: fixed; background: #333; color: white; padding: 6px 12px; border-radius: 6px; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); pointer-events: none; display: none; z-index: 1000;';
            document.body.appendChild(tooltip);

            cy.on('mouseover', 'node', function(e) {
                const node = e.target;
                tooltip.textContent = node.data('name');
                tooltip.style.display = 'block';
            });

            cy.on('mousemove', 'node', function(e) {
                tooltip.style.left = e.originalEvent.clientX + 15 + 'px';
                tooltip.style.top = e.originalEvent.clientY - 10 + 'px';
            });

            cy.on('mouseout', 'node', function(e) {
                tooltip.style.display = 'none';
            });

            // Click to react (not delete)
            cy.on('tap', 'node', function(e) {
                const node = e.target;
                const reactionId = node.data('reactionId');
                const depth = node.data('depth');

                if (token && depth < maxReactionDepth) {
                    reactToReaction(reactionId);
                } else if (!token) {
                    alert('Please log in to react');
                } else {
                    alert('Maximum reaction depth reached');
                }
            });

            // Right-click to delete (if own or admin)
            cy.on('cxttap', 'node', function(e) {
                const node = e.target;
                const reactionId = node.data('reactionId');
                const isOwn = node.data('isOwn');

                if (isOwn || (currentUser && currentUser.is_admin)) {
                    if (confirm(`Remove ${node.data('name')}'s reaction?`)) {
                        removeReaction(reactionId);
                    }
                }
            });

            cy.fit(30);
        }

        function updateReactionUI(count, reacted, totalDistinct = null) {
            userReacted = reacted;
            const countEl = document.getElementById('reaction-count');
            // Show total distinct users if available, otherwise top-level count
            countEl.textContent = totalDistinct !== null ? totalDistinct : count;
            document.getElementById('reaction-icon').textContent = reacted ? '❤️' : '🤍';
            document.getElementById('reaction-btn').style.background = reacted ? 'rgba(239, 68, 68, 0.1)' : 'none';
        }

        async function toggleReaction() {
            const token = localStorage.getItem('comment_token');
            if (!token) {
                alert('Please log in to react');
                return;
            }

            const slug = getPostSlug();
            // Only toggle top-level reaction - add if no top-level, remove if has top-level
            const method = userReacted ? 'DELETE' : 'POST';

            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}`, {
                    method,
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    userReacted = data.user_reacted;
                    userReactionId = data.reaction_id;
                    loadReactionTree(); // Refresh the tree (this also updates the top count)
                } else if (response.status === 401) {
                    alert('Please log in to react');
                } else if (response.status === 400) {
                    // Already reacted at top level
                    const err = await response.json();
                    console.log(err.detail);
                }
            } catch (error) {
                console.log('Could not update reaction');
            }
        }

        async function reactToReaction(parentId) {
            const token = localStorage.getItem('comment_token');
            if (!token) {
                alert('Please log in to react');
                return;
            }

            const slug = getPostSlug();
            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}/${parentId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    loadReactionTree(); // Refresh the tree
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Could not add reaction');
                }
            } catch (error) {
                console.log('Could not add reaction');
            }
        }

        async function removeReaction(reactionId) {
            const token = localStorage.getItem('comment_token');
            if (!token) return;

            if (!confirm('Remove this reaction and all nested reactions?')) return;

            const slug = getPostSlug();
            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}/${reactionId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    // Refresh everything
                    loadReactions();
                }
            } catch (error) {
                console.log('Could not remove reaction');
            }
        }

        document.addEventListener('DOMContentLoaded', loadReactions);
    </script>
</body>
</html>
