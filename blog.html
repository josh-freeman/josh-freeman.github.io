<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Joshua Freeman</title>
    <meta name="description" content="Blog posts by Joshua Freeman">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Open Graph -->
    <meta property="og:title" content="Blog - Joshua Freeman">
    <meta property="og:description" content="Blog posts">
    <meta property="og:image" content="https://joshfreeman.me/resources/big_icon.jpg">
    <meta property="og:url" content="https://joshfreeman.me/blog.html">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/blog.css">
</head>
<body>
    <div id="main">
        <!-- Sidebar -->
        <sidebar>
            <script src="sidebar.js"></script>
        </sidebar>

        <div class="blog-container">
            <h1>Blog</h1>
            <p class="blog-intro">Thoughts on AI, software, and life.</p>

            <div id="posts-list" class="posts-list">
                <p style="color: var(--text-muted);">Loading posts...</p>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="submenus.js"></script>
    <style>
        .admin-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }
        .admin-controls .btn {
            padding: 0.5rem 1rem;
            background: var(--primary-color, #2563eb);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .admin-controls .btn:hover {
            opacity: 0.9;
        }
        .post-preview {
            position: relative;
        }
        .post-edit-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.35rem 0.75rem;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: none;
            opacity: 0.8;
        }
        .post-edit-btn:hover {
            opacity: 1;
        }
        .exclusive-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            vertical-align: middle;
            margin-left: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
    <script>
        // API_BASE is already defined in sidebar.js

        function isAdminLoggedIn() {
            try {
                const user = localStorage.getItem('comment_user');
                if (user) {
                    const userData = JSON.parse(user);
                    return userData.is_admin === true;
                }
            } catch (e) {}
            return false;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadPosts() {
            const container = document.getElementById('posts-list');
            const isAdmin = isAdminLoggedIn();

            // Show admin controls if admin
            if (isAdmin) {
                const adminControls = document.createElement('div');
                adminControls.className = 'admin-controls';
                adminControls.innerHTML = '<a href="/admin.html" class="btn">New Post</a>';
                container.parentNode.insertBefore(adminControls, container);
            }

            try {
                // Include auth token if logged in (to see exclusive posts)
                const token = localStorage.getItem('comment_token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const response = await fetch(`${API_BASE}/posts`, { headers });
                if (response.ok) {
                    const posts = await response.json();
                    if (posts.length === 0) {
                        container.innerHTML = '<p style="color: var(--text-muted); font-style: italic;">No posts yet. Check back soon!</p>';
                        return;
                    }

                    container.innerHTML = posts.map(post => `
                        <article class="post-preview">
                            ${isAdmin ? `<a href="/admin.html#edit/${post.slug}" class="post-edit-btn">Edit</a>` : ''}
                            <a href="/blog/post.html?slug=${post.slug}">
                                <h2>${escapeHtml(post.title)}${post.is_exclusive ? ' <span class="exclusive-badge">Friends</span>' : ''}</h2>
                                <time datetime="${post.created_at.split('T')[0]}">${formatDate(post.created_at)}</time>
                                <p>${escapeHtml(post.excerpt || '')}</p>
                                <span class="read-more">Read more &rarr;</span>
                            </a>
                        </article>
                    `).join('');
                } else {
                    throw new Error('Failed to load');
                }
            } catch (error) {
                // Show error if API fails
                container.innerHTML = '<p style="color: var(--text-muted);">Unable to load posts. Please try again later.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadPosts);
    </script>
</body>
</html>
