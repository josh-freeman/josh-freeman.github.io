<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading... - Joshua Freeman</title>
    <meta name="description" id="page-description" content="">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Open Graph -->
    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-description" content="">
    <meta property="og:image" content="https://joshfreeman.me/resources/big_icon.jpg">
    <meta property="og:url" id="og-url" content="">
    <meta property="og:type" content="article">

    <!-- Fonts: Fraunces (display), Source Serif 4 (body), DM Sans (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/blog.css">
    <link rel="stylesheet" href="/css/components.css">

    <!-- Theme Script (before body to prevent flash) -->
    <script src="/js/theme.js"></script>

    <style>
        /* Page-specific styles */
        .forest-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--primary-color);
            font-size: 0.95rem;
            padding: 0.6rem 0;
        }

        #reaction-btn:hover .heart-icon:not(.active) {
            color: #fca5a5;
        }

        /* Write/Preview tab component (GitHub-style) */
        .md-editor-tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 0;
        }
        .md-editor-tab {
            padding: 0.4rem 0.8rem;
            border: 1px solid transparent;
            border-bottom: none;
            background: none;
            cursor: pointer;
            font-size: 0.85rem;
            color: #57606a;
            margin-bottom: -1px;
            border-radius: 6px 6px 0 0;
        }
        .md-editor-tab:hover { color: #24292f; }
        .md-editor-tab.active {
            background: #fff;
            border-color: #e0e0e0;
            color: #24292f;
            font-weight: 500;
        }
        .md-editor-content {
            border: 1px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            min-height: 250px;
        }
        .md-editor-content textarea {
            border: none;
            border-radius: 0 0 8px 8px;
            min-height: 250px;
        }
        .md-editor-content textarea:focus {
            outline: none;
            box-shadow: inset 0 0 0 1px var(--primary-color);
        }
        .md-editor-preview {
            padding: 1rem;
            background: #fafafa;
            border-radius: 0 0 8px 8px;
            min-height: 250px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }
        .md-editor-preview.active { display: block; }
    </style>

    <!-- Set initial OG title from URL slug for better previews -->
    <script>
        (function() {
            var slug = new URLSearchParams(window.location.search).get('slug');
            if (slug) {
                var title = slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                document.title = title + ' - Joshua Freeman';
                var ogTitle = document.querySelector('meta[property="og:title"]');
                if (ogTitle) ogTitle.content = title + ' - Joshua Freeman';
            }
        })();
    </script>

    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Cytoscape.js for graph visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
</head>
<body>
    <div id="main">
        <!-- Sidebar -->
        <sidebar>
            <script src="/sidebar.js"></script>
        </sidebar>

        <article class="post-container">
            <a href="/blog.html" class="back-link">Back to blog</a>

            <header class="post-header">
                <h1 id="post-title"><span class="loading-spinner"></span>Loading...</h1>
                <p class="post-meta">
                    <time id="post-date" datetime=""></time>
                    <span id="reaction-container" style="margin-left: 1rem;">
                        <button id="reaction-btn" onclick="toggleReaction()" style="background: none; border: none; cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 6px; transition: background 0.2s; display: inline-flex; align-items: center; gap: 0.3rem;" title="Add your reaction">
                            <svg id="reaction-icon" class="heart-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z"/></svg>
                            <span id="reaction-count" style="font-size: 0.9rem; color: var(--text-muted);">0</span>
                        </button>
                    </span>
                    <span id="admin-actions" style="display: none; margin-left: 1rem;">
                        <button onclick="editPost()" title="Edit post" style="background: none; border: none; cursor: pointer; padding: 0.25rem; color: var(--text-muted); transition: color 0.2s;" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='var(--text-muted)'">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
                        </button>
                        <button onclick="deletePost()" title="Delete post" style="background: none; border: none; cursor: pointer; padding: 0.25rem; color: var(--text-muted); transition: color 0.2s;" onmouseover="this.style.color='#e74c3c'" onmouseout="this.style.color='var(--text-muted)'">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </span>
                    <button id="share-btn-header" onclick="openShareModal()" class="share-btn-inline" title="Share this post">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                        Share
                    </button>
                </p>
            </header>

            <div id="post-content" class="post-content">
                <p class="loading-text"><span class="loading-spinner"></span>Loading post content...</p>
            </div>

            <!-- Share & Reaction Actions -->
            <div id="post-actions" style="margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
                <button id="share-btn-footer" onclick="openShareModal()" class="share-btn-prominent">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                    Share this post
                </button>
                <button onclick="openReactionForest()" class="forest-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M10 10v.2A3 3 0 0 1 8.9 16H5a3 3 0 0 1-1-5.8V10a3 3 0 0 1 6 0Z"/><path d="M7 16v6"/><path d="M13 19v3"/><path d="M12 19h8.3a1 1 0 0 0 .7-1.7L18 14h.3a1 1 0 0 0 .7-1.7L16 9h.2a1 1 0 0 0 .8-1.7L13 3l-1.4 1.5"/></svg>
                    View Reaction Forest <span id="forest-count" style="color: var(--text-muted);"></span>
                </button>
            </div>

            <!-- Comments Section -->
            <section class="comments-section">
                <h2>Comments</h2>
                <div id="comments-container">
                    <p class="comments-loading">Loading comments...</p>
                </div>
                <div id="comment-form-container">
                    <p class="comment-login-notice">
                        <a href="#" id="login-link">Log in</a> to leave a comment.
                    </p>
                    <p style="background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; margin-top: 0.5rem; border-left: 4px solid #f59e0b;">
                        <strong>Want to join the conversation?</strong> If we know each other, ask me for an invite (free!). Otherwise, <a href="/subscribe.html" style="color: #92400e; font-weight: 500;">subscribe</a> to help cover server costs.
                    </p>
                </div>
            </section>
        </article>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="/submenus.js"></script>

    <!-- Shared modules -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toggle-component.js"></script>
    <script src="/js/modal.js"></script>

    <script src="/comments.js" defer></script>

    <script>
        let currentPost = null;  // Store current post data for sharing

        // Create toggle manager for edit modal (var for global scope access from inline onclick)
        var editToggle = createToggleManager('toggle', 'edit-post');

        async function loadPost() {
            const slug = getPostSlug();
            if (!slug) {
                document.getElementById('post-title').textContent = 'Post Not Found';
                document.getElementById('post-content').innerHTML = '<p>No post specified. <a href="/blog.html">Back to blog</a></p>';
                return;
            }

            try {
                // Include auth token if logged in (for exclusive posts)
                const token = localStorage.getItem('comment_token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

                // Use batched endpoint to reduce API calls (post + comments + reactions in one request)
                const response = await fetch(`${API_BASE}/posts/${slug}/full`, { headers, credentials: 'include' });

                if (response.ok) {
                    const data = await response.json();
                    const post = data.post;
                    currentPost = post;  // Store for sharing

                    // Update page metadata
                    document.getElementById('page-title').textContent = `${post.title} - Joshua Freeman`;
                    document.getElementById('page-description').content = post.excerpt || '';
                    document.getElementById('og-title').content = `${post.title} - Joshua Freeman`;
                    document.getElementById('og-description').content = post.excerpt || '';
                    document.getElementById('og-url').content = `https://joshfreeman.me/blog/post.html?slug=${slug}`;

                    // Update content
                    document.getElementById('post-title').innerHTML = post.title + (post.is_friends_only ? ' <span class="exclusive-badge" title="This post is only visible to friends">Friends Only</span>' : '') + (post.is_unlisted ? ' <span class="unlisted-badge" title="Unlisted - not shown in blog listing">Unlisted</span>' : '');
                    document.getElementById('post-date').textContent = formatDate(post.created_at);
                    document.getElementById('post-date').setAttribute('datetime', post.created_at.split('T')[0]);

                    // Render markdown content
                    document.getElementById('post-content').innerHTML = marked.parse(post.content);

                    // Style blockquotes based on content
                    styleBlockquotes();

                    // Initialize comments with pre-loaded data (prevents extra API call)
                    window.PRELOADED_COMMENTS = data.comments;

                    // Initialize reactions with pre-loaded data
                    initReactionsWithData(data.reactions);

                    // Record view (fire and forget)
                    fetch(`${API_BASE}/posts/${slug}/view`, {
                        method: 'POST',
                        headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                        credentials: 'include'
                    }).catch(() => {});
                } else if (response.status === 401 || response.status === 404) {
                    // Show same message for 401 (exclusive) and 404 (not found) to avoid leaking info
                    document.getElementById('post-title').textContent = 'Post Not Found';
                    document.getElementById('post-content').innerHTML = `
                        <p>This post does not exist or has been removed. <a href="/blog.html">Back to blog</a></p>
                        ${response.status === 401 && !localStorage.getItem('comment_token') ? '<p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 1.5rem;">Think this post should exist? Try <a href="#" onclick="showLogin(); return false;">logging in</a>, or ask me (Josh :) for an invite if you don\'t have an account.</p>' : ''}
                    `;
                    // Hide reactions and comments
                    document.getElementById('reaction-container').style.display = 'none';
                    document.getElementById('forest-link').style.display = 'none';
                    document.querySelector('.comments-section').style.display = 'none';
                } else {
                    throw new Error('Failed to load');
                }
            } catch (error) {
                document.getElementById('post-title').textContent = 'Error Loading Post';
                document.getElementById('post-content').innerHTML = '<p>Failed to load post content. Please try again later. <a href="/blog.html">Back to blog</a></p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadPost);

        // Style blockquotes based on content (note, warning, tip)
        function styleBlockquotes() {
            const blockquotes = document.querySelectorAll('.post-content blockquote');
            blockquotes.forEach(bq => {
                const text = bq.textContent.toLowerCase().trim();
                // Check start of text for keywords (with flexible spacing/punctuation)
                if (text.includes('⚠️') || /^warning\b/i.test(text) || text.includes('/!\\')) {
                    bq.classList.add('warning');
                } else if (text.includes('💡') || /^tip\b/i.test(text)) {
                    bq.classList.add('tip');
                } else if (text.includes('ℹ️') || /^note\b/i.test(text)) {
                    bq.classList.add('note');
                }
            });
        }

        // Check if user is admin and show edit/delete buttons
        function checkAdminActions() {
            const userStr = localStorage.getItem('comment_user');
            if (userStr) {
                const user = JSON.parse(userStr);
                if (user.is_admin) {
                    document.getElementById('admin-actions').style.display = 'inline';
                }
            }
        }

        // Check if user can generate 24h access links for this post
        function canGenerateTempLink() {
            if (!currentPost || !currentPost.is_friends_only) return false;

            const userStr = localStorage.getItem('comment_user');
            const token = localStorage.getItem('comment_token');
            if (!userStr || !token) return false;

            const user = JSON.parse(userStr);
            const isMentioned = currentPost.content.toLowerCase().includes(user.name.toLowerCase());
            return user.is_admin || isMentioned;
        }

        // Open the share modal - works for all posts
        function openShareModal() {
            if (!currentPost) return;

            const postUrl = window.location.href;
            const isExclusive = currentPost.is_friends_only;
            const canGenerate = canGenerateTempLink();

            const modal = document.createElement('div');
            modal.id = 'share-modal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                padding: 1rem;
            `;

            let content = '';

            if (!isExclusive) {
                // PUBLIC POST - simple share
                content = `
                    <div style="background: white; padding: 1.75rem; border-radius: 12px; max-width: 440px; width: 100%;">
                        <h3 style="margin: 0 0 1rem; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                            Share this post
                        </h3>
                        <div style="position: relative;">
                            <input type="text" id="share-url-main" value="${postUrl}" readonly
                                style="width: 100%; padding: 0.7rem 0.9rem; padding-right: 70px; border: 1px solid var(--border-default, rgba(255, 255, 255, 0.1)); border-radius: 8px; font-size: 0.85rem; background: var(--bg-secondary, #151418); color: var(--text-primary, #f5f2ed);"
                                onclick="this.select()">
                            <button onclick="copyUrl('share-url-main', this)" style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%); padding: 0.4rem 0.7rem; background: var(--accent-primary, #e5a54b); color: var(--bg-primary, #0c0b0d); border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 500;">Copy</button>
                        </div>
                        <button onclick="closeShareModal()" style="width: 100%; margin-top: 1rem; padding: 0.6rem; background: var(--bg-tertiary, #1e1c21); color: var(--text-primary, #f5f2ed); border: 1px solid var(--border-default, rgba(255, 255, 255, 0.1)); border-radius: 8px; cursor: pointer; font-size: 0.9rem;">Done</button>
                    </div>
                `;
            } else {
                // FRIENDS-ONLY POST
                content = `
                    <div style="background: var(--bg-elevated, #262329); color: var(--text-primary, #f5f2ed); padding: 1.75rem; border-radius: 12px; max-width: 440px; width: 100%; border: 1px solid var(--border-default, rgba(255, 255, 255, 0.1));">
                        <h3 style="margin: 0 0 0.75rem; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text-primary, #f5f2ed);">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                            Share this post
                        </h3>

                        <div style="background: var(--bg-tertiary, #1e1c21); border-left: 3px solid var(--warning, #e5a54b); padding: 0.6rem 0.8rem; border-radius: 0 6px 6px 0; margin-bottom: 1rem;">
                            <p style="margin: 0; font-size: 0.85rem; color: var(--text-secondary, #c4bfb6);">
                                <strong style="color: var(--text-accent, #e8c574);">Friends-only post</strong> — this link only works for people with blog access.
                            </p>
                        </div>

                        <div style="margin-bottom: 1rem;">
                            <label style="font-size: 0.8rem; color: var(--text-muted, #8a857c); display: block; margin-bottom: 0.3rem;">Link for members</label>
                            <div style="position: relative;">
                                <input type="text" id="share-url-main" value="${postUrl}" readonly
                                    style="width: 100%; padding: 0.6rem 0.8rem; padding-right: 65px; border: 1px solid var(--border-default, rgba(255, 255, 255, 0.1)); border-radius: 8px; font-size: 0.8rem; background: var(--bg-secondary, #151418); color: var(--text-primary, #f5f2ed);"
                                    onclick="this.select()">
                                <button onclick="copyUrl('share-url-main', this)" style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%); padding: 0.35rem 0.6rem; background: var(--text-muted, #8a857c); color: var(--bg-primary, #0c0b0d); border: none; border-radius: 5px; font-size: 0.75rem; cursor: pointer;">Copy</button>
                            </div>
                        </div>

                        ${canGenerate ? `
                        <div style="border-top: 1px solid var(--border-default, rgba(255, 255, 255, 0.1)); padding-top: 1rem; margin-top: 0.5rem;">
                            <div style="background: var(--accent-primary-glow, rgba(229, 165, 75, 0.15)); border-left: 3px solid var(--accent-primary, #e5a54b); padding: 0.7rem 0.9rem; border-radius: 0 8px 8px 0; margin-bottom: 0.75rem;">
                                <p style="margin: 0; font-size: 0.85rem; color: var(--text-secondary, #c4bfb6);">
                                    <strong style="color: var(--text-accent, #e8c574);">You can share with anyone!</strong><br>
                                    <span style="font-size: 0.8rem; opacity: 0.9;">Generate a 24-hour access link that works without login.</span>
                                </p>
                            </div>
                            <div id="temp-link-section">
                                <button onclick="generateTempLink()" id="generate-temp-btn" style="width: 100%; padding: 0.65rem; background: linear-gradient(135deg, var(--accent-primary, #e5a54b), var(--accent-primary-dim, #c48a3a)); color: var(--bg-primary, #0c0b0d); border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500;">
                                    Generate 24-hour link
                                </button>
                            </div>
                        </div>
                        ` : ''}

                        <button onclick="closeShareModal()" style="width: 100%; margin-top: 1rem; padding: 0.6rem; background: var(--bg-tertiary, #1e1c21); color: var(--text-primary, #f5f2ed); border: 1px solid var(--border-default, rgba(255, 255, 255, 0.1)); border-radius: 8px; cursor: pointer; font-size: 0.9rem;">Done</button>
                    </div>
                `;
            }

            modal.innerHTML = content;
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeShareModal();
            });
        }

        // Generate temporary 24h access link (with loading guard)
        async function generateTempLink() {
            const guard = typeof loadingGuards !== 'undefined' ? loadingGuards.shareLink : { start: () => true, end: () => {} };
            if (!guard.start()) return;

            const btn = document.getElementById('generate-temp-btn');
            const section = document.getElementById('temp-link-section');
            const token = localStorage.getItem('comment_token');
            const slug = getPostSlug();

            btn.disabled = true;
            btn.textContent = 'Generating...';

            try {
                const response = await fetch(`${API_BASE}/posts/${slug}/share`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    section.innerHTML = `
                        <label style="font-size: 0.8rem; color: var(--text-muted, #8a857c); display: block; margin-bottom: 0.3rem;">24-hour access link</label>
                        <div style="position: relative; margin-bottom: 0.5rem;">
                            <input type="text" id="share-url-temp" value="${data.share_url}" readonly
                                style="width: 100%; padding: 0.6rem 0.8rem; padding-right: 65px; border: 1px solid var(--accent-primary, #e5a54b); border-radius: 8px; font-size: 0.8rem; background: var(--bg-secondary, #151418); color: var(--text-primary, #f5f2ed);"
                                onclick="this.select()">
                            <button onclick="copyUrl('share-url-temp', this)" style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%); padding: 0.35rem 0.6rem; background: var(--accent-primary, #e5a54b); color: var(--bg-primary, #0c0b0d); border: none; border-radius: 5px; font-size: 0.75rem; cursor: pointer; font-weight: 500;">Copy</button>
                        </div>
                        <p style="margin: 0; font-size: 0.75rem; color: var(--text-muted, #8a857c);">
                            Expires ${new Date(data.expires_at).toLocaleString()}
                        </p>
                    `;
                } else {
                    const error = await response.json();
                    btn.disabled = false;
                    btn.textContent = 'Generate 24-hour link';
                    alert(error.detail || 'Failed to generate link');
                }
            } catch (error) {
                btn.disabled = false;

                return;

            // Fetch current content and show edit modal
            fetch(`${API_BASE}/admin/posts/${slug}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(post => {
                showEditModal(post);
            })
            .catch(() => alert('Failed to load post for editing'));
        }

                    confirmCloseEditModal();

            // CRITICAL: Attach event listeners FIRST, before anything that might fail
            // Use event delegation on the modal
            modal.addEventListener('click', function(e) {
                const target = e.target;

                // Click on backdrop (the modal overlay itself, not content)
                if (target === modal) {
                    closeEditModal();
                    return;
                }

                // X close button
                if (target.closest('.edit-modal-close-x')) {
                    closeEditModal();
                    return;
                }

                // Cancel button
                if (target.closest('.edit-modal-cancel-btn')) {
                    closeEditModal();
                    return;
                }

                // Toggle buttons
                if (target.closest('#toggle-published')) {
                    try { editToggle.toggle('published'); } catch(err) { console.error(err); }
                    return;
                }
                if (target.closest('#toggle-friends_only')) {
                    try { editToggle.toggle('friends_only'); } catch(err) { console.error(err); }
                    return;
                }
                if (target.closest('#toggle-unlisted')) {
                    try { editToggle.toggle('unlisted'); } catch(err) { console.error(err); }
                    return;
                }

                // Notify button
                if (target.closest('#edit-notify-btn')) {
                    openNotifyFromEdit();
                    return;
                }
            });

                document.getElementById('edit-post-title').value = post.title;

                    excerpt: post.excerpt || '',
                    content: post.content || ''
                };

                // Set toggle states

                editToggle.set('friends_only', post.is_friends_only || false);
                editToggle.set('unlisted', post.is_unlisted || false);
            } catch (err) {
                console.error('Error setting up edit modal:', err);
            }

        function updateEditModalStats(stats, isPublished) {

                    <strong>${stats.unnotified_not_viewed_count}</strong> to notify

        function closeNotifyModalEdit() {

        function toggleNotifyCheckbox(label, userId) {
            const input = label.querySelector('input[type="checkbox"]');
            const unchecked = label.querySelector('.unchecked');
            const checked = label.querySelector('.checked');
            if (input) {
                input.checked = !input.checked;
                if (unchecked && checked) {
                    unchecked.style.display = input.checked ? 'none' : '';
                    checked.style.display = input.checked ? '' : 'none';
                }
            }
            updateNotifyCountEdit();
        }

        function updateNotifyCheckboxVisuals() {
            const checkboxes = document.querySelectorAll('input[name="notify-user-edit"]');
            checkboxes.forEach(cb => {
                const label = cb.closest('label');
                if (label) {
                    const unchecked = label.querySelector('.unchecked');
                    const checked = label.querySelector('.checked');
                    if (unchecked && checked) {
                        unchecked.style.display = cb.checked ? 'none' : '';
                        checked.style.display = cb.checked ? '' : 'none';
                    }
                }
            });
        }

        function selectAllNotifyEdit(select) {
            const checkboxes = document.querySelectorAll('input[name="notify-user-edit"]');
            checkboxes.forEach(cb => cb.checked = select);
            updateNotifyCheckboxVisuals();
            updateNotifyCountEdit();

        function selectUnnotifiedEdit() {
            const checkboxes = document.querySelectorAll('input[name="notify-user-edit"]');
            checkboxes.forEach(cb => {
                const label = cb.closest('label');
                const hasViewed = label.innerHTML.includes('>viewed<');
                const hasNotified = label.innerHTML.includes('>notified<');
                cb.checked = !hasViewed && !hasNotified;
            });
            updateNotifyCheckboxVisuals();
            updateNotifyCountEdit();
        }

        function updateNotifyCountEdit() {
            const checkboxes = document.querySelectorAll('input[name="notify-user-edit"]:checked');
            const countEl = document.getElementById('notify-count-num');
            if (countEl) {
                countEl.textContent = checkboxes.length;
            }
        }

        function confirmAndSendNotifyEdit() {
            const checkboxes = document.querySelectorAll('input[name="notify-user-edit"]:checked');
            const userIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
            if (userIds.length === 0) {
                alert('No users selected');
                return;
            }
            const userNames = Array.from(checkboxes).map(cb => {
                const label = cb.closest('label');
                return label.querySelector('span').textContent.trim();
            });
            const nameList = userNames.length <= 5
                ? userNames.join(', ')
                : userNames.slice(0, 5).join(', ') + ` and ${userNames.length - 5} more`;

            if (confirm(`Send notification email to ${userIds.length} user${userIds.length !== 1 ? 's' : ''}?\n\n${nameList}`)) {
                sendNotifyEdit('selected', userIds);
            }
        }

        function sendSelectedNotifyEdit() {
            const checkboxes = document.querySelectorAll('input[name="notify-user-edit"]:checked');
            const userIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
            if (userIds.length === 0) {
                alert('No users selected');
                return;
            }
            sendNotifyEdit('selected', userIds);
        }

        async function sendNotifyEdit(mode, userIds) {
            const guard = typeof loadingGuards !== 'undefined' ? loadingGuards.notify : { start: () => true, end: () => {} };
            if (!guard.start()) return;

            const token = localStorage.getItem('comment_token');
            const slug = getPostSlug();

            try {
                const response = await fetch(`${API_BASE}/admin/posts/${slug}/notify`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ mode, user_ids: userIds })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.sent > 0) {
                        alert(`Notified ${data.sent} user${data.sent !== 1 ? 's' : ''}`);
                    } else if (data.status === 'no_users') {
                        alert('No users to notify');
                    } else {
                        alert('Failed to send notifications');
                    }
                    closeNotifyModalEdit();
                    // Refresh stats
                    const statsRes = await fetch(`${API_BASE}/admin/posts/${slug}/stats`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (statsRes.ok) {
                        editPostStats = await statsRes.json();
                        updateEditModalStats(editPostStats, true);
                    }
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Failed to send notifications');
                }
            } catch (error) {
                alert('Failed to send notifications');
            } finally {
                guard.end();
            }
        }

        // Write/Preview tab switching for edit modal
        function showEditTab(tab) {
            const tabs = document.querySelectorAll('.md-editor-tab');
            const textarea = document.getElementById('edit-post-content');
            const preview = document.getElementById('edit-preview-content');

            if (!tabs.length || !textarea || !preview) return;

            tabs.forEach((t, i) => {
                const isActive = (tab === 'write' && i === 0) || (tab === 'preview' && i === 1);
                t.classList.toggle('active', isActive);
                // Update active tab styling
                t.style.background = isActive ? 'var(--accent-primary, #e5a54b)' : 'var(--bg-tertiary, #1e1c21)';
                t.style.color = isActive ? 'var(--bg-primary, #0c0b0d)' : 'var(--text-primary, #f5f2ed)';
            });

            if (tab === 'write') {
                textarea.style.display = 'block';
                preview.style.display = 'none';
            } else {
                textarea.style.display = 'none';
                preview.style.display = 'block';
                // Render markdown preview
                const content = textarea.value;
                preview.innerHTML = marked.parse(content);

        // Global save handler for edit modal (called via onclick)
        function handleEditSave() {
            const slug = getPostSlug();
            if (!slug) return;

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Saving...';

            const token = localStorage.getItem('comment_token');

            // Get values directly from form
            const postData = {
                title: document.getElementById('edit-post-title')?.value || '',
                excerpt: document.getElementById('edit-post-excerpt')?.value || '',
                content: document.getElementById('edit-post-content')?.value || '',
                is_published: document.getElementById('edit-post-published')?.value === 'true',
                is_friends_only: document.getElementById('edit-post-friends_only')?.value === 'true',
                is_unlisted: document.getElementById('edit-post-unlisted')?.value === 'true'
            };

            // Send save request
            fetch(`${API_BASE}/admin/posts/${slug}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(postData)
            }).catch(() => {});

            // Close modal and reload after brief delay
            setTimeout(function() {
                document.getElementById('edit-post-modal')?.remove();
                loadPost();
            }, 300);

        function closeEditModal() {
            console.log('closeEditModal called');
            // Try multiple approaches to find and remove the modal
            try {
                const modal = document.getElementById('edit-post-modal');
                if (modal) {
                    modal.remove();
                    console.log('Modal removed via getElementById');
                    return;
                }
            } catch (e) { console.error('getElementById failed:', e); }

            try {
                const modalAlt = document.querySelector('#edit-post-modal');
                if (modalAlt) {
                    modalAlt.remove();
                    console.log('Modal removed via querySelector');
                    return;
                }
            } catch (e) { console.error('querySelector failed:', e); }

            // Nuclear option: remove any fixed overlay with z-index 1000
            try {
                document.querySelectorAll('div').forEach(el => {
                    const style = window.getComputedStyle(el);
                    if (style.position === 'fixed' && style.zIndex === '1000' && style.background.includes('rgba')) {
                        el.remove();
                        console.log('Modal removed via style matching');
                    }
                });
            } catch (e) { console.error('Fallback removal failed:', e); }
        }

        async function savePostEdit(slug) {
            const token = localStorage.getItem('comment_token');
            const saveBtn = document.querySelector('#edit-post-form button[type="submit"]');

            // Disable button and show saving state
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';

            try {
                // Get toggle values with fallbacks
                let isPublished = false, isFriendsOnly = false, isUnlisted = false;
                try {
                    isPublished = editToggle.get('published');
                    isFriendsOnly = editToggle.get('friends_only');
                    isUnlisted = editToggle.get('unlisted');

                    // Fallback: read from hidden inputs directly

                    is_published: isPublished,
                    is_friends_only: isFriendsOnly,

                };

                fetch(`${API_BASE}/admin/posts/${slug}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(postData)
                }).catch(() => {});
            } catch (err) {

            const slug = getPostSlug();
            if (!slug) return;

            if (!confirm('Are you sure you want to delete this post? This will also delete all comments.')) return;

            const token = localStorage.getItem('comment_token');

        // Run after page loads

        // Initialize reactions with pre-loaded data from batched endpoint
        function initReactionsWithData(reactionsData) {
            reactionsPreloaded = true;
            const userStr = localStorage.getItem('comment_user');
            if (userStr) currentUser = JSON.parse(userStr);

            userReacted = reactionsData.user_reacted;
            userReactionId = reactionsData.reaction_id;

        async function loadReactions() {
            // Skip if already loaded via batched endpoint
            if (reactionsPreloaded) return;

            const slug = getPostSlug();
            if (!slug) return;

            const token = localStorage.getItem('comment_token');
            const userStr = localStorage.getItem('comment_user');
            if (userStr) currentUser = JSON.parse(userStr);

            // Load top-level reaction status
            const endpoint = token ? `${API_BASE}/reactions/${slug}/me` : `${API_BASE}/reactions/${slug}`;
            try {
                const response = await fetch(endpoint, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                    credentials: 'include'
                });
                if (response.ok) {
                    const data = await response.json();
                    userReacted = data.user_reacted;
                    userReactionId = data.reaction_id;
                    updateReactionUI(data.count, data.user_reacted);
                }
            } catch (error) {
                console.log('Could not load reactions');
            }

            // Load reaction tree
            loadReactionTree();
        }

        async function loadReactionTree() {
            const slug = getPostSlug();
            const token = localStorage.getItem('comment_token');
            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}/tree`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                    credentials: 'include'
                });
                if (response.ok) {
                    const data = await response.json();
                    maxReactionDepth = data.max_depth;
                    renderReactionTree(data.reactions);
                }
            } catch (error) {
                console.log('Could not load reaction tree');
            }
        }

        let forestView = 'tree'; // 'tree' or 'graph'

        function getDistinctUsers(reaction) {
            // Get all distinct user IDs in this reaction's subtree
            const users = new Set([reaction.user_id]);
            if (reaction.children) {
                for (const child of reaction.children) {
                    const childUsers = getDistinctUsers(child);
                    childUsers.forEach(u => users.add(u));
                }
            }
            return users;
        }

        let cy = null; // Cytoscape instance

        function renderReactionTree(reactions) {
            cachedReactions = reactions;
            const token = localStorage.getItem('comment_token');

            // Calculate total distinct users
            const allUsers = new Set();
            function collectUsers(r) {
                allUsers.add(r.user_id);
                if (r.children) r.children.forEach(collectUsers);
            }
            reactions.forEach(collectUsers);
            const count = allUsers.size;

            // Update forest link count
            const forestCountEl = document.getElementById('forest-count');
            if (forestCountEl) {
                forestCountEl.textContent = count > 0 ? `(${count} ${count === 1 ? 'person' : 'people'})` : '';
            }

            // Update the top heart count with total distinct users
            document.getElementById('reaction-count').textContent = count;

            // Check if current user has any reaction in the forest
            const userHasReaction = currentUser && allUsers.has(currentUser.id);
            const iconEl = document.getElementById('reaction-icon');
            if (userHasReaction) {
                iconEl.classList.add('active');
            } else {
                iconEl.classList.remove('active');
            }
            document.getElementById('reaction-btn').style.background = userHasReaction ? 'rgba(239, 68, 68, 0.1)' : 'none';

            // If modal is open, render into it
            const modalTree = document.getElementById('forest-tree');
            const modalGraph = document.getElementById('forest-graph');

            if (!reactions || reactions.length === 0) {
                const emptyHtml = `
                    <div style="text-align: center; padding: 2rem; color: var(--text-muted);">
                        <div style="margin-bottom: 0.75rem;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V12"/><path d="M12 12C12 12 8 9 8 6c0-2.2 1.8-4 4-4s4 1.8 4 4c0 3-4 6-4 6z"/><path d="M12 12c0 0-4-1-6-3"/><path d="M12 12c0 0 4-1 6-3"/></svg></div>
                        <div style="font-size: 1.1rem;">No reactions yet</div>
                        <div style="margin-top: 0.5rem;">Be the first to plant a heart!</div>
                        ${token ? `<button onclick="toggleReaction(); closeForestModal();" style="margin-top: 1.25rem; padding: 0.6rem 1.25rem; background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; box-shadow: 0 2px 8px rgba(239,68,68,0.3); display: inline-flex; align-items: center; gap: 0.5rem;"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z"/></svg> Add Reaction</button>` : ''}
                    </div>
                `;
                if (modalTree) modalTree.innerHTML = emptyHtml;
                if (modalGraph) modalGraph.innerHTML = emptyHtml;
                return;
            }

            // Render active view if modal is open
            if (modalTree || modalGraph) {
                if (forestView === 'tree') {
                    renderTreeView(reactions);
                } else {
                    renderGraphView(reactions);
                }
            }
        }

        function renderTreeView(reactions) {
            const container = document.getElementById('forest-tree');
            const token = localStorage.getItem('comment_token');

            function renderNode(r, depth = 0) {
                const indent = depth > 0 ? `<span style="color: #ddd; margin-right: 0.25rem;">${'│ '.repeat(depth - 1)}├─</span>` : '';
                const isOwn = currentUser && currentUser.id === r.user_id;
                const canReact = token && r.depth < maxReactionDepth;
                const canDelete = isOwn || (currentUser && currentUser.is_admin);

                let childrenHtml = '';
                if (r.children && r.children.length > 0) {
                    childrenHtml = r.children.map(c => renderNode(c, depth + 1)).join('');
                }

                const heartColor = '#ef4444';
                const heartSvg = `<svg width="18" height="18" viewBox="0 0 24 24" fill="${heartColor}" stroke="none" style="cursor: ${canReact ? 'pointer' : 'default'}; vertical-align: middle;" onclick="${canReact ? `reactToReaction(${r.id})` : ''}" title="${canReact ? 'Click to react' : ''}"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z"/></svg>`;

                return `
                    <div class="tree-node" style="padding: 0.35rem 0; font-size: 0.95rem; display: flex; align-items: center; gap: 0.4rem;">
                        ${indent}
                        ${heartSvg}
                        <a href="/profile.html?id=${r.user_id}" style="font-weight: 500; color: inherit; text-decoration: none;" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='inherit'">${r.user_name}</a>
                        ${canDelete ? `<button onclick="removeReaction(${r.id})" style="background: none; border: none; cursor: pointer; color: #ccc; font-size: 0.8rem; padding: 0 0.25rem;" title="Remove">✕</button>` : ''}
                    </div>
                    ${childrenHtml}
                `;
            }

            container.innerHTML = reactions.map(r => renderNode(r, 0)).join('');
        }

        function renderGraphView(reactions) {
            const container = document.getElementById('forest-graph');
            const token = localStorage.getItem('comment_token');

            container.innerHTML = '';
            container.style.height = '350px';

            // SVG heart with initial badge as data URL for Cytoscape nodes
            function makeHeartWithInitial(name) {
                const initial = name ? name.charAt(0).toUpperCase() : '?';
                // Heart fills most of viewBox, small avatar badge at top-left corner
                const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z" fill="#ef4444"/><circle cx="5" cy="5" r="4.5" fill="#e5a54b"/><text x="5" y="6.5" text-anchor="middle" fill="#0c0b0d" font-size="6" font-weight="600">' + initial + '</text></svg>';
                return 'data:image/svg+xml,' + encodeURIComponent(svg);
            }

            // Build nodes and edges for Cytoscape
            const elements = [];

            function addNodes(r, parentId = null) {
                const isOwn = currentUser && currentUser.id === r.user_id;
                elements.push({
                    data: {
                        id: 'r' + r.id,
                        heartImg: makeHeartWithInitial(r.user_name),
                        name: r.user_name,
                        reactionId: r.id,
                        depth: r.depth,
                        isOwn: isOwn
                    }
                });

                if (parentId) {
                    elements.push({
                        data: {
                            source: parentId,
                            target: 'r' + r.id
                        }
                    });
                }

                if (r.children) {
                    r.children.forEach(child => addNodes(child, 'r' + r.id));
                }
            }

            reactions.forEach(r => addNodes(r));

            // Initialize Cytoscape
            cy = cytoscape({
                container: container,
                elements: elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'width': 85,
                            'height': 85,
                            'background-opacity': 0,
                            'background-image': 'data(heartImg)',
                            'background-fit': 'contain',
                            'background-width': '100%',
                            'background-height': '100%',
                            'border-width': 0,
                            'cursor': 'pointer'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': '#d1d5db',
                            'curve-style': 'straight',
                            'target-arrow-shape': 'none',
                            'source-endpoint': 'outside-to-node',
                            'target-endpoint': 'outside-to-node'
                        }
                    }
                ],
                layout: {
                    name: 'breadthfirst',
                    directed: true,
                    padding: 20,
                    spacingFactor: 1.4,
                    avoidOverlap: true
                },
                userZoomingEnabled: false,
                userPanningEnabled: true,
                boxSelectionEnabled: false
            });

            // Remove old tooltip if exists
            const oldTooltip = document.getElementById('cy-tooltip');
            if (oldTooltip) oldTooltip.remove();

            // Show name on hover
            const tooltip = document.createElement('div');
            tooltip.id = 'cy-tooltip';
            tooltip.style.cssText = 'position: fixed; background: #333; color: white; padding: 6px 12px; border-radius: 6px; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); pointer-events: none; display: none; z-index: 1000;';
            document.body.appendChild(tooltip);

            cy.on('mouseover', 'node', function(e) {
                const node = e.target;
                tooltip.textContent = node.data('name');
                tooltip.style.display = 'block';
            });

            cy.on('mousemove', 'node', function(e) {
                tooltip.style.left = e.originalEvent.clientX + 15 + 'px';
                tooltip.style.top = e.originalEvent.clientY - 10 + 'px';
            });

            cy.on('mouseout', 'node', function(e) {
                tooltip.style.display = 'none';
            });

            // Click to react (not delete)
            cy.on('tap', 'node', function(e) {
                const node = e.target;
                const reactionId = node.data('reactionId');
                const depth = node.data('depth');

                if (token && depth < maxReactionDepth) {
                    reactToReaction(reactionId);
                } else if (!token) {
                    showFriendsOnlyModal('react');
                } else {
                    alert('Maximum reaction depth reached');
                }
            });

            // Right-click to delete (if own or admin)
            cy.on('cxttap', 'node', function(e) {
                const node = e.target;
                const reactionId = node.data('reactionId');
                const isOwn = node.data('isOwn');

                if (isOwn || (currentUser && currentUser.is_admin)) {
                    if (confirm(`Remove ${node.data('name')}'s reaction?`)) {
                        removeReaction(reactionId);
                    }
                }
            });

            cy.fit(30);
        }

        function updateReactionUI(count, reacted, totalDistinct = null) {
            userReacted = reacted;
            // Note: Icon state is set by renderReactionTree() based on whether
            // user has ANY reaction in the forest, not just top-level.
            // This function only updates the count display.
            // totalDistinct is no longer used here - count comes from renderReactionTree.
        }

        async function toggleReaction() {
            const guard = typeof loadingGuards !== 'undefined' ? loadingGuards.reaction : { start: () => true, end: () => {} };
            if (!guard.start()) return;

            const token = localStorage.getItem('comment_token');
            if (!token) {
                showFriendsOnlyModal('react');
                guard.end();
                return;
            }

            const slug = getPostSlug();
            // Only toggle top-level reaction - add if no top-level, remove if has top-level
            const method = userReacted ? 'DELETE' : 'POST';

            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}`, {
                    method,
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    userReacted = data.user_reacted;
                    userReactionId = data.reaction_id;
                    loadReactionTree(); // Refresh the tree (this also updates the top count)
                } else if (response.status === 401) {
                    showFriendsOnlyModal('react');
                } else if (response.status === 400) {
                    // Already reacted at top level
                    const err = await response.json();
                    console.log(err.detail);
                }
            } catch (error) {
                console.log('Could not update reaction');
            } finally {
                guard.end();
            }
        }

        async function reactToReaction(parentId) {
            const guard = typeof getOrCreateGuard === 'function'
                ? getOrCreateGuard(loadingGuards?.reactionNested || {}, parentId)
                : { start: () => true, end: () => {} };
            if (!guard.start()) return;

            const token = localStorage.getItem('comment_token');
            if (!token) {
                showFriendsOnlyModal('react');
                guard.end();
                return;
            }

            const slug = getPostSlug();
            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}/${parentId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    loadReactionTree(); // Refresh the tree
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Could not add reaction');
                }
            } catch (error) {
                console.log('Could not add reaction');
            } finally {
                guard.end();
            }
        }

        async function removeReaction(reactionId) {
            const token = localStorage.getItem('comment_token');
            if (!token) return;

            if (!confirm('Remove this reaction and all nested reactions?')) return;

            const guard = typeof getOrCreateGuard === 'function'
                ? getOrCreateGuard(loadingGuards?.reactionNested || {}, 'del-' + reactionId)
                : { start: () => true, end: () => {} };
            if (!guard.start()) return;

            const slug = getPostSlug();
            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}/${reactionId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    // Refresh everything
                    loadReactions();
                }
            } catch (error) {
                console.log('Could not remove reaction');
            } finally {
                guard.end();
            }
        }

        document.addEventListener('DOMContentLoaded', loadReactions);
    </script>
</body>
</html>
