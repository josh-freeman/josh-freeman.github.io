<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Joshua Freeman</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/blog.css">

    <!-- Marked.js for markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .admin-header h1 {
            margin: 0;
        }

        .login-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: #fafafa;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .login-container h2 {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group textarea {
            min-height: 300px;
            resize: vertical;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .post-item-info h3 {
            margin: 0 0 0.25rem 0;
            font-size: 1.1rem;
        }

        .post-item-info .meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .post-item-actions {
            display: flex;
            gap: 0.75rem;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-draft {
            background: #ffeeba;
            color: #856404;
        }

        .badge-published {
            background: #c3e6cb;
            color: #155724;
        }

        .badge-exclusive {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .preview-container {
            padding: 1rem 1.5rem;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            max-height: 500px;
            overflow-y: auto;
        }

        .preview-container h2 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--text-muted);
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        #preview-content ol,
        #preview-content ul {
            padding-left: 2rem;
            margin: 1rem 0;
        }

        #preview-content li {
            margin-bottom: 0.5rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .error-message {
            color: #e74c3c;
            margin-top: 1rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input {
            width: auto;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }

            .post-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }

        /* Blockquote styles for preview */
        #preview-content blockquote {
            margin: 1rem 0;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border-left: 4px solid #6b7280;
            background: #f9fafb;
            color: #374151;
            font-size: 0.95rem;
        }
        #preview-content blockquote p { margin: 0; }
        #preview-content blockquote.note {
            border-left-color: #3b82f6;
            background: #eff6ff;
            color: #1e40af;
        }
        #preview-content blockquote.warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
            color: #92400e;
        }
        #preview-content blockquote.tip {
            border-left-color: #10b981;
            background: #ecfdf5;
            color: #065f46;
        }
    </style>
</head>
<body>
    <div id="main" style="margin-left: 0;">
        <div class="admin-container">
            <!-- Login Section -->
            <div id="login-section" class="login-container">
                <h2>Admin Login</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
                    <p id="login-error" class="error-message" style="display: none;"></p>
                </form>
            </div>

            <!-- Admin Panel -->
            <div id="admin-panel" style="display: none;">
                <div class="admin-header">
                    <h1>Blog Admin</h1>
                    <div>
                        <span id="user-name" style="margin-right: 1rem;"></span>
                        <button class="btn" onclick="logout()">Logout</button>
                    </div>
                </div>

                <!-- Tab Navigation -->
                <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; padding-bottom: 1rem;">
                    <button class="btn" id="tab-posts" onclick="showTab('posts')" style="font-weight: 600;">Posts</button>
                    <button class="btn" id="tab-invites" onclick="showTab('invites')">Invites</button>
                    <button class="btn" id="tab-users" onclick="showTab('users')">Users</button>
                </div>

                <!-- Post List View -->
                <div id="post-list-view">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 style="margin: 0;">Posts</h2>
                        <button class="btn btn-primary" onclick="showEditor()">New Post</button>
                    </div>
                    <div id="post-list" class="post-list">
                        <p>Loading posts...</p>
                    </div>
                </div>

                <!-- Post Editor View -->
                <div id="post-editor-view" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 id="editor-title" style="margin: 0;">New Post</h2>
                        <button class="btn" onclick="hideEditor()">Back to List</button>
                    </div>

                    <form id="post-form" onsubmit="savePost(event)">
                        <div class="form-group">
                            <label for="post-slug">Slug (URL path)</label>
                            <input type="text" id="post-slug" pattern="[a-z0-9-]+" placeholder="my-post-title" required>
                        </div>

                        <div class="form-group">
                            <label for="post-title">Title</label>
                            <input type="text" id="post-title" placeholder="My Post Title" required>
                        </div>

                        <div class="form-group">
                            <label for="post-excerpt">Excerpt (short description)</label>
                            <input type="text" id="post-excerpt" placeholder="A brief description of the post...">
                        </div>

                        <div class="editor-container">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="post-content">Content (Markdown)</label>
                                <textarea id="post-content" placeholder="Write your post in Markdown..." oninput="updatePreview()"></textarea>
                            </div>

                            <div class="preview-container">
                                <h2>Preview</h2>
                                <div id="preview-content"></div>
                            </div>
                        </div>

                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="post-published">
                            <label for="post-published" style="margin-bottom: 0;">Published</label>
                        </div>

                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="post-exclusive">
                            <label for="post-exclusive" style="margin-bottom: 0;">Exclusive (members only)</label>
                        </div>

                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary">Save Post</button>
                            <button type="button" class="btn" id="delete-btn" onclick="deletePost()" style="background: #e74c3c; color: white; display: none;">Delete Post</button>
                        </div>

                        <p id="editor-error" class="error-message" style="display: none;"></p>
                    </form>
                </div>

                <!-- Invites View -->
                <div id="invites-view" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 style="margin: 0;">Invite Links</h2>
                        <button class="btn btn-primary" onclick="showInviteForm()">Create Invite</button>
                    </div>

                    <div id="invite-form" style="display: none; margin-bottom: 1.5rem; padding: 1rem; background: #fafafa; border-radius: 8px; border: 1px solid #e0e0e0;">
                        <h3 style="margin-top: 0;">New Invite</h3>
                        <form onsubmit="createInvite(event)">
                            <div class="form-group">
                                <label>Name</label>
                                <input type="text" id="invite-name" placeholder="John Doe" required minlength="2" maxlength="100">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="invite-email" placeholder="friend@email.com" required>
                            </div>
                            <div class="form-group">
                                <label>Expires in (minutes)</label>
                                <input type="number" id="invite-expires" value="10080" min="5" max="10080">
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem;">Default 7 days (10080 min)</p>
                            </div>
                            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="invite-send-email">
                                <label for="invite-send-email" style="margin: 0;">Send invitation email</label>
                            </div>
                            <div style="display: flex; gap: 1rem;">
                                <button type="submit" class="btn btn-primary">Create</button>
                                <button type="button" class="btn" onclick="hideInviteForm()">Cancel</button>
                            </div>
                        </form>
                    </div>

                    <div id="invite-link-display" style="display: none; margin-bottom: 1.5rem; padding: 1rem; background: #d4edda; border-radius: 8px;">
                        <p style="margin: 0 0 0.5rem 0; font-weight: 500;">Invite link created!</p>
                        <input type="text" id="invite-link-input" readonly style="width: 100%; padding: 0.5rem; border: 1px solid #c3e6cb; border-radius: 4px; font-family: monospace; font-size: 0.9rem;">
                        <button class="btn" onclick="copyInviteLink()" style="margin-top: 0.5rem;">Copy Link</button>
                    </div>

                    <div id="invites-list" class="post-list">
                        <p>Loading invites...</p>
                    </div>
                </div>

                <!-- Users View -->
                <div id="users-view" style="display: none;">
                    <h2 style="margin-bottom: 1.5rem;">Users</h2>
                    <div id="users-list" class="post-list">
                        <p>Loading users...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.joshfreeman.me';
        let currentSlug = null;

        // Check if already logged in
        function checkAuth() {
            const token = localStorage.getItem('comment_token');
            const user = localStorage.getItem('comment_user');

            if (token && user) {
                const userData = JSON.parse(user);
                if (userData.is_admin) {
                    showAdminPanel(userData);
                    return true;
                }
            }
            return false;
        }

        function showAdminPanel(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('user-name').textContent = user.name;
            loadPosts();
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (!data.user.is_admin) {
                        errorEl.textContent = 'Admin access required';
                        errorEl.style.display = 'block';
                        return;
                    }
                    localStorage.setItem('comment_token', data.token);
                    localStorage.setItem('comment_user', JSON.stringify(data.user));
                    showAdminPanel(data.user);
                } else {
                    const error = await response.json();
                    errorEl.textContent = error.detail || 'Invalid credentials';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Login failed';
                errorEl.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('comment_token');
            localStorage.removeItem('comment_user');
            location.reload();
        }

        async function loadPosts() {
            const token = localStorage.getItem('comment_token');
            const container = document.getElementById('post-list');

            try {
                const response = await fetch(`${API_BASE}/admin/posts`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const posts = await response.json();
                    if (posts.length === 0) {
                        container.innerHTML = '<p style="color: var(--text-muted);">No posts yet. Create your first post!</p>';
                        return;
                    }

                    container.innerHTML = posts.map(post => `
                        <div class="post-item">
                            <div class="post-item-info">
                                <h3>${escapeHtml(post.title)}</h3>
                                <div class="meta">
                                    <span class="badge ${post.is_published ? 'badge-published' : 'badge-draft'}">
                                        ${post.is_published ? 'Published' : 'Draft'}
                                    </span>
                                    ${post.is_exclusive ? '<span class="badge badge-exclusive">Exclusive</span>' : ''}
                                    &middot; /${post.slug} &middot; ${formatDate(post.created_at)}
                                </div>
                            </div>
                            <div class="post-item-actions">
                                <button class="btn" onclick="editPost('${post.slug}')">Edit</button>
                                <a href="/blog/post.html?slug=${post.slug}" target="_blank" class="btn" ${!post.is_published ? 'style="opacity: 0.5;"' : ''}>View</a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="error-message">Failed to load posts</p>';
                }
            } catch (error) {
                container.innerHTML = '<p class="error-message">Failed to load posts</p>';
            }
        }

        function showEditor(slug = null) {
            currentSlug = slug;
            document.getElementById('post-list-view').style.display = 'none';
            document.getElementById('post-editor-view').style.display = 'block';
            document.getElementById('editor-title').textContent = slug ? 'Edit Post' : 'New Post';
            document.getElementById('delete-btn').style.display = slug ? 'inline-block' : 'none';
            document.getElementById('post-slug').disabled = !!slug;

            if (slug) {
                loadPost(slug);
            } else {
                document.getElementById('post-form').reset();
                document.getElementById('post-exclusive').checked = false;
                document.getElementById('preview-content').innerHTML = '';
            }
        }

        function hideEditor() {
            document.getElementById('post-list-view').style.display = 'block';
            document.getElementById('post-editor-view').style.display = 'none';
            currentSlug = null;
            loadPosts();
        }

        async function loadPost(slug) {
            const token = localStorage.getItem('comment_token');

            try {
                const response = await fetch(`${API_BASE}/admin/posts/${slug}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const post = await response.json();
                    document.getElementById('post-slug').value = post.slug;
                    document.getElementById('post-title').value = post.title;
                    document.getElementById('post-excerpt').value = post.excerpt || '';
                    document.getElementById('post-content').value = post.content;
                    document.getElementById('post-published').checked = post.is_published;
                    document.getElementById('post-exclusive').checked = post.is_exclusive || false;
                    updatePreview();
                }
            } catch (error) {
                alert('Failed to load post');
            }
        }

        async function savePost(event) {
            event.preventDefault();
            const token = localStorage.getItem('comment_token');
            const errorEl = document.getElementById('editor-error');

            const postData = {
                slug: document.getElementById('post-slug').value,
                title: document.getElementById('post-title').value,
                excerpt: document.getElementById('post-excerpt').value,
                content: document.getElementById('post-content').value,
                is_published: document.getElementById('post-published').checked,
                is_exclusive: document.getElementById('post-exclusive').checked
            };

            try {
                const url = currentSlug
                    ? `${API_BASE}/admin/posts/${currentSlug}`
                    : `${API_BASE}/admin/posts`;
                const method = currentSlug ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(postData)
                });

                if (response.ok) {
                    hideEditor();
                } else {
                    const error = await response.json();
                    errorEl.textContent = error.detail || 'Failed to save post';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Failed to save post';
                errorEl.style.display = 'block';
            }
        }

        async function deletePost() {
            if (!currentSlug) return;
            if (!confirm('Are you sure you want to delete this post? This will also delete all comments on it.')) return;

            const token = localStorage.getItem('comment_token');

            try {
                const response = await fetch(`${API_BASE}/admin/posts/${currentSlug}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    hideEditor();
                } else {
                    alert('Failed to delete post');
                }
            } catch (error) {
                alert('Failed to delete post');
            }
        }

        function editPost(slug) {
            showEditor(slug);
        }

        function updatePreview() {
            const content = document.getElementById('post-content').value;
            const preview = document.getElementById('preview-content');
            preview.innerHTML = marked.parse(content);
            // Style blockquotes
            stylePreviewBlockquotes();
        }

        function stylePreviewBlockquotes() {
            const blockquotes = document.querySelectorAll('#preview-content blockquote');
            blockquotes.forEach(bq => {
                const text = bq.textContent.toLowerCase().trim();
                bq.classList.remove('warning', 'tip', 'note');
                if (text.includes('⚠️') || /^warning\b/i.test(text) || text.includes('/!\\')) {
                    bq.classList.add('warning');
                } else if (text.includes('💡') || /^tip\b/i.test(text)) {
                    bq.classList.add('tip');
                } else if (text.includes('ℹ️') || /^note\b/i.test(text)) {
                    bq.classList.add('note');
                }
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function formatDateTime(dateString) {
            return new Date(dateString).toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Tab switching
        function showTab(tab) {
            // Hide all views
            document.getElementById('post-list-view').style.display = 'none';
            document.getElementById('post-editor-view').style.display = 'none';
            document.getElementById('invites-view').style.display = 'none';
            document.getElementById('users-view').style.display = 'none';

            // Reset tab styles
            document.getElementById('tab-posts').style.fontWeight = 'normal';
            document.getElementById('tab-invites').style.fontWeight = 'normal';
            document.getElementById('tab-users').style.fontWeight = 'normal';

            // Show selected tab
            if (tab === 'posts') {
                document.getElementById('post-list-view').style.display = 'block';
                document.getElementById('tab-posts').style.fontWeight = '600';
                loadPosts();
            } else if (tab === 'invites') {
                document.getElementById('invites-view').style.display = 'block';
                document.getElementById('tab-invites').style.fontWeight = '600';
                loadInvites();
            } else if (tab === 'users') {
                document.getElementById('users-view').style.display = 'block';
                document.getElementById('tab-users').style.fontWeight = '600';
                loadUsers();
            }
        }

        // Invite management
        function showInviteForm() {
            document.getElementById('invite-form').style.display = 'block';
            document.getElementById('invite-link-display').style.display = 'none';
        }

        function hideInviteForm() {
            document.getElementById('invite-form').style.display = 'none';
        }

        async function createInvite(event) {
            event.preventDefault();
            const token = localStorage.getItem('comment_token');
            const name = document.getElementById('invite-name').value.trim();
            const email = document.getElementById('invite-email').value.trim();
            const expiresMinutes = parseInt(document.getElementById('invite-expires').value) || 10080;
            const sendEmail = document.getElementById('invite-send-email').checked;

            try {
                const response = await fetch(`${API_BASE}/admin/invites`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, email, expires_minutes: expiresMinutes, send_email: sendEmail })
                });

                if (response.ok) {
                    const invite = await response.json();
                    const link = `${window.location.origin}/register.html?token=${invite.token}`;
                    document.getElementById('invite-link-input').value = link;
                    document.getElementById('invite-form').style.display = 'none';
                    document.getElementById('invite-link-display').style.display = 'block';
                    loadInvites();
                } else {
                    alert('Failed to create invite');
                }
            } catch (error) {
                alert('Failed to create invite');
            }
        }

        function copyInviteLink() {
            const input = document.getElementById('invite-link-input');
            input.select();
            document.execCommand('copy');
            alert('Link copied to clipboard!');
        }

        async function loadInvites() {
            const token = localStorage.getItem('comment_token');
            const container = document.getElementById('invites-list');

            try {
                const response = await fetch(`${API_BASE}/admin/invites`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const invites = await response.json();
                    if (invites.length === 0) {
                        container.innerHTML = '<p style="color: var(--text-muted);">No invites yet.</p>';
                        return;
                    }

                    const now = new Date();
                    container.innerHTML = invites.map(invite => {
                        const expired = new Date(invite.expires_at) < now;
                        const status = invite.used ? 'Used' : (expired ? 'Expired' : 'Active');
                        const statusClass = invite.used ? 'badge-published' : (expired ? 'badge-draft' : 'badge-published');

                        return `
                            <div class="post-item">
                                <div class="post-item-info">
                                    <h3 style="font-family: monospace; font-size: 0.9rem;">${invite.token.substring(0, 16)}...</h3>
                                    <div class="meta">
                                        <span class="badge ${statusClass}">${status}</span>
                                        &middot; ${escapeHtml(invite.name)} (${escapeHtml(invite.email)})
                                        &middot; Expires: ${formatDateTime(invite.expires_at)}
                                    </div>
                                </div>
                                <div class="post-item-actions">
                                    ${!invite.used && !expired ? `<button class="btn" onclick="copyInviteLinkById('${invite.token}')">Copy Link</button>` : ''}
                                    <button class="btn" onclick="deleteInvite(${invite.id})" style="background: #e74c3c; color: white;">Delete</button>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                container.innerHTML = '<p class="error-message">Failed to load invites</p>';
            }
        }

        function copyInviteLinkById(token) {
            const link = `${window.location.origin}/register.html?token=${token}`;
            navigator.clipboard.writeText(link).then(() => {
                alert('Link copied to clipboard!');
            });
        }

        async function deleteInvite(inviteId) {
            if (!confirm('Delete this invite?')) return;

            const token = localStorage.getItem('comment_token');

            try {
                const response = await fetch(`${API_BASE}/admin/invites/${inviteId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    loadInvites();
                } else {
                    alert('Failed to delete invite');
                }
            } catch (error) {
                alert('Failed to delete invite');
            }
        }

        // User management
        async function loadUsers() {
            const token = localStorage.getItem('comment_token');
            const container = document.getElementById('users-list');

            try {
                const response = await fetch(`${API_BASE}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const users = await response.json();
                    container.innerHTML = users.map(user => `
                        <div class="post-item">
                            <div class="post-item-info">
                                <h3>${escapeHtml(user.name)}</h3>
                                <div class="meta">
                                    ${user.email}
                                    &middot; <span class="badge ${user.is_admin ? 'badge-published' : 'badge-draft'}">${user.is_admin ? 'Admin' : 'User'}</span>
                                    &middot; Joined: ${formatDate(user.created_at)}
                                </div>
                            </div>
                            <div class="post-item-actions">
                                <button class="btn" onclick="editUserName(${user.id}, '${escapeHtml(user.name).replace(/'/g, "\\'")}')">Rename</button>
                                ${!user.is_admin ? `<button class="btn" onclick="deleteUser(${user.id})" style="background: #e74c3c; color: white;">Delete</button>` : ''}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                container.innerHTML = '<p class="error-message">Failed to load users</p>';
            }
        }

        function editUserName(userId, currentName) {
            const newName = prompt('Enter new name:', currentName);
            if (newName && newName.trim() && newName.trim() !== currentName) {
                updateUserName(userId, newName.trim());
            }
        }

        async function updateUserName(userId, newName) {
            const token = localStorage.getItem('comment_token');

            try {
                const response = await fetch(`${API_BASE}/admin/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name: newName })
                });

                if (response.ok) {
                    loadUsers();
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Failed to update user');
                }
            } catch (error) {
                alert('Failed to update user');
            }
        }

        async function deleteUser(userId) {
            if (!confirm('Delete this user? This will also delete all their comments.')) return;

            const token = localStorage.getItem('comment_token');

            try {
                const response = await fetch(`${API_BASE}/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    loadUsers();
                } else {
                    alert('Failed to delete user');
                }
            } catch (error) {
                alert('Failed to delete user');
            }
        }

        // Handle hash-based navigation for editing posts
        function handleHashNavigation() {
            const hash = window.location.hash;
            if (hash && hash.startsWith('#edit/')) {
                const slug = hash.substring(6); // Remove '#edit/'
                if (slug) {
                    showEditor(slug);
                }
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) {
                document.getElementById('login-section').style.display = 'block';
            } else {
                // Check for edit hash after auth
                handleHashNavigation();
            }
        });

        // Also handle hash changes
        window.addEventListener('hashchange', handleHashNavigation);
    </script>
</body>
</html>
