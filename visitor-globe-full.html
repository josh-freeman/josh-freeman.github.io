<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="https://joshfreeman.me/">
    <title>Joshua Freeman</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">

    <!-- Leaflet CSS for map view -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --cyan: #4ecdc4;
            --cyan-glow: rgba(78, 205, 196, 0.5);
            --cyan-soft: rgba(78, 205, 196, 0.15);
            --amber: #e5a54b;
            --amber-glow: rgba(229, 165, 75, 0.5);
            --bg-void: #050508;
            --bg-panel: rgba(10, 12, 18, 0.85);
            --text-primary: #e8eaed;
            --text-muted: #6b7280;
            --border: rgba(78, 205, 196, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Starfield background */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at center, #0a0c14 0%, #050508 100%);
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 230px 80px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 300px 200px, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 370px 150px, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 450px 250px, rgba(255,255,255,0.6), transparent);
            background-repeat: repeat;
            background-size: 500px 300px;
            animation: twinkle 8s ease-in-out infinite alternate;
        }

        .stars:nth-child(2) {
            background-position: 50px 50px;
            animation-delay: -4s;
            opacity: 0.5;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Globe container */
        #globe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            transition: opacity 0.5s ease-in-out;
        }

        /* Map container (hidden initially) */
        #map-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
        }

        #map-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        #globe-container.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Circle markers on map - no special CSS needed, styled via Leaflet options */

        /* Leaflet popup styling */
        .leaflet-popup-content-wrapper {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            padding: 0;
        }

        .leaflet-popup-content {
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        .leaflet-popup-tip {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .leaflet-popup-close-button {
            color: var(--text-muted) !important;
            font-size: 18px !important;
            padding: 8px 10px !important;
        }

        .leaflet-popup-close-button:hover {
            color: var(--cyan) !important;
        }

        .point-popup {
            padding: 0.75rem 1rem;
            min-width: 160px;
        }

        .point-popup-name {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 0.35rem;
        }

        .point-popup-location {
            font-size: 0.8rem;
            color: var(--cyan);
            margin-bottom: 0.35rem;
        }

        .point-popup-location.amber {
            color: var(--amber);
        }

        .point-popup-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Leaflet controls styling */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4) !important;
            margin-right: 1.25rem !important;
            margin-bottom: 1.25rem !important;
        }

        .leaflet-control-zoom a {
            background: var(--bg-panel) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border) !important;
            width: 40px !important;
            height: 40px !important;
            line-height: 40px !important;
            font-size: 18px !important;
            font-weight: 300 !important;
        }

        .leaflet-control-zoom a:hover {
            background: var(--cyan-soft) !important;
            color: var(--cyan) !important;
        }

        .leaflet-control-zoom-in {
            border-radius: 10px 10px 0 0 !important;
            border-bottom: none !important;
        }

        .leaflet-control-zoom-out {
            border-radius: 0 0 10px 10px !important;
        }

        .leaflet-top.leaflet-left {
            top: auto !important;
            bottom: 0 !important;
            left: auto !important;
            right: 0 !important;
        }

        /* View indicator */
        .view-indicator {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .view-indicator .view-name {
            color: var(--cyan);
            font-weight: 400;
        }

        /* Header */
        .header {
            position: fixed;
            top: 1.25rem;
            left: 1.25rem;
            right: 1.25rem;
            z-index: 100;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .header h1 {
            font-weight: 300;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--cyan-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 400;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: var(--cyan);
            border-color: var(--border);
            background: var(--cyan-soft);
        }

        .nav-link.active {
            color: var(--cyan);
            border-color: var(--border);
            background: var(--cyan-soft);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Toggle switch */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .toggle {
            position: relative;
            width: 36px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active {
            background: var(--cyan-soft);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: var(--text-muted);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .toggle.active::after {
            left: 18px;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan-glow);
        }

        /* Stats panel */
        .stats-panel {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            z-index: 100;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            min-width: 180px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .stats-panel h2 {
            font-weight: 300;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .stat-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 200;
            color: var(--cyan);
            line-height: 1;
        }

        .stat-number.amber {
            color: var(--amber);
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 300;
            color: var(--text-muted);
        }

        .countries-list {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            font-weight: 300;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Loading state */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-void);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
            transition: opacity 0.8s, visibility 0.8s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-ring {
            width: 50px;
            height: 50px;
            border: 1px solid var(--border);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.8rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }

        /* Error state */
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 150;
        }

        .error-message h2 {
            font-weight: 300;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .error-message p {
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Mobile */
        @media (max-width: 640px) {
            .header {
                top: 1rem;
                left: 1rem;
                right: 1rem;
                flex-direction: column;
                gap: 0.75rem;
                padding: 0.75rem;
            }

            .header-left {
                width: 100%;
                justify-content: space-between;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .stats-panel {
                left: 1rem;
                right: 1rem;
                bottom: 1rem;
            }

            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loading-ring"></div>
        <div class="loading-text">INITIALIZING GLOBE</div>
    </div>

    <div class="starfield">
        <div class="stars"></div>
        <div class="stars"></div>
    </div>

    <header class="header">
        <div class="header-left">
            <h1>Visitor Globe</h1>
            <nav class="nav-links">
                <a href="/visitor-globe.html" class="nav-link active">Visitor Globe</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="toggle-container">
                <span>Day</span>
                <div class="toggle" id="day-toggle" onclick="toggleDayNight()"></div>
            </div>
            <div class="toggle-container">
                <span>Visitors</span>
                <div class="toggle" id="visitor-toggle" onclick="toggleVisitors()"></div>
            </div>
            <a href="/blog.html" class="nav-link">Back to blog</a>
        </div>
    </header>

    <div id="globe-container"></div>
    <div id="map-container"></div>

    <div class="view-indicator" id="view-indicator">
        View: <span class="view-name" id="view-name">Globe</span>
    </div>

    <div class="stats-panel" id="stats" style="display: none;">
        <h2>Reach</h2>
        <div class="stat-row">
            <span class="stat-number" id="friend-count">0</span>
            <span class="stat-label">friends</span>
        </div>
        <div class="stat-row">
            <span class="stat-number amber" id="visitor-count">0</span>
            <span class="stat-label">visitors</span>
        </div>
        <div class="countries-list" id="countries-list"></div>
    </div>


    <!-- Globe.gl -->
    <script src="https://unpkg.com/globe.gl@2.27.0/dist/globe.gl.min.js"></script>

    <!-- Leaflet JS for map view -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- API config -->
    <script src="/js/config.js"></script>

    <script>
        (function() {
            'use strict';

            const API_BASE = window.API_BASE || 'https://api.joshfreeman.me';
            let globe = null;
            let map = null;
            let mapMarkers = [];
            let friendsData = [];
            let visitorsData = [];
            let showVisitors = false;
            let isDayMode = false;
            let currentView = 'globe'; // 'globe' or 'map'
            let isTransitioning = false;

            const EARTH_NIGHT = 'https://unpkg.com/three-globe@2.27.0/example/img/earth-night.jpg';
            const EARTH_DAY = 'https://unpkg.com/three-globe@2.27.0/example/img/earth-blue-marble.jpg';

            // Transition thresholds
            // Globe.gl altitude is in earth radii (starting at 2.5)
            // With minDistance=50 and globe radius ~100, minimum altitude is ~0.5
            const GLOBE_TO_MAP_ALTITUDE = 0.7;  // Zoom in past this to switch to map
            const MAP_TO_GLOBE_ZOOM = 3;        // Zoom out past this to switch to globe

            // Check auth
            function getAuthToken() {
                return localStorage.getItem('comment_token');
            }

            function getCurrentUser() {
                try {
                    const user = localStorage.getItem('comment_user');
                    return user ? JSON.parse(user) : null;
                } catch (e) {
                    return null;
                }
            }

            // Verify admin access
            const user = getCurrentUser();
            const token = getAuthToken();

            if (!user || !user.is_admin || !token) {
                // Show 404 - don't reveal this page exists
                window.location.replace('/404.html');
                return;
            }

            // Fetch data
            async function fetchFriends() {
                try {
                    const response = await fetch(`${API_BASE}/admin/friends-map`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        return data.friends || [];
                    }
                } catch (e) {
                    console.error('Failed to fetch friends:', e);
                }
                return [];
            }

            async function fetchVisitors() {
                try {
                    const response = await fetch(`${API_BASE}/admin/visitor-globe`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        return data.visitors || [];
                    }
                } catch (e) {
                    console.error('Failed to fetch visitors:', e);
                }
                return [];
            }

            // Toggle visitors
            window.toggleVisitors = function() {
                showVisitors = !showVisitors;
                document.getElementById('visitor-toggle').classList.toggle('active', showVisitors);
                updateGlobePoints();
                updateMapMarkers();
            };

            // Toggle day/night
            window.toggleDayNight = function() {
                isDayMode = !isDayMode;
                document.getElementById('day-toggle').classList.toggle('active', isDayMode);
                if (globe) {
                    globe.globeImageUrl(isDayMode ? EARTH_DAY : EARTH_NIGHT);
                }
            };

            // Initialize Leaflet map
            function initMap() {
                map = L.map('map-container', {
                    zoomControl: true,
                    attributionControl: false
                }).setView([30, 0], 2);

                // Dark map tiles (CartoDB Dark Matter)
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 19
                }).addTo(map);

                // Listen for zoom changes to transition back to globe
                map.on('zoomend', () => {
                    if (currentView === 'map' && !isTransitioning && map.getZoom() < MAP_TO_GLOBE_ZOOM) {
                        transitionToGlobe();
                    }
                });
            }

            // Circle marker style options
            function getMarkerOptions(type) {
                const isFriend = type === 'friend';
                return {
                    radius: 8,
                    fillColor: isFriend ? '#4ecdc4' : '#e5a54b',
                    color: isFriend ? '#4ecdc4' : '#e5a54b',
                    weight: 2,
                    opacity: 0.9,
                    fillOpacity: 0.6
                };
            }

            // Format relative time
            function formatLastSeen(isoString) {
                if (!isoString) return 'Unknown';
                const date = new Date(isoString.endsWith('Z') ? isoString : isoString + 'Z');
                const now = new Date();
                const diff = now - date;
                const minutes = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);

                if (minutes < 5) return 'Just now';
                if (minutes < 60) return `${minutes}m ago`;
                if (hours < 24) return `${hours}h ago`;
                if (days < 7) return `${days}d ago`;
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            // Escape HTML
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // Update map markers
            function updateMapMarkers() {
                if (!map) return;

                // Clear existing markers
                mapMarkers.forEach(m => map.removeLayer(m));
                mapMarkers = [];

                // Add friend markers (cyan circles)
                friendsData.forEach(f => {
                    if (f.lat && f.lng) {
                        const marker = L.circleMarker([f.lat, f.lng], getMarkerOptions('friend')).addTo(map);

                        const location = [f.city, f.country].filter(Boolean).join(', ') || 'Unknown';
                        marker.bindPopup(`
                            <div class="point-popup">
                                <div class="point-popup-name">${escapeHtml(f.name)}</div>
                                <div class="point-popup-location">${escapeHtml(location)}</div>
                                <div class="point-popup-meta">Last seen: ${formatLastSeen(f.last_seen)}</div>
                            </div>
                        `);
                        mapMarkers.push(marker);
                    }
                });

                // Add visitor markers if toggled (amber circles)
                if (showVisitors) {
                    visitorsData.forEach(v => {
                        if (v.lat && v.lng) {
                            const marker = L.circleMarker([v.lat, v.lng], getMarkerOptions('visitor')).addTo(map);

                            const location = [v.city, v.country].filter(Boolean).join(', ') || 'Unknown';
                            marker.bindPopup(`
                                <div class="point-popup">
                                    <div class="point-popup-name">Anonymous Visitor</div>
                                    <div class="point-popup-location amber">${escapeHtml(location)}</div>
                                    ${v.post_slug ? `<div class="point-popup-meta">Reading: ${escapeHtml(v.post_slug)}</div>` : ''}
                                </div>
                            `);
                            mapMarkers.push(marker);
                        }
                    });
                }
            }

            // Calculate map zoom from globe altitude
            function altitudeToZoom(altitude) {
                // Approximate mapping: altitude 0.8 → zoom 5, altitude 0.3 → zoom 10
                return Math.round(12 - (altitude * 10));
            }

            // Calculate globe altitude from map zoom
            function zoomToAltitude(zoom) {
                return (12 - zoom) / 10;
            }

            // Transition from globe to map
            function transitionToMap() {
                if (isTransitioning || currentView === 'map') return;
                isTransitioning = true;

                const pov = globe.pointOfView();
                const targetZoom = Math.max(5, altitudeToZoom(pov.altitude));

                // Set map view to match globe center
                map.setView([pov.lat, pov.lng], targetZoom, { animate: false });

                // Crossfade
                document.getElementById('globe-container').classList.add('hidden');
                document.getElementById('map-container').classList.add('active');
                document.getElementById('view-name').textContent = 'Map';

                currentView = 'map';

                setTimeout(() => {
                    isTransitioning = false;
                    // Invalidate map size after transition
                    map.invalidateSize();
                }, 500);
            }

            // Transition from map to globe
            function transitionToGlobe() {
                if (isTransitioning || currentView === 'globe') return;
                isTransitioning = true;

                const center = map.getCenter();
                const altitude = Math.max(1.5, zoomToAltitude(map.getZoom()));

                // Point globe at map center
                globe.pointOfView({ lat: center.lat, lng: center.lng, altitude: altitude }, 0);

                // Crossfade
                document.getElementById('map-container').classList.remove('active');
                document.getElementById('globe-container').classList.remove('hidden');
                document.getElementById('view-name').textContent = 'Globe';

                currentView = 'globe';

                setTimeout(() => {
                    isTransitioning = false;
                }, 500);
            }

            // Update globe points
            function updateGlobePoints() {
                if (!globe) return;

                const points = [];

                // Always show friends (cyan)
                friendsData.forEach(f => {
                    if (f.lat && f.lng) {
                        points.push({
                            lat: f.lat,
                            lng: f.lng,
                            name: f.name,
                            type: 'friend',
                            city: f.city,
                            country: f.country,
                            size: 0.5,
                            color: '#4ecdc4'
                        });
                    }
                });

                // Show visitors only if toggled on (amber)
                if (showVisitors) {
                    visitorsData.forEach(v => {
                        if (v.lat && v.lng) {
                            points.push({
                                lat: v.lat,
                                lng: v.lng,
                                name: 'Visitor',
                                type: 'visitor',
                                city: v.city,
                                country: v.country,
                                post: v.post_slug,
                                size: 0.3,
                                color: '#e5a54b'
                            });
                        }
                    });
                }

                globe.pointsData(points);
                updateStats();
            }

            // Update stats
            function updateStats() {
                document.getElementById('friend-count').textContent = friendsData.length;
                document.getElementById('visitor-count').textContent = showVisitors ? visitorsData.length : '-';

                const countries = new Set();
                friendsData.forEach(f => f.country && countries.add(f.country));
                if (showVisitors) {
                    visitorsData.forEach(v => v.country && countries.add(v.country));
                }

                const countriesEl = document.getElementById('countries-list');
                if (countries.size > 0) {
                    countriesEl.textContent = Array.from(countries).sort().join(' · ');
                } else {
                    countriesEl.textContent = 'No location data yet';
                }
            }

            // Initialize globe
            async function init() {
                // Fetch data in parallel
                [friendsData, visitorsData] = await Promise.all([
                    fetchFriends(),
                    fetchVisitors()
                ]);

                // Create globe
                globe = Globe()
                    .globeImageUrl('https://unpkg.com/three-globe@2.27.0/example/img/earth-night.jpg')
                    .bumpImageUrl('https://unpkg.com/three-globe@2.27.0/example/img/earth-topology.png')
                    .backgroundImageUrl('')
                    .backgroundColor('rgba(0,0,0,0)')
                    .showAtmosphere(true)
                    .atmosphereColor('#4ecdc4')
                    .atmosphereAltitude(0.15)
                    .pointAltitude(0.01)
                    .pointRadius('size')
                    .pointColor('color')
                    .pointsMerge(false)
                    .pointLabel(d => {
                        const location = [d.city, d.country].filter(Boolean).join(', ') || 'Unknown';
                        if (d.type === 'friend') {
                            return `<div style="background: rgba(10,12,18,0.9); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(78,205,196,0.3); font-family: Outfit, sans-serif;">
                                <div style="font-weight: 400; color: #e8eaed;">${d.name}</div>
                                <div style="font-size: 12px; color: #4ecdc4; margin-top: 2px;">${location}</div>
                            </div>`;
                        } else {
                            return `<div style="background: rgba(10,12,18,0.9); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(229,165,75,0.3); font-family: Outfit, sans-serif;">
                                <div style="font-weight: 400; color: #e8eaed;">Anonymous Visitor</div>
                                <div style="font-size: 12px; color: #e5a54b; margin-top: 2px;">${location}</div>
                                ${d.post ? `<div style="font-size: 11px; color: #6b7280; margin-top: 4px;">Reading: ${d.post}</div>` : ''}
                            </div>`;
                        }
                    })
                    (document.getElementById('globe-container'));

                // Auto-rotate
                const controls = globe.controls();
                controls.autoRotate = true;
                controls.autoRotateSpeed = 0.3;
                controls.enableZoom = true;
                controls.minDistance = 101;  // Just above globe radius (100) - allows altitude down to ~0.01
                controls.maxDistance = 500;

                // Stop auto-rotate on user interaction
                controls.addEventListener('start', () => {
                    controls.autoRotate = false;
                });

                // Detect zoom level changes for view transition
                controls.addEventListener('change', () => {
                    if (currentView === 'globe' && !isTransitioning) {
                        const altitude = globe.pointOfView().altitude;
                        if (altitude < GLOBE_TO_MAP_ALTITUDE) {
                            transitionToMap();
                        }
                    }
                });

                // Also stop on point click
                globe.onPointClick(() => {
                    controls.autoRotate = false;
                });

                // Point of view
                globe.pointOfView({ lat: 20, lng: 0, altitude: 2.5 });

                // Initialize the map (hidden initially)
                initMap();
                updateMapMarkers();

                // Initial data
                updateGlobePoints();

                // Hide loading
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('stats').style.display = 'block';
                }, 500);
            }

            init();
        })();
    </script>
</body>
</html>
