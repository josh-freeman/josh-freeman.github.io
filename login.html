<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | Josh Freeman</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/css/components.css">

    <!-- Theme Script -->
    <script src="/js/theme.js"></script>

    <style>
        .login-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-default);
        }

        .login-container h1 {
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
            font-family: var(--font-display);
        }

        .login-container .subtitle {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 0.75rem;
        }

        .form-group:last-of-type {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-family: var(--font-ui);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .error-banner {
            color: var(--error);
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: rgba(212, 114, 106, 0.15);
            border-radius: var(--radius-md);
            border: 1px solid var(--error);
            font-size: 0.9rem;
        }

        .error-message {
            color: var(--error);
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.25rem 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-default);
        }

        .divider span {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .google-btn {
            width: 100%;
            padding: 0.85rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.2s ease;
            font-family: var(--font-ui);
        }

        .google-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
        }

        .info-box {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            border-left: 4px solid var(--accent-primary);
        }

        .info-box strong {
            color: var(--text-accent);
        }
    </style>
</head>
<body>
    <div id="main" style="margin-left: 0;">
        <div class="login-container">
            <h1>Log in</h1>
            <p class="subtitle">Access your account on Joshua's socialnet</p>

            <!-- Error banner (shown when redirected with error) -->
            <div id="error-banner" class="error-banner" style="display: none;"></div>

            <div class="info-box">
                <strong>No account?</strong> If we know each other, ask me for an invite. Otherwise, <a href="/subscribe.html" style="color: var(--accent-primary, #e5a54b);">subscribe</a> to join the conversation.
            </div>

            <!-- Google Sign In -->
            <button onclick="signInWithGoogle()" class="google-btn">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

            <div class="divider"><span>or</span></div>

            <!-- Email/Password form -->
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Log in</button>

                <p id="form-error" class="error-message" style="display: none;"></p>
            </form>

            <p style="margin-top: 1rem; text-align: center;">
                <a href="/socialnet.html" style="color: var(--text-muted);">Back to socialnet</a>
            </p>
        </div>
    </div>

    <script>
        // Auto-detect local vs production
        const isLocalDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_BASE = isLocalDev ? 'http://localhost:8080' : 'https://api.joshfreeman.me';

        // Error messages for OAuth errors
        const errorMessages = {
            'google_denied': 'You cancelled the Google sign in.',
            'google_failed': 'Something went wrong with Google. Please try again.',
            'invalid_state': 'Session expired. Please try again.',
            'no_email': 'Could not get email from Google.',
            'not_approved': 'Your account is pending approval.',
            'no_invite': 'No invite found for this email. Ask a friend to invite you, or subscribe to join.',
            'email_mismatch': 'This invite is for a different email address.'
        };

        // Check for error in URL params
        function checkForError() {
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error');
            if (error) {
                const banner = document.getElementById('error-banner');
                banner.textContent = errorMessages[error] || 'An error occurred. Please try again.';
                banner.style.display = 'block';
                // Clear the URL
                window.history.replaceState({}, '', '/login.html');
            }
        }

        // Sign in with Google
        function signInWithGoogle() {
            localStorage.setItem('auth_return_to', '/socialnet.html');
            window.location.href = `${API_BASE}/auth/google`;
        }

        // Collect browser data for VPN detection / location disambiguation
        function getBrowserData() {
            return {
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezone_offset: new Date().getTimezoneOffset(),
                language: navigator.language || navigator.userLanguage,
                languages: navigator.languages ? Array.from(navigator.languages) : [],
                platform: navigator.platform,
                screen_width: screen.width,
                screen_height: screen.height,
                color_depth: screen.colorDepth
            };
        }

        async function sendBrowserData(authToken) {
            try {
                await fetch(`${API_BASE}/users/browser-data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(getBrowserData())
                });
            } catch (e) {
                console.debug('Browser data send failed:', e);
            }
        }

        // Handle email/password login
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('form-error');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('comment_token', data.token);
                    localStorage.setItem('comment_user', JSON.stringify(data.user));
                    // Send browser data for location disambiguation (VPN detection)
                    sendBrowserData(data.token);
                    // Redirect to socialnet
                    window.location.href = '/socialnet.html';
                } else {
                    const error = await response.json();
                    errorEl.textContent = error.detail || 'Invalid credentials';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Unable to connect. Please try again.';
                errorEl.style.display = 'block';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', checkForError);
    </script>
</body>
</html>
