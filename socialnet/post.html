<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading... - Joshua Freeman</title>
    <meta name="description" id="page-description" content="">
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">
    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-description" content="">
    <meta property="og:image" content="https://joshfreeman.me/resources/big_icon.jpg">
    <meta property="og:url" id="og-url" content="">
    <meta property="og:type" content="article">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/socialnet.css">
    <link rel="stylesheet" href="/css/components.css">
    <script src="/js/theme.js"></script>
    <script>
        (function() {
            var slug = new URLSearchParams(window.location.search).get('slug');
            if (slug) {
                var title = slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                document.title = title + ' - Joshua Freeman';
                var ogTitle = document.querySelector('meta[property="og:title"]');
                if (ogTitle) ogTitle.content = title + ' - Joshua Freeman';
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
</head>
<body>
    <div id="main">
        <sidebar><script src="/sidebar.js"></script></sidebar>
        <article class="post-container">
            <a href="/socialnet.html" class="back-link">Back to socialnet</a>
            <header class="post-header">
                <h1 id="post-title"><span class="loading-spinner"></span>Loading...</h1>
                <p class="post-meta">
                    <time id="post-date" datetime=""></time>
                    <span id="reaction-container" class="ml-2">
                        <button id="reaction-btn" onclick="toggleReaction()" class="btn-icon" title="Add your reaction">
                            <svg id="reaction-icon" class="heart-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z"/></svg>
                            <span id="reaction-count" class="text-muted text-small">0</span>
                        </button>
                    </span>
                    <span id="admin-actions" class="ml-2" style="display:none">
                        <button onclick="editPost()" title="Edit post" class="btn-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
                        </button>
                        <button onclick="deletePost()" title="Delete post" class="btn-icon danger">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </span>
                    <button id="share-btn-header" onclick="openShareModal()" class="share-btn-inline" title="Share this post">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                        Share
                    </button>
                </p>
            </header>
            <div id="post-content-wrapper" class="post-content-wrapper">
                <div id="post-content" class="post-content"><p class="loading-text"><span class="loading-spinner"></span>Loading post content...</p></div>
                <div id="post-fade" class="post-fade"></div>
            </div>
            <button id="continue-reading-btn" class="continue-reading-btn" onclick="expandPost()">
                <span>Continue reading</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div id="post-actions" class="flex gap-2 flex-wrap items-center mt-3">
                <button id="share-btn-footer" onclick="openShareModal()" class="share-btn-prominent">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                    Share this post
                </button>
                <button onclick="openReactionForest()" class="forest-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><path d="M10 10v.2A3 3 0 0 1 8.9 16H5a3 3 0 0 1-1-5.8V10a3 3 0 0 1 6 0Z"/><path d="M7 16v6"/><path d="M13 19v3"/><path d="M12 19h8.3a1 1 0 0 0 .7-1.7L18 14h.3a1 1 0 0 0 .7-1.7L16 9h.2a1 1 0 0 0 .8-1.7L13 3l-1.4 1.5"/></svg>
                    View Reaction Forest <span id="forest-count" class="text-muted"></span>
                </button>
            </div>
            <section class="comments-section">
                <h2>Comments</h2>
                <div id="comments-container"><p class="comments-loading">Loading comments...</p></div>
                <div id="comment-form-container">
                    <div class="comment-login-notice">
                        <p class="login-action"><a href="#" id="login-link">Log in</a> to leave a comment</p>
                        <div class="login-divider">or</div>
                        <p class="login-invite"><a href="/subscribe.html">Subscribe</a> to join the conversation, or reach out if we know each other!</p>
                    </div>
                </div>
            </section>
        </article>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="/submenus.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toggle-component.js"></script>
    <script src="/js/visibility-selector.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/comments.js" defer></script>

    <script>
        // State
        let currentPost = null, editPostStats = null, userReacted = false, userReactionId = null;
        let maxReactionDepth = 3, currentUser = null, reactionsPreloaded = false;
        let forestView = 'tree', cachedReactions = null, cy = null, editModalOriginalValues = {};
        let fullMarkdownContent = null; // For lazy loading
        const editToggle = createToggleManager('toggle', 'edit-post');
        const editVisibilitySelector = createVisibilitySelector('edit-post');

        // Icons
        const ICONS = {
            share: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>',
            email: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
            eye: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>',
            users: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
            forest: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 10v.2A3 3 0 0 1 8.9 16H5a3 3 0 0 1-1-5.8V10a3 3 0 0 1 6 0Z"/><path d="M7 16v6"/><path d="M13 19v3"/><path d="M12 19h8.3a1 1 0 0 0 .7-1.7L18 14h.3a1 1 0 0 0 .7-1.7L16 9h.2a1 1 0 0 0 .8-1.7L13 3l-1.4 1.5"/></svg>',
            heart: '<svg width="18" height="18" viewBox="0 0 24 24" fill="#ef4444" stroke="none"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z"/></svg>',
            seedling: '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5"><path d="M12 22V12"/><path d="M12 12C12 12 8 9 8 6c0-2.2 1.8-4 4-4s4 1.8 4 4c0 3-4 6-4 6z"/><path d="M12 12c0 0-4-1-6-3"/><path d="M12 12c0 0 4-1 6-3"/></svg>'
        };

        // Post Loading
        async function loadPost() {
            const slug = getPostSlug();
            if (!slug) return window.location.replace('/socialnet.html');
            try {
                const token = localStorage.getItem('comment_token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const response = await fetch(`${API_BASE}/posts/${slug}/full`, { headers, credentials: 'include' });
                if (response.ok) {
                    const data = await response.json();
                    currentPost = data.post;
                    renderPost(data.post);
                    window.PRELOADED_COMMENTS = data.comments;
                    initReactionsWithData(data.reactions);
                    fetch(`${API_BASE}/posts/${slug}/view`, { method: 'POST', headers, credentials: 'include' }).catch(() => {});
                } else if (response.status === 401 || response.status === 404) {
                    window.location.replace('/socialnet.html');
                } else throw new Error('Failed to load');
            } catch (e) { window.location.replace('/socialnet.html'); }
        }

        function renderPost(post) {
            document.getElementById('page-title').textContent = `${post.title} - Joshua Freeman`;
            document.getElementById('page-description').content = post.excerpt || '';
            document.getElementById('og-title').content = `${post.title} - Joshua Freeman`;
            document.getElementById('og-description').content = post.excerpt || '';
            document.getElementById('og-url').content = `https://joshfreeman.me/socialnet/post.html?slug=${post.slug}`;
            let badges = '';
            if (post.is_early_access) badges += ' <span class="early-access-badge">Early Access</span>';
            if (post.is_friends_only && !post.is_early_access) badges += ' <span class="exclusive-badge" title="Friends Only">Friends Only</span>';
            if (post.is_unlisted) badges += ' <span class="unlisted-badge" title="Unlisted">Unlisted</span>';
            document.getElementById('post-title').innerHTML = post.title + badges;
            document.getElementById('post-date').textContent = formatDate(post.created_at);
            document.getElementById('post-date').setAttribute('datetime', post.created_at.split('T')[0]);

            // Lazy loading: split long content, only render preview initially
            const content = post.content;
            const preview = getContentPreview(content);
            fullMarkdownContent = content;

            if (preview.truncated) {
                document.getElementById('post-content').innerHTML = marked.parse(preview.text);
                document.getElementById('post-content-wrapper').classList.add('collapsed');
                document.getElementById('continue-reading-btn').classList.add('visible');
            } else {
                document.getElementById('post-content').innerHTML = marked.parse(content);
            }
            styleBlockquotes();
        }

        function getContentPreview(markdown) {
            // Split at ~1500 chars, but at a paragraph boundary
            if (markdown.length < 2000) return { text: markdown, truncated: false };

            const paragraphs = markdown.split(/\n\n+/);
            let preview = '';
            let charCount = 0;

            for (const p of paragraphs) {
                if (charCount > 1500) break;
                preview += (preview ? '\n\n' : '') + p;
                charCount += p.length;
            }

            // Ensure we have at least some content
            if (preview.length < 500) return { text: markdown, truncated: false };
            return { text: preview, truncated: true };
        }

        function styleBlockquotes() {
            document.querySelectorAll('.post-content blockquote').forEach(bq => {
                const text = bq.textContent.toLowerCase().trim();
                if (text.includes('⚠️') || /^warning\b/i.test(text)) bq.classList.add('warning');
                else if (text.includes('💡') || /^tip\b/i.test(text)) bq.classList.add('tip');
                else if (text.includes('ℹ️') || /^note\b/i.test(text)) bq.classList.add('note');
            });
        }

        function expandPost() {
            const wrapper = document.getElementById('post-content-wrapper');
            const content = document.getElementById('post-content');
            const btn = document.getElementById('continue-reading-btn');
            if (!wrapper || !content || !btn) return;

            // Render full content (lazy load the rest)
            if (fullMarkdownContent) {
                content.innerHTML = marked.parse(fullMarkdownContent);
                styleBlockquotes();
            }

            wrapper.style.maxHeight = wrapper.scrollHeight + 'px';
            wrapper.classList.remove('collapsed');
            btn.style.opacity = '0';
            btn.style.transform = 'translateY(-10px)';
            setTimeout(() => { btn.classList.remove('visible'); btn.style = ''; }, 300);
            setTimeout(() => { wrapper.style.maxHeight = ''; }, 500);
        }

        function checkAdminActions() {
            const userStr = localStorage.getItem('comment_user');
            if (userStr) {
                const user = JSON.parse(userStr);
                if (user.is_admin) document.getElementById('admin-actions').style.display = 'inline';
            }
        }

        document.addEventListener('DOMContentLoaded', () => { loadPost(); checkAdminActions(); });

        // Share Modal
        function canGenerateTempLink() {
            if (!currentPost?.is_friends_only) return false;
            const userStr = localStorage.getItem('comment_user'), token = localStorage.getItem('comment_token');
            if (!userStr || !token) return false;
            const user = JSON.parse(userStr);
            return user.is_admin || currentPost.content.toLowerCase().includes(user.name.toLowerCase());
        }

        function openShareModal() {
            if (!currentPost) return;
            const postUrl = window.location.href;
            const isExclusive = currentPost.is_friends_only;
            const canGenerate = canGenerateTempLink();
            let content = modalHeader('Share this post', 'share-modal', ICONS.share);
            if (!isExclusive) {
                content += `<div class="input-with-button"><input type="text" id="share-url-main" value="${postUrl}" readonly onclick="this.select()"><button onclick="copyUrl('share-url-main',this)">Copy</button></div><button onclick="closeModal('share-modal')" class="btn-secondary mt-2 w-full">Done</button>`;
            } else {
                content += `<div class="warning-box"><p><strong class="text-accent">Friends-only post</strong> — this link only works for people with socialnet access.</p></div>
                <div class="form-group"><label class="form-label-small">Link for members</label><div class="input-with-button"><input type="text" id="share-url-main" value="${postUrl}" readonly onclick="this.select()"><button onclick="copyUrl('share-url-main',this)">Copy</button></div></div>
                ${canGenerate ? `<div class="border-t pt-2 mt-1"><div class="highlight-box highlight-box-warning"><p><strong class="text-accent">You can share with anyone!</strong><br><span class="text-small">Generate a 24-hour access link that works without login.</span></p></div><div id="temp-link-section"><button onclick="generateTempLink()" id="generate-temp-btn" class="btn-primary-gradient w-full">Generate 24-hour link</button></div></div>` : ''}
                <button onclick="closeModal('share-modal')" class="btn-secondary mt-2 w-full">Done</button>`;
            }
            createModal('share-modal', content);
        }

        async function generateTempLink() {
            const guard = loadingGuards.shareLink;
            if (!guard.start()) return;
            const btn = document.getElementById('generate-temp-btn'), section = document.getElementById('temp-link-section');
            btn.disabled = true; btn.textContent = 'Generating...';
            try {
                const response = await fetch(`${API_BASE}/posts/${getPostSlug()}/share`, { method: 'POST', headers: { 'Authorization': `Bearer ${localStorage.getItem('comment_token')}` } });
                if (response.ok) {
                    const data = await response.json();
                    section.innerHTML = `<label class="form-label-small">24-hour access link</label><div class="input-with-button mb-1"><input type="text" id="share-url-temp" value="${data.share_url}" readonly onclick="this.select()" class="border-accent"><button onclick="copyUrl('share-url-temp',this)">Copy</button></div><p class="text-muted text-small">Expires ${new Date(data.expires_at).toLocaleString()}</p>`;
                } else { btn.disabled = false; btn.textContent = 'Generate 24-hour link'; alert((await response.json()).detail || 'Failed'); }
            } catch (e) { btn.disabled = false; btn.textContent = 'Generate 24-hour link'; alert('Failed'); }
            finally { guard.end(); }
        }

        function copyUrl(inputId, btn) {
            document.getElementById(inputId).select();
            document.execCommand('copy');
            const orig = btn.textContent;
            btn.textContent = '✓'; btn.style.background = '#10b981';
            setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1500);
        }

        // Edit Post Modal
        function editPost() {
            const slug = getPostSlug(), token = localStorage.getItem('comment_token');
            if (!slug || !token) return alert('Please log in first');
            fetch(`${API_BASE}/admin/posts/${slug}`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => r.json()).then(post => showEditModal(post)).catch(() => alert('Failed to load post'));
        }

        async function showEditModal(post) {
            closeModal('edit-post-modal');
            const token = localStorage.getItem('comment_token');
            fetch(`${API_BASE}/admin/posts/${post.slug}/stats`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(stats => { editPostStats = stats; updateEditModalStats(stats, post.is_published); })
                .catch(() => { const el = document.getElementById('edit-view-stats'); if (el) el.innerHTML = '<span class="text-error">Failed to load stats</span>'; });
            const content = `${modalHeader('Edit Post', 'edit-post-modal')}
                <div id="edit-stats-section" class="info-box mb-2"><div class="flex justify-between items-center flex-wrap gap-2"><div id="edit-view-stats" class="stats-bar"><span>Loading stats...</span></div><button id="edit-notify-btn" onclick="openNotifyFromEdit()" class="btn-primary-gradient btn-small" style="display:none">${ICONS.email.replace(/width="\d+"/g,'width="16"').replace(/height="\d+"/g,'height="16"')} Notify Users</button></div></div>
                <form id="edit-post-form">
                    <div class="form-group"><label class="form-label">Title</label><input type="text" id="edit-post-title" class="form-input" value="${escapeHtml(post.title)}"></div>
                    <div class="form-group"><label class="form-label">Excerpt</label><input type="text" id="edit-post-excerpt" class="form-input" value="${escapeHtml(post.excerpt || '')}"></div>
                    <div class="form-group"><label class="form-label">Content (Markdown)</label><div class="md-tabs"><button type="button" class="md-tab active" onclick="showEditTab('write')">Write</button><button type="button" class="md-tab" onclick="showEditTab('preview')">Preview</button></div><textarea id="edit-post-content" class="form-textarea">${escapeHtml(post.content)}</textarea><div id="edit-preview-content" class="md-preview blog-content" style="display:none"></div></div>
                    <div id="edit-visibility-container" class="form-group">${editVisibilitySelector.render()}</div>
                    <div class="btn-row"><button type="button" onclick="handleEditSave()" class="btn-primary-gradient">Save</button><button type="button" onclick="confirmCloseEditModal()" class="btn-secondary">Cancel</button></div>
                    <p id="edit-post-error" class="text-small mt-1 text-error" style="display:none"></p>
                </form>`;
            createModal('edit-post-modal', content, { wide: true, closeOnOverlay: false });
            editModalOriginalValues = { title: post.title || '', excerpt: post.excerpt || '', content: post.content || '' };
            editVisibilitySelector.init();
            editVisibilitySelector.setFromPost(post);
        }

        function updateEditModalStats(stats, isPublished) {
            const statsEl = document.getElementById('edit-view-stats'), notifyBtn = document.getElementById('edit-notify-btn');
            if (!statsEl) return;
            statsEl.innerHTML = `<span class="stat-item clickable" onclick="showFriendsViewedDetails()">${ICONS.eye} <strong>${stats.friend_views}</strong> friends viewed</span><span class="stat-item clickable" onclick="showAnonymousViewsDetails()">${ICONS.users} <strong>${stats.anonymous_views}</strong> anonymous</span>${stats.unnotified_not_viewed_count > 0 ? `<span class="stat-item text-accent">${ICONS.email.replace(/width="\d+"/g,'width="16"').replace(/height="\d+"/g,'height="16"')} <strong>${stats.unnotified_not_viewed_count}</strong> to notify</span>` : ''}`;
            if (notifyBtn && isPublished) notifyBtn.style.display = 'inline-flex';
        }

        function showFriendsViewedDetails() {
            if (!editPostStats?.friends_who_viewed) return;
            const friends = editPostStats.friends_who_viewed;
            if (!friends.length) return alert('No friends have viewed this post yet.');
            const list = friends.map(f => `<div class="flex justify-between border-b py-1"><span class="font-medium">${escapeHtml(f.name)}</span><span class="text-muted text-small">${f.view_count}× · last ${new Date(f.last_viewed_at).toLocaleDateString()}</span></div>`).join('');
            createModal('friends-viewed-popup', `${modalHeader('Friends Who Viewed (' + friends.length + ')', 'friends-viewed-popup')}${list}`);
        }

        function showAnonymousViewsDetails() {
            if (!editPostStats) return;
            const count = editPostStats.anonymous_views;
            createModal('anonymous-views-popup', `${modalHeader('Anonymous Views (' + count + ')', 'anonymous-views-popup')}<p class="text-secondary mb-2">${count} unique visitor${count !== 1 ? 's' : ''} viewed this post without being logged in.</p><p class="text-muted text-small">Anonymous views are tracked by a hash of IP address and browser fingerprint. No personal information is stored.</p>`);
        }

        function showEditTab(tab) {
            const tabs = document.querySelectorAll('.md-tab'), textarea = document.getElementById('edit-post-content'), preview = document.getElementById('edit-preview-content');
            if (!tabs.length || !textarea || !preview) return;
            tabs.forEach((t, i) => t.classList.toggle('active', (tab === 'write' && i === 0) || (tab === 'preview' && i === 1)));
            textarea.style.display = tab === 'write' ? 'block' : 'none';
            preview.style.display = tab === 'write' ? 'none' : 'block';
            if (tab === 'preview') preview.innerHTML = marked.parse(textarea.value);
        }

        function hasUnsavedChanges() {
            return (document.getElementById('edit-post-title')?.value || '') !== editModalOriginalValues.title ||
                   (document.getElementById('edit-post-excerpt')?.value || '') !== editModalOriginalValues.excerpt ||
                   (document.getElementById('edit-post-content')?.value || '') !== editModalOriginalValues.content;
        }

        function confirmCloseEditModal() {
            if (hasUnsavedChanges() && !confirm('You have unsaved changes. Are you sure you want to close?')) return;
            closeModal('edit-post-modal');
        }

        function handleEditSave() {
            const slug = getPostSlug(); if (!slug) return;
            const btn = event.target; btn.disabled = true; btn.textContent = 'Saving...';
            const postData = { title: document.getElementById('edit-post-title')?.value || '', excerpt: document.getElementById('edit-post-excerpt')?.value || '', content: document.getElementById('edit-post-content')?.value || '', ...editVisibilitySelector.getFields() };
            fetch(`${API_BASE}/admin/posts/${slug}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('comment_token')}` }, body: JSON.stringify(postData) }).catch(() => {});
            setTimeout(() => { closeModal('edit-post-modal'); loadPost(); }, 300);
        }

        // Notify Modal
        function openNotifyFromEdit() {
            if (!editPostStats) return alert('Stats not loaded yet. Please wait.');
            showNotifyModal(getPostSlug(), document.getElementById('edit-post-title')?.value || currentPost?.title || 'this post', editPostStats);
        }

        function showNotifyModal(slug, postTitle, stats) {
            const smartCount = stats.unnotified_not_viewed_count;
            const allUsers = [...stats.friends_who_viewed.map(u => ({ ...u, viewed: true, notified: stats.notified_users.some(n => n.id === u.id) })), ...stats.friends_not_viewed.map(u => ({ ...u, viewed: false, notified: stats.notified_users.some(n => n.id === u.id) }))].sort((a, b) => a.name.localeCompare(b.name));
            const userListHtml = allUsers.map(u => {
                const badges = (u.viewed ? '<span class="badge badge-success">viewed</span>' : '') + (u.notified ? '<span class="badge badge-warning">notified</span>' : '');
                const checked = !u.viewed && !u.notified;
                return `<label class="user-list-item" onclick="toggleNotifyCheckbox(this)"><input type="checkbox" name="notify-user" value="${u.id}" ${checked ? 'checked' : ''} style="display:none"><span class="custom-checkbox-notify"><svg class="unchecked" width="18" height="18" viewBox="0 0 24 24" style="color:var(--text-muted);${checked ? 'display:none' : ''}"><use href="/resources/icons.svg#checkbox-empty"></use></svg><svg class="checked" width="18" height="18" viewBox="0 0 24 24" style="color:var(--accent-primary);${checked ? '' : 'display:none'}"><use href="/resources/icons.svg#checkbox-checked"></use></svg></span><span>${escapeHtml(u.name)}</span>${badges}</label>`;
            }).join('');
            const content = `${modalHeader('Notify Users', 'notify-modal', ICONS.email)}<p class="text-secondary mb-2">Post: <strong>"${escapeHtml(postTitle)}"</strong></p><div class="info-box mb-2"><div class="stats-bar"><span class="stat-item">${ICONS.eye} <strong>${stats.friend_views}</strong> friends viewed</span><span class="stat-item">${ICONS.users} <strong>${stats.anonymous_views}</strong> anonymous</span></div></div>
                <div class="form-group"><div class="flex justify-between items-center mb-1"><label class="form-label" style="margin:0">Select users to notify:</label><div class="flex gap-1"><button onclick="selectAllNotify(true)" class="btn-secondary btn-small">All</button><button onclick="selectAllNotify(false)" class="btn-secondary btn-small">None</button></div></div><div class="user-list">${userListHtml || '<p class="text-muted">No users available</p>'}</div><p id="notify-selected-count" class="text-muted text-small mt-1"><span id="notify-count-num">0</span> user(s) selected</p></div>
                ${smartCount > 0 ? `<div class="highlight-box highlight-box-warning flex justify-between items-center flex-wrap gap-1"><p class="text-small text-accent" style="margin:0"><strong>${smartCount}</strong> haven't seen this post yet</p><button onclick="selectUnnotified()" class="btn-primary-gradient btn-small">Select these ${smartCount}</button></div>` : `<div class="highlight-box highlight-box-success"><p class="text-success" style="margin:0">All friends have either viewed this post or been notified already!</p></div>`}
                <button onclick="confirmAndSendNotify()" class="btn-primary-gradient w-full mt-2">Send Notifications</button><div class="border-t pt-2 mt-1 text-right"><button onclick="closeModal('notify-modal')" class="btn-secondary">Done</button></div>`;
            createModal('notify-modal', content);
            updateNotifyCount();
        }

        function toggleNotifyCheckbox(label) {
            const input = label.querySelector('input[type="checkbox"]'), unchecked = label.querySelector('.unchecked'), checked = label.querySelector('.checked');
            if (input) { input.checked = !input.checked; if (unchecked && checked) { unchecked.style.display = input.checked ? 'none' : ''; checked.style.display = input.checked ? '' : 'none'; } }
            updateNotifyCount();
        }

        function updateNotifyCheckboxVisuals() {
            document.querySelectorAll('input[name="notify-user"]').forEach(cb => {
                const label = cb.closest('label'); if (!label) return;
                const unchecked = label.querySelector('.unchecked'), checked = label.querySelector('.checked');
                if (unchecked && checked) { unchecked.style.display = cb.checked ? 'none' : ''; checked.style.display = cb.checked ? '' : 'none'; }
            });
        }

        function selectAllNotify(select) { document.querySelectorAll('input[name="notify-user"]').forEach(cb => cb.checked = select); updateNotifyCheckboxVisuals(); updateNotifyCount(); }
        function selectUnnotified() { document.querySelectorAll('input[name="notify-user"]').forEach(cb => { const label = cb.closest('label'); cb.checked = !label.innerHTML.includes('>viewed<') && !label.innerHTML.includes('>notified<'); }); updateNotifyCheckboxVisuals(); updateNotifyCount(); }
        function updateNotifyCount() { const el = document.getElementById('notify-count-num'); if (el) el.textContent = document.querySelectorAll('input[name="notify-user"]:checked').length; }

        function confirmAndSendNotify() {
            const checkboxes = document.querySelectorAll('input[name="notify-user"]:checked');
            const userIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
            if (!userIds.length) return alert('No users selected');
            const names = Array.from(checkboxes).map(cb => cb.closest('label').querySelector('span:not(.custom-checkbox-notify)').textContent.trim());
            const nameList = names.length <= 5 ? names.join(', ') : names.slice(0, 5).join(', ') + ` and ${names.length - 5} more`;
            if (confirm(`Send notification email to ${userIds.length} user${userIds.length !== 1 ? 's' : ''}?\n\n${nameList}`)) sendNotify(userIds);
        }

        async function sendNotify(userIds) {
            const guard = loadingGuards.notify; if (!guard.start()) return;
            try {
                const response = await fetch(`${API_BASE}/admin/posts/${getPostSlug()}/notify`, { method: 'POST', headers: { 'Authorization': `Bearer ${localStorage.getItem('comment_token')}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ mode: 'selected', user_ids: userIds }) });
                if (response.ok) {
                    const data = await response.json();
                    alert(data.sent > 0 ? `Notified ${data.sent} user${data.sent !== 1 ? 's' : ''}` : 'No users to notify');
                    closeModal('notify-modal');
                    const statsRes = await fetch(`${API_BASE}/admin/posts/${getPostSlug()}/stats`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('comment_token')}` } });
                    if (statsRes.ok) { editPostStats = await statsRes.json(); updateEditModalStats(editPostStats, true); }
                } else { alert((await response.json()).detail || 'Failed'); }
            } catch (e) { alert('Failed'); } finally { guard.end(); }
        }

        // Delete Post
        async function deletePost() {
            const slug = getPostSlug();
            if (!slug || !confirm('Are you sure you want to delete this post? This will also delete all comments.')) return;
            try {
                const response = await fetch(`${API_BASE}/admin/posts/${slug}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('comment_token')}` } });
                if (response.ok) window.location.href = '/socialnet.html'; else alert('Failed to delete post');
            } catch (e) { alert('Failed to delete post'); }
        }

        // Reactions
        function initReactionsWithData(reactionsData) {
            reactionsPreloaded = true;
            const userStr = localStorage.getItem('comment_user'); if (userStr) currentUser = JSON.parse(userStr);
            userReacted = reactionsData.user_reacted; userReactionId = reactionsData.reaction_id; maxReactionDepth = reactionsData.max_depth;
            renderReactionTree(reactionsData.tree);
        }

        async function loadReactions() {
            if (reactionsPreloaded) return;
            const slug = getPostSlug(); if (!slug) return;
            const token = localStorage.getItem('comment_token'), userStr = localStorage.getItem('comment_user');
            if (userStr) currentUser = JSON.parse(userStr);
            try {
                const endpoint = token ? `${API_BASE}/reactions/${slug}/me` : `${API_BASE}/reactions/${slug}`;
                const response = await fetch(endpoint, { headers: token ? { 'Authorization': `Bearer ${token}` } : {}, credentials: 'include' });
                if (response.ok) { const data = await response.json(); userReacted = data.user_reacted; userReactionId = data.reaction_id; }
            } catch (e) {}
            loadReactionTree();
        }

        async function loadReactionTree() {
            const slug = getPostSlug(), token = localStorage.getItem('comment_token');
            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}/tree`, { headers: token ? { 'Authorization': `Bearer ${token}` } : {}, credentials: 'include' });
                if (response.ok) { const data = await response.json(); maxReactionDepth = data.max_depth; renderReactionTree(data.reactions); }
            } catch (e) {}
        }

        async function toggleReaction() {
            const guard = loadingGuards.reaction; if (!guard.start()) return;
            const token = localStorage.getItem('comment_token');
            if (!token) { showFriendsOnlyModal('react'); guard.end(); return; }
            try {
                const response = await fetch(`${API_BASE}/reactions/${getPostSlug()}`, { method: userReacted ? 'DELETE' : 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                if (response.ok) { const data = await response.json(); userReacted = data.user_reacted; userReactionId = data.reaction_id; loadReactionTree(); }
                else if (response.status === 401) showFriendsOnlyModal('react');
            } catch (e) {} finally { guard.end(); }
        }

        async function reactToReaction(parentId) {
            const guard = getOrCreateGuard(loadingGuards.reactionNested, parentId); if (!guard.start()) return;
            const token = localStorage.getItem('comment_token');
            if (!token) { showFriendsOnlyModal('react'); guard.end(); return; }
            try {
                const response = await fetch(`${API_BASE}/reactions/${getPostSlug()}/${parentId}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                if (response.ok) loadReactionTree(); else { const e = await response.json(); alert(e.detail || 'Could not add reaction'); }
            } catch (e) {} finally { guard.end(); }
        }

        async function removeReaction(reactionId) {
            const token = localStorage.getItem('comment_token');
            if (!token || !confirm('Remove this reaction and all nested reactions?')) return;
            const guard = getOrCreateGuard(loadingGuards.reactionNested, 'del-' + reactionId); if (!guard.start()) return;
            try { const response = await fetch(`${API_BASE}/reactions/${getPostSlug()}/${reactionId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); if (response.ok) loadReactions(); }
            catch (e) {} finally { guard.end(); }
        }

        // Reaction Forest Modal
        function openReactionForest() {
            const token = localStorage.getItem('comment_token');
            const legend = '<span>Click to react</span>' + (token ? '<span>Right-click to remove</span>' : '');
            const content = `<div class="flex items-center justify-between mb-2"><h3 style="margin:0;display:flex;align-items:center;gap:0.5rem">${ICONS.forest} Reaction Forest</h3><div class="flex items-center gap-2"><div class="view-toggle"><button onclick="setForestView('tree')" id="view-tree-btn" class="view-toggle-btn active">Tree</button><button onclick="setForestView('graph')" id="view-graph-btn" class="view-toggle-btn">Graph</button></div><button onclick="closeModal('forest-modal')" class="modal-close">&times;</button></div></div><p class="text-muted text-small mb-2">Click on hearts to react to reactions</p><div id="forest-tree" style="min-height:100px"></div><div id="forest-graph" style="display:none;height:350px;border-radius:12px;background:var(--bg-tertiary);border:1px solid var(--border-default)"></div><div class="flex gap-3 mt-2 text-small text-muted flex-wrap justify-center">${legend}</div>`;
            createModal('forest-modal', content);
            if (cachedReactions) forestView === 'tree' ? renderTreeView(cachedReactions) : renderGraphView(cachedReactions);
        }

        function setForestView(view) {
            forestView = view;
            document.getElementById('view-tree-btn').classList.toggle('active', view === 'tree');
            document.getElementById('view-graph-btn').classList.toggle('active', view === 'graph');
            document.getElementById('forest-tree').style.display = view === 'tree' ? 'block' : 'none';
            document.getElementById('forest-graph').style.display = view === 'graph' ? 'block' : 'none';
            if (cachedReactions) view === 'tree' ? renderTreeView(cachedReactions) : renderGraphView(cachedReactions);
        }

        function renderReactionTree(reactions) {
            cachedReactions = reactions;
            const allUsers = new Set();
            function collectUsers(r) { allUsers.add(r.user_id); if (r.children) r.children.forEach(collectUsers); }
            reactions.forEach(collectUsers);
            const count = allUsers.size;
            const forestCountEl = document.getElementById('forest-count');
            if (forestCountEl) forestCountEl.textContent = count > 0 ? `(${count} ${count === 1 ? 'person' : 'people'})` : '';
            document.getElementById('reaction-count').textContent = count;
            const userHasReaction = currentUser && allUsers.has(currentUser.id);
            const iconEl = document.getElementById('reaction-icon');
            iconEl.classList.toggle('active', userHasReaction);
            document.getElementById('reaction-btn').style.background = userHasReaction ? 'rgba(239, 68, 68, 0.1)' : 'none';
            const modalTree = document.getElementById('forest-tree'), modalGraph = document.getElementById('forest-graph');
            if (!reactions?.length) {
                const token = localStorage.getItem('comment_token');
                const emptyHtml = `<div class="empty-state"><div class="empty-state-icon">${ICONS.seedling}</div><div class="empty-state-title">No reactions yet</div><div>Be the first to plant a heart!</div>${token ? `<button onclick="toggleReaction(); closeModal('forest-modal');" class="empty-state-btn">${ICONS.heart} Add Reaction</button>` : ''}</div>`;
                if (modalTree) modalTree.innerHTML = emptyHtml;
                if (modalGraph) modalGraph.innerHTML = emptyHtml;
                return;
            }
            if (modalTree || modalGraph) forestView === 'tree' ? renderTreeView(reactions) : renderGraphView(reactions);
        }

        function renderTreeView(reactions) {
            const container = document.getElementById('forest-tree'), token = localStorage.getItem('comment_token');
            function renderNode(r, depth = 0) {
                const indent = depth > 0 ? `<span style="color:#ddd;margin-right:0.25rem">${'│ '.repeat(depth - 1)}├─</span>` : '';
                const isOwn = currentUser && currentUser.id === r.user_id, canReact = token && r.depth < maxReactionDepth, canDelete = isOwn || (currentUser && currentUser.is_admin);
                const childrenHtml = r.children?.length ? r.children.map(c => renderNode(c, depth + 1)).join('') : '';
                const heartSvg = `<svg width="18" height="18" viewBox="0 0 24 24" fill="#ef4444" stroke="none" style="cursor:${canReact ? 'pointer' : 'default'};vertical-align:middle" onclick="${canReact ? `reactToReaction(${r.id})` : ''}" title="${canReact ? 'Click to react' : ''}"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z"/></svg>`;
                return `<div class="tree-node">${indent}${heartSvg}<a href="/profile.html?id=${r.user_id}">${escapeHtml(r.user_name)}</a>${canDelete ? `<button onclick="removeReaction(${r.id})" class="btn-icon" title="Remove">✕</button>` : ''}</div>${childrenHtml}`;
            }
            container.innerHTML = reactions.map(r => renderNode(r, 0)).join('');
        }

        function renderGraphView(reactions) {
            const container = document.getElementById('forest-graph'), token = localStorage.getItem('comment_token');
            container.innerHTML = ''; container.style.height = '350px';
            function makeHeartWithInitial(name) {
                const initial = name ? name.charAt(0).toUpperCase() : '?';
                const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z" fill="#ef4444"/><circle cx="5" cy="5" r="4.5" fill="#e5a54b"/><text x="5" y="6.5" text-anchor="middle" fill="#0c0b0d" font-size="6" font-weight="600">' + initial + '</text></svg>';
                return 'data:image/svg+xml,' + encodeURIComponent(svg);
            }
            const elements = [];
            function addNodes(r, parentId = null) {
                const isOwn = currentUser && currentUser.id === r.user_id;
                elements.push({ data: { id: 'r' + r.id, heartImg: makeHeartWithInitial(r.user_name), name: r.user_name, reactionId: r.id, depth: r.depth, isOwn } });
                if (parentId) elements.push({ data: { source: parentId, target: 'r' + r.id } });
                if (r.children) r.children.forEach(child => addNodes(child, 'r' + r.id));
            }
            reactions.forEach(r => addNodes(r));
            cy = cytoscape({
                container, elements,
                style: [
                    { selector: 'node', style: { 'width': 85, 'height': 85, 'background-opacity': 0, 'background-image': 'data(heartImg)', 'background-fit': 'contain', 'background-width': '100%', 'background-height': '100%', 'border-width': 0, 'cursor': 'pointer' } },
                    { selector: 'edge', style: { 'width': 2, 'line-color': '#d1d5db', 'curve-style': 'straight', 'target-arrow-shape': 'none' } }
                ],
                layout: { name: 'breadthfirst', directed: true, padding: 20, spacingFactor: 1.4, avoidOverlap: true },
                userZoomingEnabled: false, userPanningEnabled: true, boxSelectionEnabled: false
            });
            const oldTooltip = document.getElementById('cy-tooltip'); if (oldTooltip) oldTooltip.remove();
            const tooltip = document.createElement('div'); tooltip.id = 'cy-tooltip';
            tooltip.style.cssText = 'position:fixed;background:#333;color:white;padding:6px 12px;border-radius:6px;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.2);pointer-events:none;display:none;z-index:1000';
            document.body.appendChild(tooltip);
            cy.on('mouseover', 'node', e => { tooltip.textContent = e.target.data('name'); tooltip.style.display = 'block'; });
            cy.on('mousemove', 'node', e => { tooltip.style.left = e.originalEvent.clientX + 15 + 'px'; tooltip.style.top = e.originalEvent.clientY - 10 + 'px'; });
            cy.on('mouseout', 'node', () => { tooltip.style.display = 'none'; });
            cy.on('tap', 'node', e => {
                const node = e.target;
                if (token && node.data('depth') < maxReactionDepth) reactToReaction(node.data('reactionId'));
                else if (!token) showFriendsOnlyModal('react');
                else alert('Maximum reaction depth reached');
            });
            cy.on('cxttap', 'node', e => {
                const node = e.target;
                if ((node.data('isOwn') || (currentUser && currentUser.is_admin)) && confirm(`Remove ${node.data('name')}'s reaction?`)) removeReaction(node.data('reactionId'));
            });
            cy.fit(30);
        }

        document.addEventListener('DOMContentLoaded', loadReactions);
    </script>
</body>
</html>
