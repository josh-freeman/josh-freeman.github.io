<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Profile - Joshua Freeman</title>
    <meta name="description" content="User profile">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/socialnet.css">
    <link rel="stylesheet" href="/css/components.css">

    <!-- Theme Script (before body to prevent flash) -->
    <script src="/js/theme.js"></script>
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary, #e5a54b), var(--accent-primary-dim, #c48a3a));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: var(--bg-primary, #0c0b0d);
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-name {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
        }
        .profile-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background: var(--bg-tertiary, #1e1c21);
            border-radius: 8px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .recent-comments h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        .comment-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-subtle, rgba(255, 255, 255, 0.06));
        }
        .comment-item:last-child {
            border-bottom: none;
        }
        .comment-post {
            font-size: 0.85rem;
            color: var(--primary-color);
            text-decoration: none;
        }
        .comment-post:hover {
            text-decoration: underline;
        }
        .comment-text {
            margin-top: 0.25rem;
            color: var(--text-color);
            font-size: 0.95rem;
        }
        .comment-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        /* Activity feed styles */
        .activity-feed {
            margin-top: 2rem;
        }
        .activity-feed h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .activity-item {
            padding: 1rem;
            border: 1px solid var(--border-default, rgba(255, 255, 255, 0.1));
            border-radius: 8px;
            margin-bottom: 0.75rem;
            background: var(--bg-tertiary, #1e1c21);
        }
        .activity-item.share-link {
            border-left: 3px solid var(--accent-secondary, #c4a1b0);
        }
        .activity-item.comment {
            border-left: 3px solid var(--accent-primary, #e5a54b);
        }
        .activity-type {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .activity-type.share { color: var(--accent-secondary, #c4a1b0); }
        .activity-type.comment { color: var(--accent-primary, #e5a54b); }
        .activity-post-link {
            font-weight: 500;
            color: var(--text-color);
            text-decoration: none;
        }
        .activity-post-link:hover {
            color: var(--primary-color);
        }
        .activity-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
        .activity-content {
            margin-top: 0.5rem;
            color: var(--text-color);
            font-size: 0.95rem;
        }
        .access-badge {
            display: inline-block;
            background: rgba(125, 168, 201, 0.2);
            color: var(--info, #7da8c9);
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .access-list {
            margin-top: 0.5rem;
            padding-left: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .expired-badge {
            background: rgba(212, 114, 106, 0.2);
            color: var(--error, #d4726a);
        }
    </style>
</head>
<body>
    <div id="main">
        <!-- Sidebar -->
        <sidebar>
            <script src="/sidebar.js"></script>
        </sidebar>

        <div class="profile-container">
            <a href="/socialnet.html" class="back-link">Back to socialnet</a>

            <div id="profile-content">
                <p style="color: var(--text-muted); text-align: center;">Loading profile...</p>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="/submenus.js"></script>

    <script>
        // API_BASE is already defined in sidebar.js

        function getUserId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function getInitial(name) {
            return name ? name.charAt(0).toUpperCase() : '?';
        }

        function renderAvatar(profile) {
            if (profile.profile_picture_url) {
                return `<img src="${profile.profile_picture_url}" alt="${escapeHtml(profile.name)}">`;
            }
            return getInitial(profile.name);
        }

        async function loadProfile() {
            const userId = getUserId();
            const container = document.getElementById('profile-content');

            if (!userId) {
                container.innerHTML = '<p style="text-align: center;">No user specified.</p>';
                return;
            }

            try {
                // Include auth token so API knows what posts viewer can see
                const token = localStorage.getItem('comment_token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const response = await fetch(`${API_BASE}/users/${userId}/profile`, { headers });
                if (response.ok) {
                    const profile = await response.json();

                    document.getElementById('page-title').textContent = `${profile.name} - Joshua Freeman`;

                    // Check if this is the current user's own profile
                    const currentUser = getCurrentUser();
                    const isOwnProfile = currentUser && currentUser.id === userId;

                    container.innerHTML = `
                        <div class="profile-header">
                            <div class="profile-avatar">${renderAvatar(profile)}</div>
                            <h1 class="profile-name">${escapeHtml(profile.name)}</h1>
                            <p class="profile-meta">Friend since ${formatDate(profile.member_since)}</p>
                        </div>
                        <div id="activity-container"></div>
                    `;

                    // Load full activity feed if viewing own profile (includes share links)
                    if (isOwnProfile) {
                        loadActivity(userId);
                    } else {
                        // Show the user's recent activity feed
                        renderPublicFeed(profile.recent_activity);
                    }
                } else if (response.status === 404) {
                    container.innerHTML = '<p style="text-align: center;">User not found.</p>';
                } else {
                    throw new Error('Failed to load');
                }
            } catch (error) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Failed to load profile.</p>';
            }
        }

        function getCurrentUser() {
            const userStr = localStorage.getItem('comment_user');
            return userStr ? JSON.parse(userStr) : null;
        }

        function renderPublicFeed(activity) {
            const container = document.getElementById('activity-container');
            if (!activity || activity.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No recent activity.</p>';
                return;
            }

            container.innerHTML = `
                <div class="activity-feed">
                    <h3>Recent Activity</h3>
                    ${activity.map(item => `
                        <div class="activity-item comment">
                            <div class="activity-type comment">Comment</div>
                            <a href="/socialnet/post.html?slug=${item.post_slug}" class="activity-post-link">${escapeHtml(item.post_title)}</a>
                            <div class="activity-content">${escapeHtml(item.content)}</div>
                            <div class="activity-meta">${formatRelativeTime(item.created_at)}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function loadActivity(userId) {
            const container = document.getElementById('activity-container');
            const token = localStorage.getItem('comment_token');

            if (!token) {
                showPublicComments([]);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/users/${userId}/activity`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    renderActivityFeed(data.activity);
                } else {
                    container.innerHTML = '<p style="color: var(--text-muted);">Could not load activity.</p>';
                }
            } catch (error) {
                container.innerHTML = '<p style="color: var(--text-muted);">Could not load activity.</p>';
            }
        }

        function renderActivityFeed(activity) {
            const container = document.getElementById('activity-container');

            if (!activity || activity.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No recent activity.</p>';
                return;
            }

            const html = activity.map(item => {
                if (item.type === 'share_link') {
                    return renderShareLinkActivity(item);
                } else if (item.type === 'comment') {
                    return renderCommentActivity(item);
                }
                return '';
            }).join('');

            container.innerHTML = `
                <div class="activity-feed">
                    <h3>Your Activity</h3>
                    ${html}
                </div>
            `;
        }

        function renderShareLinkActivity(item) {
            const statusBadge = item.is_expired
                ? '<span class="access-badge expired-badge">Expired</span>'
                : `<span class="access-badge">${item.access_count} ${item.access_count === 1 ? 'click' : 'clicks'}</span>`;

            const accessList = item.accesses.length > 0
                ? `<div class="access-list">
                    ${item.accesses.map(a => `<div>Accessed ${formatRelativeTime(a.accessed_at)}</div>`).join('')}
                   </div>`
                : '';

            return `
                <div class="activity-item share-link">
                    <div class="activity-type share">Shared link</div>
                    <a href="/socialnet/post.html?slug=${item.post_slug}" class="activity-post-link">${escapeHtml(item.post_title)}</a>
                    ${statusBadge}
                    <div class="activity-meta">
                        Created ${formatRelativeTime(item.created_at)}
                        ${!item.is_expired ? ` · Expires ${formatRelativeTime(item.expires_at)}` : ''}
                    </div>
                    ${accessList}
                </div>
            `;
        }

        function renderCommentActivity(item) {
            return `
                <div class="activity-item comment">
                    <div class="activity-type comment">Comment</div>
                    <a href="/socialnet/post.html?slug=${item.post_slug}" class="activity-post-link">${escapeHtml(item.post_title)}</a>
                    <div class="activity-content">${escapeHtml(item.content)}</div>
                    <div class="activity-meta">${formatRelativeTime(item.created_at)}</div>
                </div>
            `;
        }

        function formatRelativeTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return formatDate(dateString);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
