<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading... - Joshua Freeman</title>
    <meta name="description" id="page-description" content="">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Open Graph -->
    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-description" content="">
    <meta property="og:image" content="https://joshfreeman.me/resources/big_icon.jpg">
    <meta property="og:url" id="og-url" content="">
    <meta property="og:type" content="article">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/blog.css">

    <style>
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e0e0e0;
            border-top-color: var(--primary-color, #6366f1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        /* Share buttons */
        .share-btn-inline {
            background: none;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 0.35rem 0.75rem;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-color);
            margin-left: 1rem;
            transition: all 0.2s;
        }
        .share-btn-inline:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(99, 102, 241, 0.05);
        }

        .share-btn-prominent {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
        }
        .share-btn-prominent:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
        }

        .forest-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--primary-color);
            font-size: 0.95rem;
            padding: 0.6rem 0;
        }

        /* Heart icon styles */
        .heart-icon {
            color: #9ca3af;
            transition: all 0.2s ease;
        }
        .heart-icon.active {
            color: #ef4444;
            fill: #ef4444;
        }
        .heart-icon-small {
            width: 18px;
            height: 18px;
            vertical-align: middle;
        }
        #reaction-btn:hover .heart-icon:not(.active) {
            color: #fca5a5;
        }
    </style>

    <!-- Set initial OG title from URL slug for better previews -->
    <script>
        (function() {
            var slug = new URLSearchParams(window.location.search).get('slug');
            if (slug) {
                var title = slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                document.title = title + ' - Joshua Freeman';
                var ogTitle = document.querySelector('meta[property="og:title"]');
                if (ogTitle) ogTitle.content = title + ' - Joshua Freeman';
            }
        })();
    </script>

    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Cytoscape.js for graph visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
</head>
<body>
    <div id="main">
        <!-- Sidebar -->
        <sidebar>
            <script src="/sidebar.js"></script>
        </sidebar>

        <article class="post-container">
            <a href="/blog.html" class="back-link">Back to blog</a>

            <header class="post-header">
                <h1 id="post-title"><span class="loading-spinner"></span>Loading...</h1>
                <p class="post-meta">
                    <time id="post-date" datetime=""></time>
                    <span id="reaction-container" style="margin-left: 1rem;">
                        <button id="reaction-btn" onclick="toggleReaction()" style="background: none; border: none; cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 6px; transition: background 0.2s; display: inline-flex; align-items: center; gap: 0.3rem;" title="Add your reaction">
                            <svg id="reaction-icon" class="heart-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z"/></svg>
                            <span id="reaction-count" style="font-size: 0.9rem; color: var(--text-muted);">0</span>
                        </button>
                    </span>
                    <span id="admin-actions" style="display: none; margin-left: 1rem;">
                        <button class="btn-link" onclick="editPost()">edit</button>
                        <button class="btn-link btn-danger" onclick="deletePost()">delete</button>
                    </span>
                    <button id="share-btn-header" onclick="openShareModal()" class="share-btn-inline" title="Share this post">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                        Share
                    </button>
                </p>
            </header>

            <div id="post-content" class="post-content">
                <p class="loading-text"><span class="loading-spinner"></span>Loading post content...</p>
            </div>

            <!-- Share & Reaction Actions -->
            <div id="post-actions" style="margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
                <button id="share-btn-footer" onclick="openShareModal()" class="share-btn-prominent">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                    Share this post
                </button>
                <button onclick="openReactionForest()" class="forest-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M10 10v.2A3 3 0 0 1 8.9 16H5a3 3 0 0 1-1-5.8V10a3 3 0 0 1 6 0Z"/><path d="M7 16v6"/><path d="M13 19v3"/><path d="M12 19h8.3a1 1 0 0 0 .7-1.7L18 14h.3a1 1 0 0 0 .7-1.7L16 9h.2a1 1 0 0 0 .8-1.7L13 3l-1.4 1.5"/></svg>
                    View Reaction Forest <span id="forest-count" style="color: var(--text-muted);"></span>
                </button>
            </div>

            <!-- Comments Section -->
            <section class="comments-section">
                <h2>Comments</h2>
                <div id="comments-container">
                    <p class="comments-loading">Loading comments...</p>
                </div>
                <div id="comment-form-container">
                    <p class="comment-login-notice">
                        <a href="#" id="login-link">Log in</a> to leave a comment.
                    </p>
                    <p style="background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; margin-top: 0.5rem; border-left: 4px solid #f59e0b;">
                        <strong>Looking for a signup link?</strong> There isn't one! Comments are invite-only. Ask me (Josh :) for an invite if you think I forgot to send you one!
                    </p>
                </div>
            </section>
        </article>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="/submenus.js"></script>

    <script>
        // Define these before comments.js loads so it can use them
        const API_BASE = 'https://api.joshfreeman.me';
        window.COMMENTS_API_BASE = API_BASE;

        function getPostSlug() {
            // Get slug from URL parameter
            const params = new URLSearchParams(window.location.search);
            return params.get('slug');
        }
    </script>

    <script src="/comments.js" defer></script>

    <script>
        let currentPost = null;  // Store current post data for sharing

        function formatPostDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function loadPost() {
            const slug = getPostSlug();
            if (!slug) {
                document.getElementById('post-title').textContent = 'Post Not Found';
                document.getElementById('post-content').innerHTML = '<p>No post specified. <a href="/blog.html">Back to blog</a></p>';
                return;
            }

            try {
                // Include auth token if logged in (for exclusive posts)
                const token = localStorage.getItem('comment_token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const response = await fetch(`${API_BASE}/posts/${slug}`, { headers, credentials: 'include' });

                if (response.ok) {
                    const post = await response.json();
                    currentPost = post;  // Store for sharing

                    // Update page metadata
                    document.getElementById('page-title').textContent = `${post.title} - Joshua Freeman`;
                    document.getElementById('page-description').content = post.excerpt || '';
                    document.getElementById('og-title').content = `${post.title} - Joshua Freeman`;
                    document.getElementById('og-description').content = post.excerpt || '';
                    document.getElementById('og-url').content = `https://joshfreeman.me/blog/post.html?slug=${slug}`;

                    // Update content
                    document.getElementById('post-title').innerHTML = post.title + (post.is_exclusive ? ' <span class="exclusive-badge" onclick="showExclusiveModal()" title="Click for info">Friends Only</span>' : '') + (post.is_unlisted ? ' <span class="unlisted-badge" title="Unlisted - not shown in blog listing">Unlisted</span>' : '');
                    document.getElementById('post-date').textContent = formatPostDate(post.created_at);
                    document.getElementById('post-date').setAttribute('datetime', post.created_at.split('T')[0]);

                    // Render markdown content
                    document.getElementById('post-content').innerHTML = marked.parse(post.content);

                    // Style blockquotes based on content
                    styleBlockquotes();
                } else if (response.status === 401 || response.status === 404) {
                    // Show same message for 401 (exclusive) and 404 (not found) to avoid leaking info
                    document.getElementById('post-title').textContent = 'Post Not Found';
                    document.getElementById('post-content').innerHTML = `
                        <p>This post does not exist or has been removed. <a href="/blog.html">Back to blog</a></p>
                        ${response.status === 401 && !localStorage.getItem('comment_token') ? '<p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 1.5rem;">Think this post should exist? Try <a href="#" onclick="showLogin(); return false;">logging in</a>, or ask me (Josh :) for an invite if you don\'t have an account.</p>' : ''}
                    `;
                    // Hide reactions and comments
                    document.getElementById('reaction-container').style.display = 'none';
                    document.getElementById('forest-link').style.display = 'none';
                    document.querySelector('.comments-section').style.display = 'none';
                } else {
                    throw new Error('Failed to load');
                }
            } catch (error) {
                document.getElementById('post-title').textContent = 'Error Loading Post';
                document.getElementById('post-content').innerHTML = '<p>Failed to load post content. Please try again later. <a href="/blog.html">Back to blog</a></p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadPost);

        // Style blockquotes based on content (note, warning, tip)
        function styleBlockquotes() {
            const blockquotes = document.querySelectorAll('.post-content blockquote');
            blockquotes.forEach(bq => {
                const text = bq.textContent.toLowerCase().trim();
                // Check start of text for keywords (with flexible spacing/punctuation)
                if (text.includes('⚠️') || /^warning\b/i.test(text) || text.includes('/!\\')) {
                    bq.classList.add('warning');
                } else if (text.includes('💡') || /^tip\b/i.test(text)) {
                    bq.classList.add('tip');
                } else if (text.includes('ℹ️') || /^note\b/i.test(text)) {
                    bq.classList.add('note');
                }
            });
        }

        // Check if user is admin and show edit/delete buttons
        function checkAdminActions() {
            const userStr = localStorage.getItem('comment_user');
            if (userStr) {
                const user = JSON.parse(userStr);
                if (user.is_admin) {
                    document.getElementById('admin-actions').style.display = 'inline';
                }
            }
        }

        // Check if user can generate 24h access links for this post
        function canGenerateTempLink() {
            if (!currentPost || !currentPost.is_exclusive) return false;

            const userStr = localStorage.getItem('comment_user');
            const token = localStorage.getItem('comment_token');
            if (!userStr || !token) return false;

            const user = JSON.parse(userStr);
            const isMentioned = currentPost.content.toLowerCase().includes(user.name.toLowerCase());
            return user.is_admin || isMentioned;
        }

        // Open the share modal - works for all posts
        function openShareModal() {
            if (!currentPost) return;

            const postUrl = window.location.href;
            const isExclusive = currentPost.is_exclusive;
            const canGenerate = canGenerateTempLink();

            const modal = document.createElement('div');
            modal.id = 'share-modal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                padding: 1rem;
            `;

            let content = '';

            if (!isExclusive) {
                // PUBLIC POST - simple share
                content = `
                    <div style="background: white; padding: 1.75rem; border-radius: 12px; max-width: 440px; width: 100%;">
                        <h3 style="margin: 0 0 1rem; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                            Share this post
                        </h3>
                        <div style="position: relative;">
                            <input type="text" id="share-url-main" value="${postUrl}" readonly
                                style="width: 100%; padding: 0.7rem 0.9rem; padding-right: 70px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 0.85rem; background: #f9fafb;"
                                onclick="this.select()">
                            <button onclick="copyUrl('share-url-main', this)" style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%); padding: 0.4rem 0.7rem; background: var(--primary-color, #6366f1); color: white; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer;">Copy</button>
                        </div>
                        <button onclick="closeShareModal()" style="width: 100%; margin-top: 1rem; padding: 0.6rem; background: #f3f4f6; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem;">Done</button>
                    </div>
                `;
            } else {
                // FRIENDS-ONLY POST
                content = `
                    <div style="background: white; padding: 1.75rem; border-radius: 12px; max-width: 440px; width: 100%;">
                        <h3 style="margin: 0 0 0.75rem; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                            Share this post
                        </h3>

                        <div style="background: #fef3c7; border-left: 3px solid #f59e0b; padding: 0.6rem 0.8rem; border-radius: 0 6px 6px 0; margin-bottom: 1rem;">
                            <p style="margin: 0; font-size: 0.85rem; color: #92400e;">
                                <strong>Friends-only post</strong> — this link only works for people with blog access.
                            </p>
                        </div>

                        <div style="margin-bottom: 1rem;">
                            <label style="font-size: 0.8rem; color: #6b7280; display: block; margin-bottom: 0.3rem;">Link for members</label>
                            <div style="position: relative;">
                                <input type="text" id="share-url-main" value="${postUrl}" readonly
                                    style="width: 100%; padding: 0.6rem 0.8rem; padding-right: 65px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 0.8rem; background: #f9fafb;"
                                    onclick="this.select()">
                                <button onclick="copyUrl('share-url-main', this)" style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%); padding: 0.35rem 0.6rem; background: #6b7280; color: white; border: none; border-radius: 5px; font-size: 0.75rem; cursor: pointer;">Copy</button>
                            </div>
                        </div>

                        ${canGenerate ? `
                        <div style="border-top: 1px solid #e5e7eb; padding-top: 1rem; margin-top: 0.5rem;">
                            <div style="background: linear-gradient(135deg, #ede9fe, #e0e7ff); padding: 0.7rem 0.9rem; border-radius: 8px; margin-bottom: 0.75rem;">
                                <p style="margin: 0; font-size: 0.85rem; color: #5b21b6;">
                                    <strong>You can share with anyone!</strong><br>
                                    <span style="font-size: 0.8rem; opacity: 0.9;">Generate a 24-hour access link that works without login.</span>
                                </p>
                            </div>
                            <div id="temp-link-section">
                                <button onclick="generateTempLink()" id="generate-temp-btn" style="width: 100%; padding: 0.65rem; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500;">
                                    Generate 24-hour link
                                </button>
                            </div>
                        </div>
                        ` : ''}

                        <button onclick="closeShareModal()" style="width: 100%; margin-top: 1rem; padding: 0.6rem; background: #f3f4f6; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem;">Done</button>
                    </div>
                `;
            }

            modal.innerHTML = content;
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeShareModal();
            });
        }

        // Generate temporary 24h access link
        async function generateTempLink() {
            const btn = document.getElementById('generate-temp-btn');
            const section = document.getElementById('temp-link-section');
            const token = localStorage.getItem('comment_token');
            const slug = getPostSlug();

            btn.disabled = true;
            btn.textContent = 'Generating...';

            try {
                const response = await fetch(`${API_BASE}/posts/${slug}/share`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    section.innerHTML = `
                        <label style="font-size: 0.8rem; color: #6b7280; display: block; margin-bottom: 0.3rem;">24-hour access link</label>
                        <div style="position: relative; margin-bottom: 0.5rem;">
                            <input type="text" id="share-url-temp" value="${data.share_url}" readonly
                                style="width: 100%; padding: 0.6rem 0.8rem; padding-right: 65px; border: 1px solid #8b5cf6; border-radius: 8px; font-size: 0.8rem; background: #faf5ff;"
                                onclick="this.select()">
                            <button onclick="copyUrl('share-url-temp', this)" style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%); padding: 0.35rem 0.6rem; background: #8b5cf6; color: white; border: none; border-radius: 5px; font-size: 0.75rem; cursor: pointer;">Copy</button>
                        </div>
                        <p style="margin: 0; font-size: 0.75rem; color: #6b7280;">
                            Expires ${new Date(data.expires_at).toLocaleString()}
                        </p>
                    `;
                } else {
                    const error = await response.json();
                    btn.disabled = false;
                    btn.textContent = 'Generate 24-hour link';
                    alert(error.detail || 'Failed to generate link');
                }
            } catch (error) {
                btn.disabled = false;
                btn.textContent = 'Generate 24-hour link';
                alert('Failed to generate link');
            }
        }

        // Copy URL helper
        function copyUrl(inputId, btn) {
            const input = document.getElementById(inputId);
            input.select();
            document.execCommand('copy');
            const originalText = btn.textContent;
            btn.textContent = '✓';
            btn.style.background = '#10b981';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
            }, 1500);
        }

        function closeShareModal() {
            const modal = document.getElementById('share-modal');
            if (modal) modal.remove();
        }

        // Edit post - opens modal with markdown editor
        function editPost() {
            const slug = getPostSlug();
            if (!slug) return;

            const token = localStorage.getItem('comment_token');
            if (!token) {
                alert('Please log in first');
                return;
            }

            // Fetch current content and show edit modal
            fetch(`${API_BASE}/admin/posts/${slug}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(post => {
                showEditModal(post);
            })
            .catch(() => alert('Failed to load post for editing'));
        }

        function showEditModal(post) {
            const modal = document.createElement('div');
            modal.id = 'edit-post-modal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                padding: 1rem;
            `;
            modal.innerHTML = `
                <div style="background: white; padding: 2rem; border-radius: 12px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto;">
                    <h3 style="margin-bottom: 1rem;">Edit Post</h3>
                    <form id="edit-post-form">
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Title</label>
                            <input type="text" id="edit-post-title" value="${post.title.replace(/"/g, '&quot;')}" style="width: 100%; padding: 0.75rem; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem;">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Excerpt</label>
                            <input type="text" id="edit-post-excerpt" value="${(post.excerpt || '').replace(/"/g, '&quot;')}" style="width: 100%; padding: 0.75rem; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem;">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Content (Markdown)</label>
                            <textarea id="edit-post-content" style="width: 100%; min-height: 300px; padding: 0.75rem; border: 1px solid #e0e0e0; border-radius: 8px; font-family: Monaco, Menlo, monospace; font-size: 0.9rem; resize: vertical;">${post.content.replace(/</g, '&lt;')}</textarea>
                        </div>
                        <div style="margin-bottom: 1rem; display: flex; gap: 2rem; flex-wrap: wrap;">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="edit-post-published" ${post.is_published ? 'checked' : ''}>
                                Published
                            </label>
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="edit-post-exclusive" ${post.is_exclusive ? 'checked' : ''}>
                                🔒 Friends Only
                            </label>
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="edit-post-unlisted" ${post.is_unlisted ? 'checked' : ''}>
                                👻 Unlisted
                            </label>
                        </div>
                        <div style="display: flex; gap: 1rem;">
                            <button type="submit" class="btn btn-primary" style="flex: 1;">Save</button>
                            <button type="button" onclick="closeEditModal()" class="btn" style="flex: 1; background: #e0e0e0;">Cancel</button>
                        </div>
                        <p id="edit-post-error" style="color: #e74c3c; margin-top: 1rem; display: none;"></p>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('edit-post-form').onsubmit = (e) => {
                e.preventDefault();
                savePostEdit(post.slug);
            };
        }

        function closeEditModal() {
            const modal = document.getElementById('edit-post-modal');
            if (modal) modal.remove();
        }

        async function savePostEdit(slug) {
            const token = localStorage.getItem('comment_token');
            const errorEl = document.getElementById('edit-post-error');
            const saveBtn = document.querySelector('#edit-post-form button[type="submit"]');

            // Disable button and show saving state
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';
            }

            const postData = {
                title: document.getElementById('edit-post-title').value,
                excerpt: document.getElementById('edit-post-excerpt').value,
                content: document.getElementById('edit-post-content').value,
                is_published: document.getElementById('edit-post-published').checked,
                is_exclusive: document.getElementById('edit-post-exclusive').checked,
                is_unlisted: document.getElementById('edit-post-unlisted').checked
            };

            // Set a timeout to close modal after 5 seconds regardless of response
            // This is a fallback in case something goes wrong with response handling
            const timeoutId = setTimeout(() => {
                console.log('Save timeout - closing modal anyway');
                closeEditModal();
                loadPost();
            }, 5000);

            try {
                const response = await fetch(`${API_BASE}/admin/posts/${slug}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(postData)
                });

                clearTimeout(timeoutId);
                console.log('Save response:', response.status, response.ok, response.statusText);

                // Check for success (any 2xx status)
                if (response.status >= 200 && response.status < 300) {
                    closeEditModal();
                    loadPost();
                    return;
                }

                // Handle error response
                let errorMsg = `Failed to save (${response.status})`;
                try {
                    const error = await response.json();
                    errorMsg = error.detail || errorMsg;
                } catch (e) {
                    console.log('Could not parse error response');
                }

                if (errorEl) {
                    errorEl.textContent = errorMsg;
                    errorEl.style.display = 'block';
                }
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Save';
                }
            } catch (error) {
                clearTimeout(timeoutId);
                console.error('Save error:', error);
                // Network error or similar - close modal and reload since save may have worked
                closeEditModal();
                loadPost();
            }
        }

        // Delete post
        async function deletePost() {
            const slug = getPostSlug();
            if (!slug) return;

            if (!confirm('Are you sure you want to delete this post? This will also delete all comments.')) return;

            const token = localStorage.getItem('comment_token');

            try {
                const response = await fetch(`${API_BASE}/admin/posts/${slug}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    window.location.href = '/blog.html';
                } else {
                    alert('Failed to delete post');
                }
            } catch (error) {
                alert('Failed to delete post');
            }
        }

        // Run after page loads
        document.addEventListener('DOMContentLoaded', checkAdminActions);

        // Reactions
        let userReacted = false;
        let userReactionId = null;
        let maxReactionDepth = 3;
        let currentUser = null;

        async function loadReactions() {
            const slug = getPostSlug();
            if (!slug) return;

            const token = localStorage.getItem('comment_token');
            const userStr = localStorage.getItem('comment_user');
            if (userStr) currentUser = JSON.parse(userStr);

            // Load top-level reaction status
            const endpoint = token ? `${API_BASE}/reactions/${slug}/me` : `${API_BASE}/reactions/${slug}`;
            try {
                const response = await fetch(endpoint, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                    credentials: 'include'
                });
                if (response.ok) {
                    const data = await response.json();
                    userReacted = data.user_reacted;
                    userReactionId = data.reaction_id;
                    updateReactionUI(data.count, data.user_reacted);
                }
            } catch (error) {
                console.log('Could not load reactions');
            }

            // Load reaction tree
            loadReactionTree();
        }

        async function loadReactionTree() {
            const slug = getPostSlug();
            const token = localStorage.getItem('comment_token');
            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}/tree`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                    credentials: 'include'
                });
                if (response.ok) {
                    const data = await response.json();
                    maxReactionDepth = data.max_depth;
                    renderReactionTree(data.reactions);
                }
            } catch (error) {
                console.log('Could not load reaction tree');
            }
        }

        let forestView = 'tree'; // 'tree' or 'graph'
        let cachedReactions = null;

        function openReactionForest() {
            const modal = document.createElement('div');
            modal.id = 'forest-modal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                padding: 1rem;
            `;

            const token = localStorage.getItem('comment_token');
            let legendHtml = '<span>Click to react</span>';
            if (token) {
                legendHtml += '<span>Right-click to remove</span>';
            }

            modal.innerHTML = `
                <div style="background: white; padding: 1.5rem; border-radius: 16px; max-width: 600px; width: 95%; max-height: 80vh; overflow-y: auto;">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                        <h3 style="margin: 0; display: flex; align-items: center; gap: 0.5rem;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 10v.2A3 3 0 0 1 8.9 16H5a3 3 0 0 1-1-5.8V10a3 3 0 0 1 6 0Z"/><path d="M7 16v6"/><path d="M13 19v3"/><path d="M12 19h8.3a1 1 0 0 0 .7-1.7L18 14h.3a1 1 0 0 0 .7-1.7L16 9h.2a1 1 0 0 0 .8-1.7L13 3l-1.4 1.5"/></svg> Reaction Forest</h3>
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div id="modal-view-toggle" style="display: flex; gap: 0.25rem; background: #eee; padding: 0.2rem; border-radius: 6px;">
                                <button onclick="setForestView('tree')" id="view-tree-btn" style="padding: 0.3rem 0.6rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; background: white;">Tree</button>
                                <button onclick="setForestView('graph')" id="view-graph-btn" style="padding: 0.3rem 0.6rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; background: transparent;">Graph</button>
                            </div>
                            <button onclick="closeForestModal()" style="background: none; border: none; cursor: pointer; font-size: 1.5rem; color: #999;">&times;</button>
                        </div>
                    </div>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">Click on hearts to react to reactions</p>
                    <div id="forest-tree" style="min-height: 100px;"></div>
                    <div id="forest-graph" style="display: none; height: 350px; border-radius: 12px; background: #f8f9fa; border: 1px solid #eee;"></div>
                    <div id="forest-legend" style="display: flex; gap: 1.5rem; margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted); flex-wrap: wrap; justify-content: center;">
                        ${legendHtml}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeForestModal();
            });

            // Render the tree view
            if (cachedReactions) {
                if (forestView === 'tree') {
                    renderTreeView(cachedReactions);
                } else {
                    renderGraphView(cachedReactions);
                }
            }
        }

        function closeForestModal() {
            const modal = document.getElementById('forest-modal');
            if (modal) modal.remove();
            // Clean up tooltip
            const tooltip = document.getElementById('cy-tooltip');
            if (tooltip) tooltip.remove();
        }

        function setForestView(view) {
            forestView = view;
            const treeBtn = document.getElementById('view-tree-btn');
            const graphBtn = document.getElementById('view-graph-btn');
            if (treeBtn) treeBtn.style.background = view === 'tree' ? 'white' : 'transparent';
            if (graphBtn) graphBtn.style.background = view === 'graph' ? 'white' : 'transparent';

            const tree = document.getElementById('forest-tree');
            const graph = document.getElementById('forest-graph');

            if (view === 'tree') {
                if (tree) tree.style.display = 'block';
                if (graph) graph.style.display = 'none';
                if (cachedReactions) renderTreeView(cachedReactions);
            } else {
                if (tree) tree.style.display = 'none';
                if (graph) graph.style.display = 'block';
                if (cachedReactions) renderGraphView(cachedReactions);
            }
        }

        function getDistinctUsers(reaction) {
            // Get all distinct user IDs in this reaction's subtree
            const users = new Set([reaction.user_id]);
            if (reaction.children) {
                for (const child of reaction.children) {
                    const childUsers = getDistinctUsers(child);
                    childUsers.forEach(u => users.add(u));
                }
            }
            return users;
        }

        let cy = null; // Cytoscape instance

        function renderReactionTree(reactions) {
            cachedReactions = reactions;
            const token = localStorage.getItem('comment_token');

            // Calculate total distinct users
            const allUsers = new Set();
            function collectUsers(r) {
                allUsers.add(r.user_id);
                if (r.children) r.children.forEach(collectUsers);
            }
            reactions.forEach(collectUsers);
            const count = allUsers.size;

            // Update forest link count
            const forestCountEl = document.getElementById('forest-count');
            if (forestCountEl) {
                forestCountEl.textContent = count > 0 ? `(${count} ${count === 1 ? 'person' : 'people'})` : '';
            }

            // Update the top heart count with total distinct users
            document.getElementById('reaction-count').textContent = count;

            // Check if current user has any reaction in the forest
            const userHasReaction = currentUser && allUsers.has(currentUser.id);
            const iconEl = document.getElementById('reaction-icon');
            if (userHasReaction) {
                iconEl.classList.add('active');
            } else {
                iconEl.classList.remove('active');
            }
            document.getElementById('reaction-btn').style.background = userHasReaction ? 'rgba(239, 68, 68, 0.1)' : 'none';

            // If modal is open, render into it
            const modalTree = document.getElementById('forest-tree');
            const modalGraph = document.getElementById('forest-graph');

            if (!reactions || reactions.length === 0) {
                const emptyHtml = `
                    <div style="text-align: center; padding: 2rem; color: var(--text-muted);">
                        <div style="margin-bottom: 0.75rem;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V12"/><path d="M12 12C12 12 8 9 8 6c0-2.2 1.8-4 4-4s4 1.8 4 4c0 3-4 6-4 6z"/><path d="M12 12c0 0-4-1-6-3"/><path d="M12 12c0 0 4-1 6-3"/></svg></div>
                        <div style="font-size: 1.1rem;">No reactions yet</div>
                        <div style="margin-top: 0.5rem;">Be the first to plant a heart!</div>
                        ${token ? `<button onclick="toggleReaction(); closeForestModal();" style="margin-top: 1.25rem; padding: 0.6rem 1.25rem; background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; box-shadow: 0 2px 8px rgba(239,68,68,0.3); display: inline-flex; align-items: center; gap: 0.5rem;"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z"/></svg> Add Reaction</button>` : ''}
                    </div>
                `;
                if (modalTree) modalTree.innerHTML = emptyHtml;
                if (modalGraph) modalGraph.innerHTML = emptyHtml;
                return;
            }

            // Render active view if modal is open
            if (modalTree || modalGraph) {
                if (forestView === 'tree') {
                    renderTreeView(reactions);
                } else {
                    renderGraphView(reactions);
                }
            }
        }

        function renderTreeView(reactions) {
            const container = document.getElementById('forest-tree');
            const token = localStorage.getItem('comment_token');

            function renderNode(r, depth = 0) {
                const indent = depth > 0 ? `<span style="color: #ddd; margin-right: 0.25rem;">${'│ '.repeat(depth - 1)}├─</span>` : '';
                const isOwn = currentUser && currentUser.id === r.user_id;
                const canReact = token && r.depth < maxReactionDepth;
                const canDelete = isOwn || (currentUser && currentUser.is_admin);

                let childrenHtml = '';
                if (r.children && r.children.length > 0) {
                    childrenHtml = r.children.map(c => renderNode(c, depth + 1)).join('');
                }

                const heartColor = '#ef4444';
                const heartSvg = `<svg width="18" height="18" viewBox="0 0 24 24" fill="${heartColor}" stroke="none" style="cursor: ${canReact ? 'pointer' : 'default'}; vertical-align: middle;" onclick="${canReact ? `reactToReaction(${r.id})` : ''}" title="${canReact ? 'Click to react' : ''}"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z"/></svg>`;

                return `
                    <div class="tree-node" style="padding: 0.35rem 0; font-size: 0.95rem; display: flex; align-items: center; gap: 0.4rem;">
                        ${indent}
                        ${heartSvg}
                        <a href="/profile.html?id=${r.user_id}" style="font-weight: 500; color: inherit; text-decoration: none;" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='inherit'">${r.user_name}</a>
                        ${canDelete ? `<button onclick="removeReaction(${r.id})" style="background: none; border: none; cursor: pointer; color: #ccc; font-size: 0.8rem; padding: 0 0.25rem;" title="Remove">✕</button>` : ''}
                    </div>
                    ${childrenHtml}
                `;
            }

            container.innerHTML = reactions.map(r => renderNode(r, 0)).join('');
        }

        function renderGraphView(reactions) {
            const container = document.getElementById('forest-graph');
            const token = localStorage.getItem('comment_token');

            container.innerHTML = '';
            container.style.height = '350px';

            // SVG heart with initial badge as data URL for Cytoscape nodes
            function makeHeartWithInitial(name) {
                const initial = name ? name.charAt(0).toUpperCase() : '?';
                // Heart fills most of viewBox, small avatar badge at top-left corner
                const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.5 5.5 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.5 3 21 5.5 21 8.5C21 14.5 12 21 12 21Z" fill="#ef4444"/><circle cx="5" cy="5" r="4.5" fill="#6366f1"/><text x="5" y="6.5" text-anchor="middle" fill="white" font-size="6" font-weight="600">' + initial + '</text></svg>';
                return 'data:image/svg+xml,' + encodeURIComponent(svg);
            }

            // Build nodes and edges for Cytoscape
            const elements = [];

            function addNodes(r, parentId = null) {
                const isOwn = currentUser && currentUser.id === r.user_id;
                elements.push({
                    data: {
                        id: 'r' + r.id,
                        heartImg: makeHeartWithInitial(r.user_name),
                        name: r.user_name,
                        reactionId: r.id,
                        depth: r.depth,
                        isOwn: isOwn
                    }
                });

                if (parentId) {
                    elements.push({
                        data: {
                            source: parentId,
                            target: 'r' + r.id
                        }
                    });
                }

                if (r.children) {
                    r.children.forEach(child => addNodes(child, 'r' + r.id));
                }
            }

            reactions.forEach(r => addNodes(r));

            // Initialize Cytoscape
            cy = cytoscape({
                container: container,
                elements: elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'width': 85,
                            'height': 85,
                            'background-opacity': 0,
                            'background-image': 'data(heartImg)',
                            'background-fit': 'contain',
                            'background-width': '100%',
                            'background-height': '100%',
                            'border-width': 0,
                            'cursor': 'pointer'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': '#e0e0e0',
                            'curve-style': 'bezier',
                            'target-arrow-shape': 'none'
                        }
                    }
                ],
                layout: {
                    name: 'breadthfirst',
                    directed: true,
                    padding: 20,
                    spacingFactor: 1.4,
                    avoidOverlap: true
                },
                userZoomingEnabled: false,
                userPanningEnabled: true,
                boxSelectionEnabled: false
            });

            // Remove old tooltip if exists
            const oldTooltip = document.getElementById('cy-tooltip');
            if (oldTooltip) oldTooltip.remove();

            // Show name on hover
            const tooltip = document.createElement('div');
            tooltip.id = 'cy-tooltip';
            tooltip.style.cssText = 'position: fixed; background: #333; color: white; padding: 6px 12px; border-radius: 6px; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); pointer-events: none; display: none; z-index: 1000;';
            document.body.appendChild(tooltip);

            cy.on('mouseover', 'node', function(e) {
                const node = e.target;
                tooltip.textContent = node.data('name');
                tooltip.style.display = 'block';
            });

            cy.on('mousemove', 'node', function(e) {
                tooltip.style.left = e.originalEvent.clientX + 15 + 'px';
                tooltip.style.top = e.originalEvent.clientY - 10 + 'px';
            });

            cy.on('mouseout', 'node', function(e) {
                tooltip.style.display = 'none';
            });

            // Click to react (not delete)
            cy.on('tap', 'node', function(e) {
                const node = e.target;
                const reactionId = node.data('reactionId');
                const depth = node.data('depth');

                if (token && depth < maxReactionDepth) {
                    reactToReaction(reactionId);
                } else if (!token) {
                    alert('Please log in to react');
                } else {
                    alert('Maximum reaction depth reached');
                }
            });

            // Right-click to delete (if own or admin)
            cy.on('cxttap', 'node', function(e) {
                const node = e.target;
                const reactionId = node.data('reactionId');
                const isOwn = node.data('isOwn');

                if (isOwn || (currentUser && currentUser.is_admin)) {
                    if (confirm(`Remove ${node.data('name')}'s reaction?`)) {
                        removeReaction(reactionId);
                    }
                }
            });

            cy.fit(30);
        }

        function updateReactionUI(count, reacted, totalDistinct = null) {
            userReacted = reacted;
            // Note: Icon state is set by renderReactionTree() based on whether
            // user has ANY reaction in the forest, not just top-level.
            // This function only updates the count display.
            // totalDistinct is no longer used here - count comes from renderReactionTree.
        }

        async function toggleReaction() {
            const token = localStorage.getItem('comment_token');
            if (!token) {
                alert('Please log in to react');
                return;
            }

            const slug = getPostSlug();
            // Only toggle top-level reaction - add if no top-level, remove if has top-level
            const method = userReacted ? 'DELETE' : 'POST';

            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}`, {
                    method,
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    userReacted = data.user_reacted;
                    userReactionId = data.reaction_id;
                    loadReactionTree(); // Refresh the tree (this also updates the top count)
                } else if (response.status === 401) {
                    alert('Please log in to react');
                } else if (response.status === 400) {
                    // Already reacted at top level
                    const err = await response.json();
                    console.log(err.detail);
                }
            } catch (error) {
                console.log('Could not update reaction');
            }
        }

        async function reactToReaction(parentId) {
            const token = localStorage.getItem('comment_token');
            if (!token) {
                alert('Please log in to react');
                return;
            }

            const slug = getPostSlug();
            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}/${parentId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    loadReactionTree(); // Refresh the tree
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Could not add reaction');
                }
            } catch (error) {
                console.log('Could not add reaction');
            }
        }

        async function removeReaction(reactionId) {
            const token = localStorage.getItem('comment_token');
            if (!token) return;

            if (!confirm('Remove this reaction and all nested reactions?')) return;

            const slug = getPostSlug();
            try {
                const response = await fetch(`${API_BASE}/reactions/${slug}/${reactionId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    // Refresh everything
                    loadReactions();
                }
            } catch (error) {
                console.log('Could not remove reaction');
            }
        }

        document.addEventListener('DOMContentLoaded', loadReactions);
    </script>
</body>
</html>
