<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Freeman</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">
    <style>
        body { margin: 0; padding: 0; background: #050508; }
    </style>
</head>
<body>
<script>
(function() {
    const API_BASE = 'https://api.joshfreeman.me';
    const token = localStorage.getItem('comment_token');

    if (!token) {
        window.location.replace('/404.html');
        return;
    }

    fetch(`${API_BASE}/visitor-globe.html`, {
        headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(response => {
        if (!response.ok) {
            window.location.replace('/404.html');
            return null;
        }
        return response.text();
    })
    .then(html => {
        if (html) {
            document.open();
            document.write(html);
            document.close();
        }
    })
    .catch(() => {
        window.location.replace('/404.html');
    });
})();
</script>
</body>
</html>
