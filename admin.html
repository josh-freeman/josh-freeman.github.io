<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Joshua Freeman</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/buttons.css">
    <link rel="stylesheet" href="/blog.css">

    <!-- Marked.js for markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .admin-header h1 {
            margin: 0;
        }

        .login-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: #fafafa;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .login-container h2 {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group textarea {
            min-height: 300px;
            resize: vertical;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .post-item-info h3 {
            margin: 0 0 0.25rem 0;
            font-size: 1.1rem;
        }

        .post-item-info .meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .post-item-actions {
            display: flex;
            gap: 0.75rem;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-draft {
            background: #ffeeba;
            color: #856404;
        }

        .badge-published {
            background: #c3e6cb;
            color: #155724;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .preview-container {
            padding: 1rem;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            max-height: 500px;
            overflow-y: auto;
        }

        .preview-container h2 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--text-muted);
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .error-message {
            color: #e74c3c;
            margin-top: 1rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input {
            width: auto;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }

            .post-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="main" style="margin-left: 0;">
        <div class="admin-container">
            <!-- Login Section -->
            <div id="login-section" class="login-container">
                <h2>Admin Login</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
                    <p id="login-error" class="error-message" style="display: none;"></p>
                </form>
            </div>

            <!-- Admin Panel -->
            <div id="admin-panel" style="display: none;">
                <div class="admin-header">
                    <h1>Blog Admin</h1>
                    <div>
                        <span id="user-name" style="margin-right: 1rem;"></span>
                        <button class="btn" onclick="logout()">Logout</button>
                    </div>
                </div>

                <!-- Post List View -->
                <div id="post-list-view">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 style="margin: 0;">Posts</h2>
                        <button class="btn btn-primary" onclick="showEditor()">New Post</button>
                    </div>
                    <div id="post-list" class="post-list">
                        <p>Loading posts...</p>
                    </div>
                </div>

                <!-- Post Editor View -->
                <div id="post-editor-view" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 id="editor-title" style="margin: 0;">New Post</h2>
                        <button class="btn" onclick="hideEditor()">Back to List</button>
                    </div>

                    <form id="post-form" onsubmit="savePost(event)">
                        <div class="form-group">
                            <label for="post-slug">Slug (URL path)</label>
                            <input type="text" id="post-slug" pattern="[a-z0-9-]+" placeholder="my-post-title" required>
                        </div>

                        <div class="form-group">
                            <label for="post-title">Title</label>
                            <input type="text" id="post-title" placeholder="My Post Title" required>
                        </div>

                        <div class="form-group">
                            <label for="post-excerpt">Excerpt (short description)</label>
                            <input type="text" id="post-excerpt" placeholder="A brief description of the post...">
                        </div>

                        <div class="editor-container">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="post-content">Content (Markdown)</label>
                                <textarea id="post-content" placeholder="Write your post in Markdown..." oninput="updatePreview()"></textarea>
                            </div>

                            <div class="preview-container">
                                <h2>Preview</h2>
                                <div id="preview-content"></div>
                            </div>
                        </div>

                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="post-published">
                            <label for="post-published" style="margin-bottom: 0;">Published</label>
                        </div>

                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary">Save Post</button>
                            <button type="button" class="btn" id="delete-btn" onclick="deletePost()" style="background: #e74c3c; color: white; display: none;">Delete Post</button>
                        </div>

                        <p id="editor-error" class="error-message" style="display: none;"></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.joshfreeman.me';
        let currentSlug = null;

        // Check if already logged in
        function checkAuth() {
            const token = localStorage.getItem('comment_token');
            const user = localStorage.getItem('comment_user');

            if (token && user) {
                const userData = JSON.parse(user);
                if (userData.is_admin) {
                    showAdminPanel(userData);
                    return true;
                }
            }
            return false;
        }

        function showAdminPanel(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('user-name').textContent = user.name;
            loadPosts();
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (!data.user.is_admin) {
                        errorEl.textContent = 'Admin access required';
                        errorEl.style.display = 'block';
                        return;
                    }
                    localStorage.setItem('comment_token', data.token);
                    localStorage.setItem('comment_user', JSON.stringify(data.user));
                    showAdminPanel(data.user);
                } else {
                    const error = await response.json();
                    errorEl.textContent = error.detail || 'Invalid credentials';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Login failed';
                errorEl.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('comment_token');
            localStorage.removeItem('comment_user');
            location.reload();
        }

        async function loadPosts() {
            const token = localStorage.getItem('comment_token');
            const container = document.getElementById('post-list');

            try {
                const response = await fetch(`${API_BASE}/admin/posts`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const posts = await response.json();
                    if (posts.length === 0) {
                        container.innerHTML = '<p style="color: var(--text-muted);">No posts yet. Create your first post!</p>';
                        return;
                    }

                    container.innerHTML = posts.map(post => `
                        <div class="post-item">
                            <div class="post-item-info">
                                <h3>${escapeHtml(post.title)}</h3>
                                <div class="meta">
                                    <span class="badge ${post.is_published ? 'badge-published' : 'badge-draft'}">
                                        ${post.is_published ? 'Published' : 'Draft'}
                                    </span>
                                    &middot; /${post.slug} &middot; ${formatDate(post.created_at)}
                                </div>
                            </div>
                            <div class="post-item-actions">
                                <button class="btn" onclick="editPost('${post.slug}')">Edit</button>
                                <a href="/blog/${post.slug}.html" target="_blank" class="btn" ${!post.is_published ? 'style="opacity: 0.5;"' : ''}>View</a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="error-message">Failed to load posts</p>';
                }
            } catch (error) {
                container.innerHTML = '<p class="error-message">Failed to load posts</p>';
            }
        }

        function showEditor(slug = null) {
            currentSlug = slug;
            document.getElementById('post-list-view').style.display = 'none';
            document.getElementById('post-editor-view').style.display = 'block';
            document.getElementById('editor-title').textContent = slug ? 'Edit Post' : 'New Post';
            document.getElementById('delete-btn').style.display = slug ? 'inline-block' : 'none';
            document.getElementById('post-slug').disabled = !!slug;

            if (slug) {
                loadPost(slug);
            } else {
                document.getElementById('post-form').reset();
                document.getElementById('preview-content').innerHTML = '';
            }
        }

        function hideEditor() {
            document.getElementById('post-list-view').style.display = 'block';
            document.getElementById('post-editor-view').style.display = 'none';
            currentSlug = null;
            loadPosts();
        }

        async function loadPost(slug) {
            const token = localStorage.getItem('comment_token');

            try {
                const response = await fetch(`${API_BASE}/admin/posts/${slug}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const post = await response.json();
                    document.getElementById('post-slug').value = post.slug;
                    document.getElementById('post-title').value = post.title;
                    document.getElementById('post-excerpt').value = post.excerpt || '';
                    document.getElementById('post-content').value = post.content;
                    document.getElementById('post-published').checked = post.is_published;
                    updatePreview();
                }
            } catch (error) {
                alert('Failed to load post');
            }
        }

        async function savePost(event) {
            event.preventDefault();
            const token = localStorage.getItem('comment_token');
            const errorEl = document.getElementById('editor-error');

            const postData = {
                slug: document.getElementById('post-slug').value,
                title: document.getElementById('post-title').value,
                excerpt: document.getElementById('post-excerpt').value,
                content: document.getElementById('post-content').value,
                is_published: document.getElementById('post-published').checked
            };

            try {
                const url = currentSlug
                    ? `${API_BASE}/admin/posts/${currentSlug}`
                    : `${API_BASE}/admin/posts`;
                const method = currentSlug ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(postData)
                });

                if (response.ok) {
                    hideEditor();
                } else {
                    const error = await response.json();
                    errorEl.textContent = error.detail || 'Failed to save post';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Failed to save post';
                errorEl.style.display = 'block';
            }
        }

        async function deletePost() {
            if (!currentSlug) return;
            if (!confirm('Are you sure you want to delete this post? This will also delete all comments on it.')) return;

            const token = localStorage.getItem('comment_token');

            try {
                const response = await fetch(`${API_BASE}/admin/posts/${currentSlug}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    hideEditor();
                } else {
                    alert('Failed to delete post');
                }
            } catch (error) {
                alert('Failed to delete post');
            }
        }

        function editPost(slug) {
            showEditor(slug);
        }

        function updatePreview() {
            const content = document.getElementById('post-content').value;
            const preview = document.getElementById('preview-content');
            preview.innerHTML = marked.parse(content);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) {
                document.getElementById('login-section').style.display = 'block';
            }
        });
    </script>
</body>
</html>
