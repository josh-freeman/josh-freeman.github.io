    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">

    <script src="/js/theme.js"></script>
</head>
<body>
    <!-- Game of Life Background -->
    <canvas id="canvas"></canvas>

    <div id="main">
        <!-- Sidebar -->
        <sidebar>
            <script src="sidebar.js"></script>
        </sidebar>

        <!-- Hero Content -->
        <div class="hero-content">
            <h1>Hello! I'm Joshua Freeman.</h1>
            <p id="dynamic-bio">
                CS student at ETH Zurich interested in applications of AI to health,
                AI safety research, and software engineering. I also read books,
                write French poetry, and play guitar.
            </p>

            <footer>
                <a href="https://telegram.me/josh_freeman" target="_blank" rel="noopener" class="btn telegram">Telegram</a>
                <button class="btn email" id="email-btn" onclick="copyEmail()">
                    <span id="email-text">E-mail</span>
                </button>
            </footer>
            <script>
                function copyEmail() {
                    const btn = document.getElementById('email-btn');
                    const text = document.getElementById('email-text');
                    // Decode from char codes (not pattern-matchable)
                    const c = [109,101,64,106,111,115,104,102,114,101,101,109,97,110,46,109,101];
                    const email = String.fromCharCode.apply(null, c);

                    navigator.clipboard.writeText(email).then(() => {
                        text.textContent = 'Copied!';
                        btn.style.background = 'var(--success)';
                        btn.style.borderColor = 'var(--success)';
                        setTimeout(() => {
                            text.textContent = 'E-mail';
                            btn.style.background = '';
                            btn.style.borderColor = '';
                        }, 2000);
                    }).catch(() => {
                        text.textContent = email;
                        setTimeout(() => {
                            text.textContent = 'E-mail';
                        }, 4000);
                    });
                }
            </script>
        </div>
    </div>

    <!-- Scripts -->
    <script src="gol.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="submenus.js"></script>
</body>
</html>
