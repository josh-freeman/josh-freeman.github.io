<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends Map</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" href="/resources/icon_blue.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --amber: #e5a54b;
            --amber-dim: #c48a3a;
            --amber-glow: rgba(229, 165, 75, 0.4);
            --amber-soft: rgba(229, 165, 75, 0.15);
            --bg-deep: #0a0908;
            --bg-elevated: #151311;
            --bg-card: #1a1815;
            --text-primary: #f5f2ed;
            --text-muted: #8a857c;
            --border: rgba(229, 165, 75, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'DM Sans', sans-serif;
            background: #1a1a1a;
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Grain overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        /* Header */
        .header {
            position: fixed;
            top: 1.25rem;
            left: 1.25rem;
            right: 1.25rem;
            z-index: 100;
            padding: 0.875rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 18, 16, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        .header h1 {
            font-family: 'Fraunces', serif;
            font-weight: 400;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .header h1::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--amber);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--amber-glow), 0 0 16px var(--amber-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .back-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
        }

        .back-link:hover {
            background: rgba(229, 165, 75, 0.15);
            border-color: var(--amber);
            color: var(--amber);
        }

        /* Map container */
        #map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Stats panel */
        .stats-panel {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            z-index: 100;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            min-width: 200px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .stats-panel h2 {
            font-family: 'Fraunces', serif;
            font-weight: 400;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .stat-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--amber);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .countries-list {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Custom marker */
        .friend-marker {
            position: relative;
            width: 24px;
            height: 24px;
        }

        .friend-marker-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: var(--amber);
            border-radius: 50%;
            box-shadow:
                0 0 0 3px var(--bg-deep),
                0 0 20px var(--amber-glow),
                0 0 40px var(--amber-glow);
        }

        .friend-marker-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background: var(--amber-soft);
            border-radius: 50%;
            animation: marker-pulse 2.5s ease-out infinite;
        }

        @keyframes marker-pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* Popup styling */
        .leaflet-popup-content-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            padding: 0;
        }

        .leaflet-popup-content {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
        }

        .leaflet-popup-tip {
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .leaflet-popup-close-button {
            color: var(--text-muted) !important;
            font-size: 18px !important;
            padding: 8px 10px !important;
        }

        .leaflet-popup-close-button:hover {
            color: var(--amber) !important;
        }

        .friend-popup {
            padding: 1rem 1.25rem;
            min-width: 180px;
        }

        .friend-popup-name {
            font-family: 'Fraunces', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .friend-popup-location {
            font-size: 0.8rem;
            color: var(--amber);
            margin-bottom: 0.5rem;
        }

        .friend-popup-seen {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Loading state */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top-color: var(--amber);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: 'Fraunces', serif;
            font-size: 0.875rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* Error state */
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 150;
        }

        .error-message h2 {
            font-family: 'Fraunces', serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .error-message p {
            color: var(--text-muted);
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            .stats-panel {
                left: 1rem;
                right: 1rem;
                bottom: 1rem;
            }

            .header {
                top: 1rem;
                left: 1rem;
                right: 1rem;
                padding: 0.75rem 1rem;
            }

            .header h1 {
                font-size: 1.1rem;
            }

            .back-link {
                font-size: 0.75rem;
                padding: 0.4rem 0.6rem;
            }

            .leaflet-control-zoom {
                margin-right: 1rem !important;
                margin-bottom: 1rem !important;
            }
        }

        /* Leaflet controls styling */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4) !important;
            margin-right: 1.25rem !important;
            margin-bottom: 1.25rem !important;
        }

        .leaflet-control-zoom a {
            background: rgba(20, 18, 16, 0.92) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border) !important;
            width: 40px !important;
            height: 40px !important;
            line-height: 40px !important;
            font-size: 18px !important;
            font-weight: 300 !important;
        }

        .leaflet-control-zoom a:hover {
            background: rgba(229, 165, 75, 0.2) !important;
            color: var(--amber) !important;
        }

        .leaflet-control-zoom-in {
            border-radius: 10px 10px 0 0 !important;
            border-bottom: none !important;
        }

        .leaflet-control-zoom-out {
            border-radius: 0 0 10px 10px !important;
        }

        .leaflet-top.leaflet-left {
            top: auto !important;
            bottom: 0 !important;
            left: auto !important;
            right: 0 !important;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Locating friends...</div>
    </div>

    <header class="header">
        <h1>Friends Map</h1>
        <a href="/blog.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m15 18-6-6 6-6"/>
            </svg>
            Back to blog
        </a>
    </header>

    <div id="map"></div>

    <div class="stats-panel" id="stats" style="display: none;">
        <h2>Network</h2>
        <div class="stat-row">
            <span class="stat-number" id="friend-count">0</span>
            <span class="stat-label">friends located</span>
        </div>
        <div class="countries-list" id="countries-list"></div>
    </div>

    <div class="error-message" id="error" style="display: none;">
        <h2>Access Denied</h2>
        <p>You need to be logged in as admin to view this page.</p>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- API config -->
    <script src="/js/config.js"></script>

    <script>
        (function() {
            'use strict';

            const API_BASE = window.API_BASE || 'https://api.joshfreeman.me';

            // Check auth
            function getAuthToken() {
                return localStorage.getItem('comment_token');
            }

            function getCurrentUser() {
                try {
                    const user = localStorage.getItem('comment_user');
                    return user ? JSON.parse(user) : null;
                } catch (e) {
                    return null;
                }
            }

            // Verify admin access
            const user = getCurrentUser();
            const token = getAuthToken();

            if (!user || !user.is_admin || !token) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').style.display = 'block';
                return;
            }

            // Initialize map with dark tiles
            const map = L.map('map', {
                zoomControl: true,
                attributionControl: false
            }).setView([30, 0], 2);

            // Dark map tiles (CartoDB Dark Matter)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            // Custom marker icon
            function createMarkerIcon() {
                return L.divIcon({
                    className: 'friend-marker',
                    html: `
                        <div class="friend-marker-pulse"></div>
                        <div class="friend-marker-inner"></div>
                    `,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12],
                    popupAnchor: [0, -12]
                });
            }

            // Format relative time
            function formatLastSeen(isoString) {
                if (!isoString) return 'Unknown';

                const date = new Date(isoString.endsWith('Z') ? isoString : isoString + 'Z');
                const now = new Date();
                const diff = now - date;

                const minutes = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);

                if (minutes < 5) return 'Just now';
                if (minutes < 60) return `${minutes}m ago`;
                if (hours < 24) return `${hours}h ago`;
                if (days < 7) return `${days}d ago`;

                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            // Fetch friends data
            async function loadFriends() {
                try {
                    const response = await fetch(`${API_BASE}/admin/friends-map`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (!response.ok) {
                        throw new Error('Failed to load friends');
                    }

                    const data = await response.json();
                    return data.friends;
                } catch (error) {
                    console.error('Error loading friends:', error);
                    return [];
                }
            }

            // Render friends on map
            async function init() {
                const friends = await loadFriends();

                document.getElementById('loading').classList.add('hidden');

                if (friends.length === 0) {
                    document.getElementById('stats').style.display = 'block';
                    document.getElementById('friend-count').textContent = '0';
                    document.getElementById('countries-list').textContent = 'No location data yet. Friends will appear as they use the site.';
                    return;
                }

                // Add markers
                const markers = [];
                const countries = new Set();

                friends.forEach(friend => {
                    if (friend.lat && friend.lng) {
                        const marker = L.marker([friend.lat, friend.lng], {
                            icon: createMarkerIcon()
                        }).addTo(map);

                        const location = [friend.city, friend.country].filter(Boolean).join(', ') || 'Unknown location';

                        marker.bindPopup(`
                            <div class="friend-popup">
                                <div class="friend-popup-name">${escapeHtml(friend.name)}</div>
                                <div class="friend-popup-location">${escapeHtml(location)}</div>
                                <div class="friend-popup-seen">Last seen: ${formatLastSeen(friend.last_seen)}</div>
                            </div>
                        `);

                        markers.push(marker);
                        if (friend.country) countries.add(friend.country);
                    }
                });

                // Fit map to show all markers
                if (markers.length > 0) {
                    const group = L.featureGroup(markers);
                    map.fitBounds(group.getBounds().pad(0.2));
                }

                // Update stats
                document.getElementById('stats').style.display = 'block';
                document.getElementById('friend-count').textContent = friends.length;

                const countriesArray = Array.from(countries).sort();
                if (countriesArray.length > 0) {
                    document.getElementById('countries-list').textContent = countriesArray.join(' · ');
                }
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            init();
        })();
    </script>
</body>
</html>
